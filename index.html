  if(eqPt.length>0&&(sc==='equilibrium'||sc==='sum_taxes')){
    const G=eqPt[0].x;
    gCircle(svg,toX(G),toY(eqPt[0].y),6,'#059669');gLine(svg,toX(G),toY(0),toX(G),toY(eqPt[0].y),'#059669',1,'3 3');gText(svg,toX(G),toY(-.04),'G*',10,'#059669');
    if(sc==='equilibrium'){
      // Show individual tax shares
      const tA=mbA(G),tB=mbB(G);
      gLine(svg,M.l,toY(tA),toX(G),toY(tA),'#2563EB',1.5,'4 3');gText(svg,M.l-4,toY(tA),'t_A',9,'#2563EB','end',700);
      gLine(svg,M.l,toY(tB),toX(G),toY(tB),'#DC2626',1.5,'4 3');gText(svg,M.l-4,toY(tB),'t_B',9,'#DC2626','end',700);
      gCircle(svg,toX(G),toY(tA),4,'#2563EB');gCircle(svg,toX(G),toY(tB),4,'#DC2626');
      // Bracket showing t_A + t_B = MC
      gText(svg,toX(G)+15,toY((tA+tB)/2),'t_A + t_B\n= MC(G*)',8,'#059669','start',600);
    }
  }
  if(sc==='freerider'&&eqPt.length>0){
    const G=eqPt[0].x;gLine(svg,toX(G),toY(0),toX(G),toY(mc(G)),'#059669',1,'3 3');gText(svg,toX(G),toY(-.04),'G*',9,'#059669');
    // Show understated MB_B
    const fakeMB=x=>.2-.15*x;let dF='';for(let x=.02;x<=.95;x+=.005){const y=fakeMB(x);if(y>0)dF+=(dF?'L':'M')+toX(x)+','+toY(y)}
    gPath(svg,dF,'#DC2626',1.5,'none','5 4');gText(svg,toX(.7),toY(Math.max(.05,fakeMB(.7)))+14,"MB_B' (fake)",8,'#DC2626','start');
    // Sum with fake
    const fakeSum=x=>mbA(x)+fakeMB(x);
    let dFS='';for(let x=.02;x<=.95;x+=.005){const y=fakeSum(x);if(y>0&&y<1)dFS+=(dFS?'L':'M')+toX(x)+','+toY(y)}
    gPath(svg,dFS,'#D97706',2);
    const fakeEq=GraphMath.intersectFunctions(fakeSum,mc,.02,.95);
    if(fakeEq.length>0){gCircle(svg,toX(fakeEq[0].x),toY(fakeEq[0].y),5,'#D97706');gText(svg,toX(fakeEq[0].x),toY(-.04),"G'",9,'#D97706');
      gText(svg,toX((G+fakeEq[0].x)/2),toY(.08),'← Underprovision!',9,'#DC2626','middle',700);
    }
  }
  const exps={individual:'<b>Individual MB curves:</b><br>1. <b>MB_A</b> (blue): Person A\'s declining marginal benefit from more public good<br>2. <b>MB_B</b> (red): Person B values public good less than A<br>3. <b>MC</b> (dark): rising marginal cost of provision<br>4. Each person\'s ideal quantity: where their MB = their tax share<br><b>Public goods are non-rival: both consume the SAME quantity G. But they may value it differently.</b>',
  sum_taxes:'<b>Sum of tax shares = MC:</b><br>1. For public goods: add MBs VERTICALLY (not horizontally like private goods)<br>2. <b>ΣMB = MB_A + MB_B</b> (green): total social value<br>3. Efficient provision: where ΣMB = MC → G*<br>4. At G*: the total willingness to pay covers the cost<br><b>Unlike private goods (same price, different quantities), public goods have same quantity, different prices.</b>',
  equilibrium:'<b>Lindahl equilibrium:</b><br>1. At G*: MB_A = t_A (A\'s tax share) and MB_B = t_B (B\'s tax share)<br>2. t_A + t_B = MC(G*) → cost is covered<br>3. A pays MORE (higher MB) and B pays LESS (lower MB)<br>4. Both agree on quantity G* because each gets their money\'s worth<br>5. <b>Pareto efficient</b> if preferences are truthfully revealed<br><b>The public-good analog of competitive equilibrium: personalized prices, same quantity.</b>',
  freerider:'<b>Free-rider problem:</b><br>1. B <b>lies</b>: reports MB_B\' (dashed) much lower than true MB_B<br>2. Apparent ΣMB shifts down → equilibrium shifts left to G\'<br>3. G\' < G* → <b>underprovision</b> of public good<br>4. B pays less tax but everyone gets less public good<br>5. This is why Lindahl equilibrium is theoretically elegant but <b>practically hard</b><br><b>The preference revelation problem: people have incentives to lie about their true valuation.</b>'};
  document.getElementById('li-ins').innerHTML=exps[sc]||'';
}

// ===== WEEK 7 GRAPH 2: Voting Paradox & Pairwise Cycling =====
function drawVotingParadox(){
  const c=document.getElementById('gc-voting_paradox');
  const sc=[{id:'preferences',label:'Show preference rankings'},{id:'i_vs_ii',label:'Vote: I vs II'},{id:'ii_vs_iii',label:'Vote: II vs III'},{id:'i_vs_iii',label:'Vote: I vs III'},{id:'cycle',label:'Show the cycle!'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Voting Paradox: Pairwise Cycling</h4><p class="g-desc">3 voters (A,B,C) rank 3 options (I,II,III). Each pairwise vote has a winner, but the winners form a CYCLE. No stable majority winner exists. Agenda order determines the outcome!</p><div class="g-canvas-wrap"><div id="vp-svg"></div></div>${scBar(sc,'voting_paradox')}<div class="g-insight" id="vp-ins">Click to step through the voting paradox.</div></div>`;
  window._vpSc='preferences';updVP();
}
window.applyScenario_voting_paradox=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window._vpSc=id;updVP()};
function updVP(){
  const W=520,H=380,M={l:30,r:30,t:30,b:30};const sc=window._vpSc||'preferences';
  const pw=document.getElementById('vp-svg');pw.innerHTML='';const svg=makeSVG(pw,W,H,'vp-s');
  const navy='#1B2A4A',blue='#2563EB',red='#DC2626',green='#059669',purple='#7C3AED',amber='#D97706';
  // Preference table
  const prefs={A:['III','II','I'],B:['I','III','II'],C:['II','I','III']};
  const voters=['A','B','C'];const tW=160,tH=130,tx=30,ty=25;
  gRect(svg,tx,ty,tW,tH,'#F9FAFB',6);svg.lastChild.setAttribute('stroke','#E5E7EB');svg.lastChild.setAttribute('stroke-width','1');
  gText(svg,tx+tW/2,ty-6,'Preference Rankings',11,navy,'middle',700);
  // Header row
  gText(svg,tx+25,ty+20,'Voter',9,navy,'middle',700);
  gText(svg,tx+70,ty+20,'1st',9,navy,'middle',700);gText(svg,tx+105,ty+20,'2nd',9,navy,'middle',700);gText(svg,tx+140,ty+20,'3rd',9,navy,'middle',700);
  gLine(svg,tx+5,ty+28,tx+tW-5,ty+28,'#E5E7EB',1);
  voters.forEach((v,i)=>{const y=ty+45+i*30;const colors={A:red,B:blue,C:green};
    gText(svg,tx+25,y,v,11,colors[v],'middle',700);
    prefs[v].forEach((p,j)=>{gText(svg,tx+70+j*35,y,p,11,navy,'middle',500)})});
  // Pairwise voting results (right side)
  const rx=220,ry=25;
  function voteBox(x,y,opt1,opt2,winner,active){
    const w=130,h=55;gRect(svg,x,y,w,h,active?'#FEF3C7':'#F3F4F6',8);
    svg.lastChild.setAttribute('stroke',active?amber:'#D1D5DB');svg.lastChild.setAttribute('stroke-width',active?'2':'1');
    gText(svg,x+w/2,y+18,opt1+' vs '+opt2,11,navy,'middle',700);
    if(active){
      // Count votes
      const votes1=[],votes2=[];
      voters.forEach(v=>{const r=prefs[v];const idx1=r.indexOf(opt1),idx2=r.indexOf(opt2);if(idx1<idx2)votes1.push(v);else votes2.push(v)});
      gText(svg,x+w/2,y+35,opt1+': '+votes1.join(',')+' | '+opt2+': '+votes2.join(','),8,'#666','middle',400);
      gText(svg,x+w/2,y+48,'Winner: '+winner,11,green,'middle',700);
    }
  }
  const showI=sc==='i_vs_ii'||sc==='cycle';const showII=sc==='ii_vs_iii'||sc==='cycle';const showIII=sc==='i_vs_iii'||sc==='cycle';
  voteBox(rx,ry,'I','II','II',showI);
  voteBox(rx,ry+70,'II','III','III',showII);
  voteBox(rx,ry+140,'I','III','I',showIII);
  // Cycle diagram (bottom)
  if(sc==='cycle'){
    const cx=130,cy=290,r=55;
    // Triangle of options
    const pts=[{x:cx,y:cy-r,lb:'I'},{x:cx+r*Math.cos(Math.PI/6),y:cy+r*Math.sin(Math.PI/6),lb:'III'},{x:cx-r*Math.cos(Math.PI/6),y:cy+r*Math.sin(Math.PI/6),lb:'II'}];
    pts.forEach(p=>{gCircle(svg,p.x,p.y,20,'#FEF3C7');svg.lastChild.setAttribute('stroke',amber);svg.lastChild.setAttribute('stroke-width','2');gText(svg,p.x,p.y+1,p.lb,13,navy,'middle',700)});
    // Arrows showing cycle: II beats I, III beats II, I beats III
    const arrow=(x1,y1,x2,y2,label)=>{const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);const nx=dx/len,ny=dy/len;
      const sx=x1+nx*24,sy=y1+ny*24,ex=x2-nx*24,ey=y2-ny*24;
      gLine(svg,sx,sy,ex,ey,red,2);gPath(svg,`M${ex},${ey}L${ex-nx*8+ny*4},${ey-ny*8-nx*4}L${ex-nx*8-ny*4},${ey-ny*8+nx*4}Z`,red,0,red);
      gText(svg,(sx+ex)/2+ny*12,(sy+ey)/2-nx*12,label,8,red,'middle',600)};
    arrow(pts[2].x,pts[2].y,pts[0].x,pts[0].y,'beats');  // II→I? No, II beats I means arrow II→I
    arrow(pts[1].x,pts[1].y,pts[2].x,pts[2].y,'beats');  // III beats II
    arrow(pts[0].x,pts[0].y,pts[1].x,pts[1].y,'beats');  // I beats III
    gText(svg,cx,cy+r+35,'CYCLE: II ≻ I, III ≻ II, I ≻ III',11,red,'middle',700);
    gText(svg,cx,cy+r+50,'No stable winner!',10,red,'middle',700);
  }
  // Arrow's theorem note
  if(sc==='cycle'){gText(svg,380,310,"Arrow's Impossibility:",10,navy,'middle',700);gText(svg,380,326,'No perfect voting rule',9,navy,'middle',400);gText(svg,380,340,'can always avoid this.',9,navy,'middle',400)}
  const exps={preferences:'<b>Preference rankings:</b><br>1. <b>Voter A:</b> III > II > I (prefers III most)<br>2. <b>Voter B:</b> I > III > II (prefers I most)<br>3. <b>Voter C:</b> II > I > III (prefers II most)<br>4. Each voter has consistent, rational preferences<br><b>But does the GROUP have consistent preferences? Let\'s vote pairwise...</b>',
  i_vs_ii:'<b>Vote: I vs II</b><br>1. A prefers II (II > I in A\'s ranking)<br>2. B prefers I (I > II in B\'s ranking)<br>3. C prefers II (II > I in C\'s ranking)<br>4. <b>II wins 2-1</b><br><b>So far: II beats I. Let\'s check other pairs...</b>',
  ii_vs_iii:'<b>Vote: II vs III</b><br>1. A prefers III (III > II)<br>2. B prefers III (III > II)<br>3. C prefers II (II > III)<br>4. <b>III wins 2-1</b><br><b>So III beats II, and II beats I. Does III beat everything? Check I vs III...</b>',
  i_vs_iii:'<b>Vote: I vs III</b><br>1. A prefers III (III > I)<br>2. B prefers I (I > III)<br>3. C prefers I (I > III)<br>4. <b>I wins 2-1</b><br><b>Wait: I beats III, but III beats II, and II beats I. That\'s a CYCLE!</b>',
  cycle:'<b>THE VOTING PARADOX:</b><br>1. II beats I (2-1) ✓<br>2. III beats II (2-1) ✓<br>3. I beats III (2-1) ✓<br>4. <b>II ≻ I, III ≻ II, I ≻ III → CYCLE!</b><br>5. No option defeats ALL others<br>6. The winner depends on <b>which pairs are voted on</b> and <b>in what order</b><br>7. <b>Agenda setting matters enormously</b><br><br>Individual rationality does NOT guarantee collective rationality.<br><b>Arrow\'s Impossibility Theorem:</b> No voting rule can always convert individual preferences into a consistent collective ranking while satisfying basic fairness conditions.'};
  document.getElementById('vp-ins').innerHTML=exps[sc]||'';
}

      gLine(svg,toX(pk),toY(0),toX(pk),toY(.85),'#ccc',1,'3 3');
      gText(svg,toX(pk),toY(.92),labels[i],8,colors[i],'middle',700);
      gText(svg,toX(pk),toY(-.06),'G*'+(i+1),8,colors[i],'middle');
    });
    if(sc==='median_wins'){
      gLine(svg,toX(.5),toY(0),toX(.5),toY(.95),'#059669',2.5,'4 3');
      gText(svg,toX(.5)+10,toY(.95),'MEDIAN\nVOTER\nWINS',10,'#059669','start',700);
      // Arrows showing any proposal left or right of median gets defeated

      gText(svg,toX(.75),toY(.35),'Any proposal here →\ngets outvoted by\nV1+V2+V3 (majority)',8,'#7C3AED','middle',400);
    }
  }
  if(sc==='multi_peaked'){
    gText(svg,M.l+pW/2,M.t-8,'Multi-Peaked Preference (unstable!)',11,'#DC2626','middle',700);
    // Draw a multi-peaked preference
    let mp='';for(let x=.02;x<=.98;x+=.005){
      const y=.5*Math.exp(-Math.pow((x-.2)/.1,2))+.7*Math.exp(-Math.pow((x-.7)/.12,2))+.15;

    gPath(svg,mp,'#DC2626',2.5);
    gText(svg,toX(.2),toY(.72),'Peak 1',9,'#DC2626','middle',700);gText(svg,toX(.7),toY(.92),'Peak 2',9,'#DC2626','middle',700);
    gText(svg,toX(.45),toY(.25),'Valley',9,'#999','middle');
    // Warning
    gText(svg,toX(.5),toY(.05),'⚠ Multi-peaked → voting cycles possible → no stable equilibrium',10,'#DC2626','middle',700);
  }
  if(sc==='two_party'){
    gText(svg,M.l+pW/2,M.t-8,'Two-Party Convergence to Median',11,'#1B2A4A','middle',700);
    // Voter distribution (bell curve)
    let vd='';for(let x=.05;x<=.95;x+=.005){const y=Math.exp(-Math.pow((x-.5)/.2,2));vd+=(vd?'L':'M')+toX(x)+','+toY(y*.7+.05)}
    gPath(svg,vd,'#ccc',1.5);gText(svg,toX(.5),toY(.82),'Voter distribution',9,'#999','middle');
    // Two parties converging
    gRect(svg,toX(.35)-25,toY(.45),50,24,'#DBEAFE',8);svg.lastChild.setAttribute('stroke','#2563EB');svg.lastChild.setAttribute('stroke-width','1.5');
    gText(svg,toX(.35),toY(.45)+13,'Party L',10,'#2563EB','middle',700);
    gRect(svg,toX(.65)-25,toY(.45),50,24,'#FEE2E2',8);svg.lastChild.setAttribute('stroke','#DC2626');svg.lastChild.setAttribute('stroke-width','1.5');
    gText(svg,toX(.65),toY(.45)+13,'Party R',10,'#DC2626','middle',700);
    // Arrows converging
    gPath(svg,`M${toX(.4)},${toY(.42)}L${toX(.48)},${toY(.42)}`,'#2563EB',2);
    gPath(svg,`M${toX(.6)},${toY(.42)}L${toX(.52)},${toY(.42)}`,'#DC2626',2);
    gLine(svg,toX(.5),toY(0),toX(.5),toY(.7),'#059669',2,'4 3');gText(svg,toX(.5),toY(-.06),'Median',10,'#059669','middle',700);
    gText(svg,toX(.5),toY(.2),'Both parties move toward\nthe median to win votes',9,'#1B2A4A','middle',500);
  }
  const exps={single_peaked:'<b>Single-peaked preferences:</b><br>1. Each voter has ONE most-preferred spending level (peak)<br>2. Utility falls as spending moves away from peak in EITHER direction<br>3. V1 wants low spending, V5 wants high, V3 is in the middle<br>4. These "one-hill" shapes are crucial for stable majority voting<br><b>Single-peaked = one unique optimum. This is the key condition for the median voter theorem to work.</b>',
  median_wins:'<b>Median voter wins under majority voting:</b><br>1. <b>V3 (median)</b> wants G*3 = 50% spending<br>2. Any proposal BELOW 50%: V3+V4+V5 (3 votes) prefer 50% → defeated<br>3. Any proposal ABOVE 50%: V1+V2+V3 (3 votes) prefer 50% → defeated<br>4. <b>Only the median voter\'s ideal point survives all pairwise contests</b><br>5. Other voters get too little (V4,V5) or too much (V1,V2)<br><b>Only the median voter gets exactly what they want. This is the majority voting equilibrium.</b>',
  multi_peaked:'<b>Multi-peaked preferences (DANGER):</b><br>1. This voter likes spending at 20% AND at 70%, but NOT at 45%<br>2. Two "hills" with a valley between<br>3. Violates single-peakedness assumption<br>4. Can create voting cycles and instability<br>5. No guarantee of a stable majority equilibrium<br><b>Multi-peaked preferences destroy the median voter theorem. Cycles, agenda manipulation, and instability become possible.</b>',
  two_party:'<b>Two-party convergence to median:</b><br>1. Voter preferences distributed around the center<br>2. Party L starts left, Party R starts right<br>3. To win majority, each party must capture the median voter<br>4. Both parties <b>converge toward the median</b><br>5. In equilibrium, platforms are similar<br><b>This explains why competing parties in broad elections often moderate their positions — they\'re chasing the median voter.</b>'};
  document.getElementById('mv-ins').innerHTML=exps[sc]||'';
}

  examples:'<b>Examples in each category:</b><br>• <b>Private goods:</b> food, cars, clothing, parking — markets work well<br>• <b>Common-pool:</b> fish, timber, coal, groundwater — overuse risk<br>• <b>Club goods:</b> cinema, satellite TV, private parks — can charge, shared consumption<br>• <b>Public goods:</b> defense, air quality, free-to-air TV — hardest for markets<br><b>Many goods are not perfectly "pure" — roads are nonrival when empty but rival when congested.</b>',
  freerider:'<b>Two different market failures:</b><br>1. <b>Public goods → Free-rider problem:</b> nonexcludable + nonrival → nobody wants to pay → <b>underprovision</b><br>2. <b>Common-pool → Tragedy of the commons:</b> nonexcludable + rival → everyone takes → <b>overuse</b><br><br>Public good problem = underprovision (nobody pays)<br>Commons problem = overuse (everybody takes)<br><b>Same root (nonexcludability) but opposite symptoms!</b>',
  test_good:'<b>How to classify any good on an exam:</b><br>Step 1: Can non-payers be EXCLUDED? (Yes → left column, No → right column)<br>Step 2: Does use REDUCE what\'s left? (Yes → top row, No → bottom row)<br><br>Example: COVID vaccine dose → excludable (can control distribution) + rival (one dose used up) → <b>private good</b><br>But: vaccine KNOWLEDGE → nonexcludable (hard to stop spread) + nonrival (one firm learning doesn\'t reduce it) → <b>public good</b><br><b>Same product, different aspects → different classifications!</b>'};

function drawHorizSum(){
  const c=document.getElementById('gc-horiz_summation');
  const sc=[{id:'individual',label:'Individual demands'},{id:'sum_horizontal',label:'Horizontal summation'},{id:'equilibrium',label:'+ Supply = Equilibrium'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Private Goods: Horizontal Summation of Demand</h4><p class="g-desc">At a given PRICE, add QUANTITIES across individuals → market demand. Then intersect with supply for equilibrium. MRS_Adam = MRS_Eve = MRT. Matching Figures 4.1 & 4.2 from slides.</p><div class="g-canvas-wrap"><div id="hs-svg"></div></div>${scBar(sc,'horiz_summation')}<div class="g-insight" id="hs-ins">Click to build up private-good market demand step by step.</div></div>`;
  window._hsSc='individual';updHS();
}
window.applyScenario_horiz_summation=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window._hsSc=id;updHS()};
function updHS(){
  const W=540,H=300,M={l:35,r:10,t:25,b:38};const sc=window._hsSc||'individual';
  const pw=document.getElementById('hs-svg');pw.innerHTML='';const svg=makeSVG(pw,W,H,'hs-s');
  const panW=(W-20)/3,pH=H-M.t-M.b;
  // 3 panels
  const panels=[{x:0,lb:'A. Adam',color:'#2563EB'},{x:panW+10,lb:'B. Eve',color:'#DC2626'},{x:2*(panW+10),lb:'C. Market',color:'#1B2A4A'}];
  const dA=x=>8-5*x,dE=x=>8-3.2*x,dM=x=>{const qa=Math.max(0,(8-x)/5),qe=Math.max(0,(8-x)/3.2);return qa+qe};
  panels.forEach((p,i)=>{
    const px=p.x+M.l,py=M.t;
    gLine(svg,px,py,px,H-M.b,'#333',1.5);gLine(svg,px,H-M.b,px+panW-M.l-M.r,H-M.b,'#333',1.5);
    gText(svg,px+(panW-M.l-M.r)/2,py-8,p.lb,10,p.color,'middle',700);
    gText(svg,px-4,py+4,'P_f',8,'#333','end');gText(svg,px+(panW-M.l-M.r)/2,H-M.b+14,'f per year',8,'#333','middle');
    const toX=v=>px+v/(i===2?5:2.5)*(panW-M.l-M.r),toY=v=>py+(1-v/9)*pH;
    // Draw demand
    if(i===0){let d='';for(let q=0;q<=1.6;q+=.02){const p=dA(q);if(p>0)d+=(d?'L':'M')+toX(q)+','+toY(p)}gPath(svg,d,'#2563EB',2.2);gText(svg,toX(1.4),toY(dA(1.4))+14,'D^A',9,'#2563EB','start',700)}
    if(i===1){let d='';for(let q=0;q<=2.5;q+=.02){const p=dE(q);if(p>0)d+=(d?'L':'M')+toX(q)+','+toY(p)}gPath(svg,d,'#DC2626',2.2);gText(svg,toX(2.2),toY(dE(2.2))+14,'D^E',9,'#DC2626','start',700)}
    if(i===2&&(sc==='sum_horizontal'||sc==='equilibrium')){
      let d='';for(let p=0.5;p<=8;p+=.1){const q=dM(p);d+=(d?'L':'M')+toX(q)+','+toY(p)}gPath(svg,d,'#1B2A4A',2.5);gText(svg,toX(dM(2)),toY(2)+14,'D^(A+E)',9,'#1B2A4A','start',700);
    }
    // Supply curve in panel C
    if(i===2&&sc==='equilibrium'){
      let s='';for(let q=0;q<=4.5;q+=.05){const p=2+1.3*q;if(p<9)s+=(s?'L':'M')+toX(q)+','+toY(p)}gPath(svg,s,'#059669',2.2);gText(svg,toX(4),toY(2+1.3*4)-10,'S_f',9,'#059669','start',700);
      // Equilibrium: solve demand(p)=supply(p) numerically
      const invDem=q=>8-q/0.5125,supP=q=>2+1.3*q;
      const eqPt=GraphMath.intersectFunctions(invDem,supP,0.1,4);
      if(eqPt.length>0){const eqQ=eqPt[0].x,eqP=eqPt[0].y;
      gCircle(svg,toX(eqQ),toY(eqP),5,'#059669');
      gLine(svg,px,toY(eqP),toX(eqQ),toY(eqP),'#999',1,'3 3');gText(svg,px-4,toY(eqP),eqP.toFixed(1),8,'#059669','end');
      gLine(svg,toX(eqQ),toY(eqP),toX(eqQ),toY(0),'#999',1,'3 3');gText(svg,toX(eqQ),toY(-.5),eqQ.toFixed(1),8,'#059669','middle')}
    }
    // Price line at P=5
    if(sc!=='equilibrium'){
      gLine(svg,px,toY(5),px+panW-M.l-M.r,toY(5),'#999',1,'3 3');gText(svg,px-4,toY(5),'5',8,'#999','end');
      if(i===0){const q=(8-5)/5;gLine(svg,toX(q),toY(5),toX(q),toY(0),'#2563EB',1,'3 3');gText(svg,toX(q),toY(-.5),'1',8,'#2563EB','middle')}
      if(i===1){const q=(8-5)/3.2;gLine(svg,toX(q),toY(5),toX(q),toY(0),'#DC2626',1,'3 3');gText(svg,toX(q),toY(-.5),'~1',8,'#DC2626','middle')}
      if(i===2&&sc==='sum_horizontal'){const q=dM(5);gLine(svg,toX(q),toY(5),toX(q),toY(0),'#1B2A4A',1,'3 3');gText(svg,toX(q),toY(-.5),'~2',8,'#1B2A4A','middle')}
    }
  });
  const exps={individual:'<b>Individual demand curves:</b><br>1. <b>Panel A:</b> Adam\'s demand — at P=5, Adam wants 1 unit<br>2. <b>Panel B:</b> Eve\'s demand — at P=5, Eve wants ~1 unit<br>3. Each person independently chooses quantity at the market price<br><b>Private goods: each buyer chooses their OWN quantity at the SAME price.</b>',
  sum_horizontal:'<b>Horizontal summation → Market demand:</b><br>1. At P=5: Adam wants 1 + Eve wants ~1 = market demand ~2<br>2. At every price, ADD QUANTITIES across individuals<br>3. This gives the market demand curve D^(A+E) in Panel C<br>4. "Horizontal" because we add along the QUANTITY axis<br><b>Same price → add quantities. This is how private-good markets work.</b>',
  equilibrium:'<b>+ Supply = Efficient equilibrium:</b><br>1. Market demand (horizontal sum) intersects supply S_f<br>2. Equilibrium: P = MC → efficient price and quantity<br>3. MRS_Adam = MRS_Eve = P/P_other = MRT<br>4. Competitive market achieves Pareto efficiency for private goods<br><b>This is Figures 4.1 & 4.2 from slides combined. Horizontal summation + supply = private-good efficiency.</b>'};
  document.getElementById('hs-ins').innerHTML=exps[sc]||'';
}

// ===== WEEK 4 GRAPH 3: Vertical Summation (Public Goods) =====
function drawVertSum(){
  const c=document.getElementById('gc-vert_summation');
  const sc=[{id:'individual',label:'Individual WTP curves'},{id:'sum_vertical',label:'Vertical summation'},{id:'equilibrium',label:'+ Supply = Efficient G*'},{id:'compare',label:'Compare: horiz vs vert'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Public Goods: Vertical Summation of Demand</h4><p class="g-desc">At a given QUANTITY, add WILLINGNESS TO PAY across individuals → social demand. Then intersect with supply. ΣMRSᵢ = MRT. Matching Figures 4.3 & 4.4 from slides.</p><div class="g-canvas-wrap"><div id="vs-svg"></div></div>${scBar(sc,'vert_summation')}<div class="g-insight" id="vs-ins">Click to build up public-good social demand step by step.</div></div>`;

window.applyScenario_vert_summation=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window._vsSc=id;updVS()};
function updVS(){
  const W=480,H=380,M={l:45,r:15,t:25,b:38};const sc=window._vsSc||'individual';
  const pw=document.getElementById('vs-svg');pw.innerHTML='';const svg=makeSVG(pw,W,H,'vs-s');
  const panH=(H-20)/3,pW=W-M.l-M.r;
  const wtpA=q=>6*(1-q/50),wtpE=q=>4*(1-q/50),wtpSum=q=>wtpA(q)+wtpE(q);
  // 3 stacked panels
  const panels=[{y:0,lb:'A. Adam\'s WTP',color:'#2563EB',wtp:wtpA,max:7},{y:panH+5,lb:'B. Eve\'s WTP',color:'#DC2626',wtp:wtpE,max:5},{y:2*(panH+5),lb:'C. Group WTP (Σ)',color:'#059669',wtp:wtpSum,max:11}];
  panels.forEach((p,i)=>{
    const py=p.y+M.t,px=M.l;
    gLine(svg,px,py,px,py+panH-20,'#333',1.5);gLine(svg,px,py+panH-20,px+pW,py+panH-20,'#333',1.5);
    gText(svg,px+(pW)/2,py-6,p.lb,10,p.color,'middle',700);
    gText(svg,px-4,py+4,'P',8,'#333','end');gText(svg,px+pW,py+panH-20+12,'r/year',8,'#333','end');
    const toX=q=>px+(q/50)*pW,toY=v=>py+(1-v/p.max)*(panH-20);
    // Draw WTP curve
    if(i<2||(i===2&&sc!=='individual')){
      let d='';for(let q=1;q<=48;q+=.5){const v=p.wtp(q);if(v>0)d+=(d?'L':'M')+toX(q)+','+toY(v)}
      gPath(svg,d,p.color,i===2?2.5:2);
      gText(svg,toX(40),toY(Math.max(.3,p.wtp(40)))+12,i===2?'D^(A+E)':'D^'+(i===0?'A':'E'),9,p.color,'start',700);
    }
    // Show Q=20 reference
    if(sc!=='compare'){
      const q=20;
      gLine(svg,toX(q),py,toX(q),py+panH-20,'#999',1,'3 3');
      if(i<2){gCircle(svg,toX(q),toY(p.wtp(q)),4,p.color);gText(svg,toX(q)+6,toY(p.wtp(q))-6,p.wtp(q).toFixed(0),9,p.color,'start',700)}
      if(i===2&&sc!=='individual'){gCircle(svg,toX(q),toY(wtpSum(q)),5,'#059669');gText(svg,toX(q)+6,toY(wtpSum(q))-6,wtpSum(q).toFixed(0),9,'#059669','start',700)}
    }
    // Supply in Panel C
    if(i===2&&sc==='equilibrium'){
      const supply=q=>1+0.15*q;
      let s='';for(let q=1;q<=48;q+=.5){const v=supply(q);if(v<p.max)s+=(s?'L':'M')+toX(q)+','+toY(v)}
      gPath(svg,s,'#D97706',2);gText(svg,toX(42),toY(supply(42))-10,'S_f',9,'#D97706','start',700);
      // Equilibrium
      const eqPt=GraphMath.intersectFunctions(wtpSum,supply,1,48);
      if(eqPt.length>0){const e=eqPt[0];gCircle(svg,toX(e.x),toY(e.y),6,'#D97706');gLine(svg,toX(e.x),py,toX(e.x),py+panH-20,'#D97706',1.5,'4 3');gText(svg,toX(e.x),py+panH-20+12,'G*',10,'#D97706','middle',700)}
    }
  });
  if(sc==='compare'){
    gRect(svg,M.l+10,H-65,pW-20,55,'#FEF3C7',8);svg.lastChild.setAttribute('stroke','#D97706');svg.lastChild.setAttribute('stroke-width','1.5');
    gText(svg,W/2,H-48,'Private goods: same PRICE → add QUANTITIES (horizontal)',10,'#2563EB','middle',700);
    gText(svg,W/2,H-30,'Public goods: same QUANTITY → add WTP/PRICES (vertical)',10,'#059669','middle',700);
  }
  const exps={individual:'<b>Individual WTP curves:</b><br>1. <b>Panel A:</b> Adam willing to pay 6 at q=0, declining to 0 at q=50<br>2. <b>Panel B:</b> Eve willing to pay 4 at q=0, declining to 0 at q=50<br>3. Both consume the SAME quantity (public good is nonrival)<br>4. But they value it differently<br><b>Public goods: everyone gets the same amount. What differs is how much each person values it.</b>',
  sum_vertical:'<b>Vertical summation → Group demand:</b><br>1. At q=20: Adam WTP = 4, Eve WTP = 2 → Group WTP = 4+2 = <b>6</b><br>2. At every quantity, ADD willingness to pay across individuals<br>3. This gives the social demand curve D^(A+E) in Panel C<br>4. "Vertical" because we add along the PRICE axis<br><b>Same quantity → add WTP. This is how public-good social value is calculated.</b>',
  equilibrium:'<b>+ Supply = Efficient public good quantity:</b><br>1. Group WTP (vertical sum) intersects supply S_f at G*<br>2. At G*: ΣMRSᵢ = MRT (sum of marginal valuations = marginal cost)<br>3. This is the <b>Samuelson condition</b> for public goods<br>4. MRS_Adam + MRS_Eve = MRT (NOT MRS_Adam = MRS_Eve = MRT)<br><b>This is Figures 4.3 & 4.4. The key formula: ΣMRSᵢ = MRT for public goods.</b>',
  compare:'<b>The KEY contrast:</b><br><br>📦 <b>Private goods:</b> Same price, different quantities → horizontal summation<br>→ MRS_Adam = MRS_Eve = MRT<br><br>🏛 <b>Public goods:</b> Same quantity, different prices → vertical summation<br>→ MRS_Adam + MRS_Eve = MRT<br><br><b>This is the single most important distinction in Week 4. Master this contrast and you master the week.</b>'};
  document.getElementById('vs-ins').innerHTML=exps[sc]||'';
}

if(isExam){h+=`<div class="wk-subtitle">${w.subtitle}</div><div class="exam-nav">`;w.sections.forEach((s,i)=>{h+=`<button class="exam-nav-btn${i===0?' active':''}" onclick="this.parentElement.querySelectorAll('.exam-nav-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');document.getElementById('exam-q-${i}').scrollIntoView({behavior:'smooth'})">${s.num}. ${s.head}</button>`});h+=`</div>`;w.sections.forEach((s,i)=>{h+=`<div class="exam-seg open" id="exam-q-${i}"><div class="exam-seg-head" onclick="this.parentElement.classList.toggle('open')"><span class="exam-seg-num">${s.num}</span><span class="exam-seg-title">${s.head}</span>${s.pts?`<span class="exam-seg-pts">${s.pts}</span>`:''}<span class="exam-seg-toggle">▶</span></div><div class="exam-seg-body">`;if(s.prompt)h+=`<div class="exam-prompt">${s.prompt}</div>`;s.cards.forEach(c=>{h+=`<div class="wk-card"><h4>${c.title||''}</h4>${c.content}</div>`});h+=`</div></div>`})}
else{h+=`<div class="wk-mode-toggle" style="margin-top:10px"><button class="wk-mode-btn active" onclick="wkToggle('notes',this)">📝 Notes</button>${hasFormulas?'<button class="wk-mode-btn" onclick="wkToggle(\'formulas\',this)">📐 Formulas</button>':''}${hasGraphs?'<button class="wk-mode-btn" onclick="wkToggle(\'graphs\',this)">📊 Graphs</button>':'<button class="wk-mode-btn" disabled style="cursor:not-allowed;opacity:.4">📊 Graphs</button>'}<button class="wk-mode-btn" onclick="wkToggle('quiz',this)">🎯 Quiz</button></div>`;h+=`<div class="wk-subtitle">${w.subtitle}</div><div id="wk-notes-panel">`;if(w.sections.length>1){h+='<div class="wk-nav">';w.sections.forEach((s,i)=>{h+=`<button class="wk-nav-btn" onclick="document.getElementById('wk-sec-${i}').scrollIntoView({behavior:'smooth',block:'start'})">${s.head}</button>`});h+='</div>'}w.sections.forEach((s,i)=>{h+=`<div class="wk-section" id="wk-sec-${i}"><div class="wk-section-head"><span class="wk-num">${s.num}</span>${s.head}</div>`;s.cards.forEach(c=>{h+=`<div class="wk-card">${c.title?'<h4>'+c.title+'</h4>':''}${c.content}</div>`});h+='</div>'});h+='</div>';if(hasFormulas)h+='<div id="wk-formulas-panel" class="wk-formulas"></div>';if(hasGraphs)h+='<div id="wk-graphs-panel" class="wk-graphs"></div>';h+='<div id="wk-quiz-panel" class="wk-quiz"></div>'}
