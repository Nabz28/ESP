// ═══ UPC + SIC (computed) ═══
EGR.upc_sic=function(){
  const B=EG.box(460,340,{l:55,r:15,t:30,b:45},[0,100],[0,100]);
  // UPC: concave curve (bowed outward)
  const upc=x=>100*Math.pow(Math.max(0,1-Math.pow(x/100,1.6)),1/1.6);
  // SICs: downward-sloping, convex to origin (hyperbolic)
  // SIC: y = k/(x+a) + c, slope = -k/(x+a)^2
  const sic=(k,c)=>x=>k/(x+5)+c;
  // Find tangent SIC to UPC: iterate to find k,c where SIC touches UPC
  // At tangent point: sic(x)=upc(x) AND sic'(x)=upc'(x)
  // Let's pick a tangent point around x=40
  const tx=42;const ty=upc(tx);const us=EG.slope(upc,tx);
  // sic'(tx) = -k/(tx+5)^2 = us → k = -us*(tx+5)^2
  const k1=-us*(tx+5)*(tx+5);const c1=ty-k1/(tx+5);
  const sic1=x=>k1/(x+5)+c1;
  // Lower SIC through different point on UPC (x=25)
  const ax=25;const ay=upc(ax);const as=EG.slope(upc,ax)*0.7;// slightly different slope → crosses UPC
  const k0=-as*(ax+5)*(ax+5);const c0=ay-k0/(ax+5);
  const sic0=x=>k0/(x+5)+c0;
  let s='';
  s+=`<path d="${EG.path(upc,1,98,B)}" fill="none" stroke="#1B2A4A" stroke-width="2.5"/>`;
  s+=EG.txt(85,upc(85),B,'UPC',{dx:8,dy:4,fs:11,c:'#1B2A4A',fw:700});
  s+=`<path d="${EG.path(sic0,5,90,B)}" fill="none" stroke="#D97706" stroke-width="1.8" stroke-dasharray="5 3"/>`;
  s+=EG.txt(85,sic0(85),B,'S₀',{dx:5,fs:10,c:'#D97706',fw:600});
  s+=`<path d="${EG.path(sic1,5,90,B)}" fill="none" stroke="#059669" stroke-width="2"/>`;
  s+=EG.txt(85,sic1(85),B,'S₁',{dx:5,fs:10,c:'#059669',fw:600});
  // Point A on UPC on S0
  const A=EG.isect(upc,sic0,10,60);
  if(A){s+=EG.circ(A.x,A.y,B,5,'#D97706');s+=EG.txt(A.x,A.y,B,'A',{dx:8,dy:-5,fs:10,c:'#D97706',fw:600})}
  // Point B tangent
  s+=EG.circ(tx,ty,B,5,'#059669');s+=EG.txt(tx,ty,B,'B ★',{dx:8,dy:-5,fs:10,c:'#059669',fw:700});
  // Inefficient point inside
  s+=EG.circ(30,50,B,4,'#999');s+=EG.txt(30,50,B,'inefficient',{dx:8,dy:4,fs:8,c:'#999'});
  const ap=EG.pt(20,98,B);
  s+=`<rect x="${ap.x}" y="${ap.y}" width="280" height="16" rx="4" fill="#F0FDF4" stroke="#BBF7D0"/>`;
  s+=`<text x="${ap.x+140}" y="${ap.y+11}" text-anchor="middle" font-size="8" fill="#14532D" font-weight="600">Social optimum = tangency of highest SIC with UPC (point B)</text>`;
  return'<div class="exam-graph-wrap">'+EG.svg(B,'U₁','U₂',s)+'</div>';
};

// ═══ Exchange Inefficiency: IC steeper than BL ═══
EGR.exchange_eff=function(){
  const B=EG.box(460,320,{l:55,r:15,t:25,b:45},[0,300],[0,300]);
  // Budget line: slope=-1, intercept=250 → y=250-x
  const bl=x=>250-x;
  // Point A on BL at x=125
  const ax=125,ay=bl(ax);
  // IC through A with slope=-2 (steeper): y=k/(x+a)+c
  const a=10;const k=2*(ax+a)*(ax+a);const c=ay-k/(ax+a);
  const ic=x=>k/(x+a)+c;
  let s='';
  s+=`<path d="${EG.path(bl,0,250,B)}" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 3"/>`;
  s+=EG.txt(240,bl(240),B,'BL (slope=−1)',{dx:5,dy:-5,fs:9,c:'#2563EB',fw:600});
  s+=`<path d="${EG.path(ic,15,250,B)}" fill="none" stroke="#059669" stroke-width="2.5"/>`;
  s+=EG.txt(220,ic(220),B,'IC (slope=−2)',{dx:5,dy:-5,fs:9,c:'#059669',fw:600});
  s+=EG.circ(ax,ay,B,5,'#DC2626');
  s+=EG.txt(ax,ay,B,'A (current)',{dx:8,dy:-8,fs:10,c:'#DC2626',fw:600});
  // Arrow showing desired direction
  const p1=EG.pt(ax+20,ay-10,B),p2=EG.pt(ax+60,ay-35,B);
  s+=`<line x1="${p1.x}" y1="${p1.y}" x2="${p2.x}" y2="${p2.y}" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ega)"/>`;
  s+=EG.txt(ax+50,ay-20,B,'wants more food →',{dx:5,dy:12,fs:8,c:'#DC2626'});
  const ap=EG.pt(30,290,B);
  s+=`<rect x="${ap.x}" y="${ap.y}" width="220" height="16" rx="4" fill="#FEF2F2" stroke="#FECACA"/>`;
  s+=`<text x="${ap.x+110}" y="${ap.y+11}" text-anchor="middle" font-size="8" fill="#991B1B" font-weight="600">IC steeper than BL → MRS > P ratio → no exchange efficiency</text>`;
  return'<div class="exam-graph-wrap">'+EG.svg(B,'Food','Clothing',s)+'</div>';
};

// ═══ Isoquant-Isocost (production inefficiency) ═══
EGR.isoquant_isocost=function(){
  const B=EG.box(460,340,{l:55,r:15,t:30,b:45},[0,300],[0,300]);
  // Isoquant: y = k/x^0.5 (convex to origin)
  const iq=x=>18000/Math.pow(x+20,1.2);
  // Point C on isoquant at x=160
  const cx=160,cy=iq(cx);
  // MRTS at C = |slope| = |iq'(cx)|
  const mrts=Math.abs(EG.slope(iq,cx));
  // Isocost through C with slope=-0.8 (steeper than MRTS)
  const isocost=x=>cy+0.8*(cx-x);
  // Tangent at C (slope = iq'(cx) ≈ -0.4)
  const tangent=x=>cy+mrts*(cx-x);
  // Efficient point E (where isocost would be tangent to isoquant)
  // Find x where |iq'(x)| = 0.8
  let ex=80;for(let i=0;i<200;i++){if(Math.abs(EG.slope(iq,ex))>0.8)ex+=0.5;else ex-=0.2}
  const ey=iq(ex);
  let s='';
  s+=`<path d="${EG.path(iq,20,280,B)}" fill="none" stroke="#7C3AED" stroke-width="2.5"/>`;
  s+=EG.txt(260,iq(260),B,'Isoquant Q₀',{dx:5,dy:4,fs:10,c:'#7C3AED',fw:700});
  s+=EG.line(Math.max(0,cx-140),isocost(cx-140),Math.min(300,cx+100),isocost(cx+100),B,'#2563EB',2,'6 3');
  s+=EG.txt(cx+80,isocost(cx+80),B,'Isocost (slope=−0.8)',{dx:5,dy:-5,fs:9,c:'#2563EB',fw:600});
  s+=EG.line(cx-80,tangent(cx-80),cx+100,tangent(cx+100),B,'#059669',1.5,'3 3');
  s+=EG.txt(cx+80,tangent(cx+80),B,'tangent (slope=−'+mrts.toFixed(1)+')',{dx:5,dy:8,fs:8,c:'#059669'});
  s+=EG.circ(cx,cy,B,6,'#DC2626');
  s+=EG.txt(cx,cy,B,'C',{dx:10,dy:-5,fs:11,c:'#DC2626',fw:700});
  s+=EG.circ(ex,ey,B,4,'#059669');
  s+=EG.txt(ex,ey,B,'E (efficient)',{dx:-10,dy:-10,fs:9,c:'#059669',fw:600,anchor:'end'});
  // Arrow from C to E
  const pc=EG.pt(cx-5,cy+5,B),pe=EG.pt(ex+10,ey-5,B);
  s+=`<line x1="${pc.x}" y1="${pc.y}" x2="${pe.x}" y2="${pe.y}" stroke="#DC2626" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ega)"/>`;
  s+=EG.txt((cx+ex)/2,(cy+ey)/2,B,'more K, less L',{dx:-15,dy:-10,fs:8,c:'#DC2626',fw:600});
  const ap=EG.pt(50,290,B);
  s+=`<rect x="${ap.x}" y="${ap.y}" width="280" height="28" rx="4" fill="#FEF2F2" stroke="#FECACA"/>`;
  s+=`<text x="${ap.x+140}" y="${ap.y+11}" text-anchor="middle" font-size="8" fill="#991B1B" font-weight="600">MRTS (${mrts.toFixed(1)}) ≠ P_L/P_K (0.8) → not tangent</text>`;
  s+=`<text x="${ap.x+140}" y="${ap.y+22}" text-anchor="middle" font-size="8" fill="#991B1B">Isoquant flatter than isocost → use more K, less L</text>`;
  return'<div class="exam-graph-wrap">'+EG.svg(B,'Labor (L)','Capital (K)',s)+'</div>';
};

// ═══ Inelastic vs Elastic MSB comparison ═══
EGR.inelastic_elastic=function(){
  const W=500,H=320;
  // LEFT panel: Inelastic (steep) MSB
  const B1=EG.box(240,H,{l:45,r:5,t:30,b:45},[0,100],[0,200]);
  const msb1=x=>300-8*x;const mc1=x=>20+1.5*x;const mc1p=x=>60+1.5*x;
  const e1=EG.isect(msb1,mc1,1,99);const ep1=EG.isect(msb1,mc1p,1,99);
  let s1='';
  s1+=`<path d="${EG.path(msb1,0,38,B1)}" fill="none" stroke="#2563EB" stroke-width="2.5"/>`;
  s1+=EG.txt(30,msb1(30),B1,'MSB',{dx:5,fs:9,c:'#2563EB',fw:700});
  s1+=`<path d="${EG.path(mc1,0,99,B1)}" fill="none" stroke="#059669" stroke-width="1.5"/>`;
  s1+=EG.txt(85,mc1(85),B1,'MC*',{dx:3,fs:8,c:'#059669'});
  s1+=`<path d="${EG.path(mc1p,0,99,B1)}" fill="none" stroke="#DC2626" stroke-width="1.5"/>`;
  s1+=EG.txt(85,mc1p(85),B1,"MC'",{dx:3,fs:8,c:'#DC2626'});
  if(e1){s1+=EG.vdash(e1.x,e1.y,B1,'#059669');s1+=EG.txt(e1.x,0,B1,'e*',{dy:12,fs:8,c:'#059669',fw:600,anchor:'middle'})}
  if(ep1){s1+=EG.vdash(ep1.x,ep1.y,B1,'#1B2A4A');s1+=EG.txt(ep1.x,0,B1,"e'",{dy:12,fs:8,c:'#1B2A4A',fw:700,anchor:'middle'})}
  s1+=`<text x="${B1.l+B1.w/2}" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Inelastic MSB → C&amp;T wins</text>`;
  // RIGHT panel: Elastic (flat) MSB
  const B2={l:260,t:30,w:W-260-15,h:H-30-45,xR:[0,100],yR:[0,200],W,H};
  const msb2=x=>130-0.5*x;const mc2=x=>20+1.5*x;const mc2p=x=>60+1.5*x;
  const e2=EG.isect(msb2,mc2,1,99);const ep2=EG.isect(msb2,mc2p,1,99);
  let s2='';
  s2+=`<path d="${EG.path(msb2,0,99,B2)}" fill="none" stroke="#2563EB" stroke-width="2.5"/>`;
  s2+=EG.txt(85,msb2(85),B2,'MSB',{dx:3,fs:9,c:'#2563EB',fw:700});
  s2+=`<path d="${EG.path(mc2,0,99,B2)}" fill="none" stroke="#059669" stroke-width="1.5"/>`;
  s2+=EG.txt(85,mc2(85),B2,'MC*',{dx:3,fs:8,c:'#059669'});
  s2+=`<path d="${EG.path(mc2p,0,99,B2)}" fill="none" stroke="#DC2626" stroke-width="1.5"/>`;
  s2+=EG.txt(85,mc2p(85),B2,"MC'",{dx:3,fs:8,c:'#DC2626'});
  if(e2){s2+=EG.vdash(e2.x,e2.y,B2,'#059669');s2+=EG.txt(e2.x,0,B2,'e*',{dy:12,fs:8,c:'#059669',fw:600,anchor:'middle'})}
  if(ep2){s2+=EG.vdash(ep2.x,ep2.y,B2,'#1B2A4A');s2+=EG.txt(ep2.x,0,B2,"e'",{dy:12,fs:8,c:'#1B2A4A',fw:700,anchor:'middle'})}
  s2+=`<text x="${B2.l+B2.w/2}" y="18" text-anchor="middle" font-size="10" font-weight="700" fill="#DC2626">Elastic MSB → Fee wins</text>`;
  // Combined SVG
  let axes='';
  [B1,B2].forEach(B=>{axes+=`<line x1="${B.l}" y1="${B.t+B.h}" x2="${B.l+B.w}" y2="${B.t+B.h}" stroke="#333" stroke-width="1.2" marker-end="url(#ega)"/><line x1="${B.l}" y1="${B.t+B.h}" x2="${B.l}" y2="${B.t}" stroke="#333" stroke-width="1.2" marker-end="url(#ega)"/>`});
  return`<div class="exam-graph-wrap"><svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:Inter,sans-serif"><defs><marker id="ega" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="6" markerHeight="5" orient="auto"><path d="M1 1L8 4L1 7" fill="none" stroke="#333" stroke-width="1.3"/></marker></defs>${axes}${s1}${s2}</svg></div>`;
};

// ═══ 9. WEEKS — [FILL] {title,subtitle,sections:[{head,num,cards:[{title,content}]}]} ═══
// For exams: use "exam" prefix key, add pts and prompt fields
const WEEKS={
  week1:{title:"Week 1 — Public Sector Economics",subtitle:"Public Economics · Role of Government · Market & Government Failure · Mixed Economy · Indonesia",sections:[
{head:"What Is Public Sector Economics?",num:"1",cards:[
{title:"Definition & Scope",content:'<p>Public Sector Economics studies the <strong>role of government in the allocation of real resources</strong>. It looks at how government affects who gets what, how goods and services are provided, how resources are used, and how policies change welfare. This is about the <em>microeconomic</em> functions of government.</p><p>Two core questions: <strong>How do government policies affect the economy?</strong> and <strong>How should policies be designed to maximize welfare?</strong></p>'},
{title:"Why Government Is Special",content:'<p>Government is not just another economic actor. It can <strong>impose taxes</strong>, has <strong>monopoly power</strong> over some activities, and faces <strong>different incentives</strong> from private firms. A private firm must persuade people to buy; the government can legally require taxes and enforce laws.</p><div class="wk-highlight">💡 Government influence is bigger than expenditure data suggest. Even without spending directly, it changes the economy through <strong>regulation</strong> (minimum wages, antitrust, environmental rules). Government affects the economy through both <strong>money and rules</strong>.</div>'},
]},
{head:"Two Main Roles: Efficiency & Equity",num:"2",cards:[
{title:"Efficiency",content:'<p><strong>Efficiency</strong> means using scarce resources in the best possible way. Markets need basic rules to operate (property rights, contract law), and government may need to address <strong>market failures</strong> where markets do not produce efficient outcomes.</p><p>Markets fail when: ownership is unclear, contracts cannot be enforced, information is unequal, some costs are ignored, one firm dominates, or some goods cannot be sold efficiently through private markets.</p><div class="wk-exam">📝 Efficiency is NOT just "leave the market alone." Sometimes efficiency <em>requires</em> institutions and correction mechanisms.</div>'},
{title:"Equity / Fairness",content:'<p><strong>Equity</strong> is about whether outcomes are socially acceptable and whether the distribution of income, opportunity, and access is considered just. A market may produce efficient outcomes but still create poverty, high inequality, or poor access to basic services.</p><table class="wk-table"><tr><th>Dimension</th><th>Question</th></tr><tr><td>Efficiency</td><td>Are resources being used well?</td></tr><tr><td>Equity</td><td>Who gets the benefits and who bears the costs?</td></tr></table>'},
{title:"The Efficiency–Equity Trade-off",content:'<p>There is often a <strong>trade-off between efficiency and equity</strong>. Improving fairness can sometimes reduce incentives, while pushing pure efficiency can sometimes worsen inequality.</p><ul><li>Heavy redistribution → poor households benefit, but high earners may work less, invest less, or avoid taxes</li><li>No intervention → efficient in a narrow sense, but very unequal outcomes</li></ul><div class="wk-highlight">💡 The real question is not "efficiency or equity?" but rather <strong>how much of each can be achieved, and at what cost?</strong></div>'},
]},
{head:"Market Failure & Government Failure",num:"3",cards:[
{title:"When Markets Fail",content:'<p>Markets may not produce efficient or socially desirable outcomes due to:</p><ul><li><strong>Public goods</strong> — non-rival, non-excludable → free-rider problem → underprovision</li><li><strong>Externalities</strong> — costs/benefits to third parties not reflected in prices</li><li><strong>Asymmetric information</strong> — one side knows more → adverse selection, moral hazard</li><li><strong>Imperfect competition</strong> — monopoly, oligopoly → restricted output, higher prices</li></ul>'},
{title:"When Government Fails",content:'<p>Government intervention is <strong>by no means always beneficial</strong>. Government failure occurs due to:</p><ul><li><strong>Information problems</strong> — may not know true needs, costs, or behavioral responses</li><li><strong>Non-benevolent policymakers</strong> — acting for political gain, favoritism, reelection</li><li><strong>Excessive bureaucracy</strong> — slow, rigid, poorly coordinated, expensive</li></ul><div class="wk-exam">📝 A public sector economist must always ask TWO questions: (1) Is there a market problem? (2) Will government intervention <em>actually</em> improve the outcome?</div>'},
{title:"Keynes\'s Balanced Argument",content:'<p>Market failure justifications: asymmetric information, public goods, externalities, social needs, imperfect markets.</p><p>Government failure risks: limited information, limited control over private market response, limited control over bureaucracy, political constraints.</p><p>Government advantages: regulation, distribution, allocation.</p><div class="wk-highlight">💡 Market failure does NOT automatically mean government will solve the problem well. The right mindset is <strong>comparative</strong>: compare market outcome vs. likely government outcome, then choose the better option.</div>'},
{title:"Balanced Role of Government",content:'<p>The modern conclusion:</p><ul><li>Markets often fail</li><li>Governments often do not succeed in correcting those failures</li><li>Policy should focus on the <strong>most significant market failures</strong></li><li>Government and markets should <strong>work together</strong> to strengthen each other</li></ul><p>Limited government intervention may alleviate, though not fully solve, major problems such as unemployment or poverty, while private enterprise should still play the central role.</p>'},
]},
{head:"Circular Flow in a Mixed Economy",num:"4",cards:[
{title:"The Three Actors",content:'<table class="wk-table"><tr><th>Actor</th><th>Role</th><th>Relation to Government</th></tr><tr><td>Households</td><td>Supply labor, buy goods</td><td>Pay taxes → Receive income support & subsidies</td></tr><tr><td>Firms</td><td>Hire resources, sell output</td><td>Pay taxes → May receive subsidies</td></tr><tr><td>Government</td><td>Collects revenue, provides services</td><td>Redistributes through taxes & spending</td></tr></table><p>Two key markets connect them: <strong>Input market</strong> (labor) and <strong>Output market</strong> (goods & services).</p><div class="wk-exam">📝 When government acts, it changes the flow of money, resources, goods, and services. Every policy has ripple effects across the <em>entire</em> economy.</div>'},
{title:"Mixed vs Socialist Economy",content:'<p>A <strong>mixed economy</strong> is one where both private enterprise and government carry out economic activities (US, Europe, Indonesia, Japan, South Korea, Singapore).</p><p>A <strong>socialist economy</strong> is one where most economic activities are carried out by government (Cuba, North Korea).</p><p>Since 1980, <strong>privatization</strong> has been a trend in Europe, though Europe still tends to have a larger government role than the US. The debate is not <em>whether</em> government should exist, but <strong>how large its role should be</strong>.</p>'},
]},
{head:"Government in Indonesia",num:"5",cards:[
{title:"Three Tiers of Government",content:'<table class="wk-table"><tr><th>Level</th><th>Led By</th><th>Count</th></tr><tr><td>Central</td><td>President</td><td>1</td></tr><tr><td>Provincial</td><td>Governors</td><td>34</td></tr><tr><td>City/District</td><td>Mayors / Bupati</td><td>539</td></tr></table><div class="wk-highlight">💡 <strong>Big Bang Decentralization (2001):</strong> Indonesia shifted from a highly centralized and authoritarian system to a more decentralized and democratic one. Democratization since 1999, decentralization since 2001, direct elections since 2004.</div>'},
{title:"Central Government Authorities",content:'<p>The central government retains only <strong>six authorities</strong>:</p><ol><li>Defense</li><li>Security</li><li>Judicial system</li><li>Foreign diplomatic relations</li><li>Monetary and fiscal policy</li><li>Religion affairs</li></ol><p>Everything else is more decentralized. Public economics in Indonesia must ask <em>which level</em> of government is responsible.</p>'},
]},
{head:"Thinking Like a Public Sector Economist",num:"6",cards:[
{title:"Four Core Questions",content:'<table class="wk-table"><tr><th>#</th><th>Question</th><th>Focus</th></tr><tr><td>1</td><td>What is to be produced?</td><td>Public goods vs private goods</td></tr><tr><td>2</td><td>How is it to be produced?</td><td>Public sector vs private sector</td></tr><tr><td>3</td><td>For whom is it produced?</td><td>Distribution, targeting, equity</td></tr><tr><td>4</td><td>How are decisions made?</td><td>Collective decisions, politics, institutions</td></tr></table><div class="wk-exam">📝 This is a ready-made answer structure. For <em>any</em> policy question, organize your answer around these four questions.</div>'},
{title:"Four Steps in Analyzing the Public Sector",content:'<ol><li><strong>Know</strong> what activities the public sector engages in and how they are organized</li><li><strong>Understand</strong> and anticipate the full consequences of those activities</li><li><strong>Evaluate</strong> alternative policies</li><li><strong>Interpret</strong> the political process</li></ol><p>This is basically the method for the whole course. Whenever you face a policy question: What is government doing? What effects will that create? Is there a better alternative? What political forces shape the policy?</p>'},
]},
]},
  week2:{title:"Week 2 — Welfare Economics & Pareto Efficiency",subtitle:"Welfare Economics · Pareto Efficiency · Edgeworth Box · PPC · Welfare Theorems · Market Failures",sections:[
{head:"Welfare Economics: The Big Picture",num:"1",cards:[
{title:"What Welfare Economics Studies",content:'<p>Welfare economics studies the <strong>social desirability of different economic outcomes</strong>. It distinguishes situations where markets work well from those where markets fail. The fundamental normative questions: what <em>should</em> be produced, how, for whom, and who decides?</p><div class="wk-highlight">💡 Week 2 is not asking whether the economy produces a lot. It asks whether the economy is organized in a way that is <strong>socially good</strong>. This is normative economics.</div>'},
{title:"From Week 1 to Week 2",content:'<p>Week 1 introduced efficiency and equity as concepts. Week 2 gives you <strong>formal tools</strong> to analyze them: Pareto efficiency, MRS, MRT, Edgeworth Box, PPC, and the welfare theorems. "Efficiency" is no longer vague — it becomes something you can <em>test</em>.</p>'},
]},
{head:"Pareto Efficiency",num:"2",cards:[
{title:"Definition",content:'<p><strong>Pareto efficient:</strong> No one can be made better off without making someone else worse off.</p><p><strong>Pareto improvement:</strong> A change making at least one person better off without making anyone worse off.</p><div class="wk-exam">📝 Pareto efficient ≠ fair. An allocation can be Pareto efficient even if one person has almost everything. It only tests whether win-win changes remain, NOT whether distribution is just.</div>'},
{title:"Three Conditions for Full Pareto Efficiency",content:'<table class="wk-table"><tr><th>Condition</th><th>Meaning</th><th>Formal</th></tr><tr><td>Exchange efficiency</td><td>Goods go to who values them most</td><td>MRS<sub>Adam</sub> = MRS<sub>Eve</sub></td></tr><tr><td>Production efficiency</td><td>On the production frontier</td><td>Cannot increase one output without reducing another</td></tr><tr><td>Product mix efficiency</td><td>Producing what consumers want</td><td>MRT = MRS for all consumers</td></tr></table>'},
]},
{head:"Edgeworth Box & Exchange Efficiency",num:"3",cards:[
{title:"The Edgeworth Box",content:'<p>A rectangle showing all possible allocations of two goods between two people. Adam\'s origin = bottom-left, Eve\'s origin = top-right. Width = total apples, Height = total fig leaves. Every point = one allocation.</p><p>Add <strong>indifference curves</strong> for both: where curves <em>cross</em> → gains from trade exist (inefficient). Where curves are <em>tangent</em> → no more gains (efficient).</p>'},
{title:"Contract Curve",content:'<p>The <strong>contract curve</strong> connects all tangency points where MRS<sub>Adam</sub> = MRS<sub>Eve</sub>. Every point on it is exchange efficient. It does NOT tell which point is fairest.</p><div class="wk-highlight">💡 Off the contract curve: people value goods differently → trade can help both. On the contract curve: no mutually beneficial trade remains.</div>'},
{title:"MRS and Exchange Efficiency",content:'<div class="wk-formula">MRS = |slope of indifference curve|</div><p>MRS shows how much of one good a person will give up for another while staying at the same utility.</p><div class="wk-formula">Exchange efficiency: MRS<sub>af</sub><sup>Adam</sup> = MRS<sub>af</sub><sup>Eve</sup></div><p>If Adam gives up 3 fig leaves for 1 apple but Eve gives up only 1, they value apples differently → trade makes both better off. Once MRS equalizes, gains from trade are exhausted.</p>'},
]},
{head:"Production Efficiency & MRT",num:"4",cards:[
{title:"Production Possibilities Curve (PPC)",content:'<table class="wk-table"><tr><th>Position</th><th>Meaning</th></tr><tr><td>Inside PPC</td><td>Feasible but inefficient — wasted resources</td></tr><tr><td>On PPC</td><td>Feasible and production efficient</td></tr><tr><td>Outside PPC</td><td>Unattainable with current resources</td></tr></table><div class="wk-exam">📝 The PPC is bowed outward because of <strong>increasing opportunity cost</strong> — as you produce more of one good, each additional unit costs more of the other.</div>'},
{title:"Marginal Rate of Transformation",content:'<div class="wk-formula">MRT<sub>af</sub> = |slope of PPC| = MC<sub>a</sub> / MC<sub>f</sub></div><p>MRT tells how many fig leaves must be sacrificed to produce one more apple. It is the <strong>production-side</strong> trade-off.</p>'},
{title:"Product Mix Efficiency",content:'<div class="wk-formula">MRT<sub>af</sub> = MRS<sub>af</sub><sup>Adam</sup> = MRS<sub>af</sub><sup>Eve</sup></div><p>The economy must produce the <strong>right mix</strong> of goods. If MRT ≠ MRS, society is producing the wrong bundle — the production trade-off does not match consumer preferences.</p><div class="wk-highlight">💡 Exchange eff = goods to the right people. Production eff = on the frontier. Product mix eff = at the right POINT on the frontier.</div>'},
]},
{head:"Welfare Theorems",num:"5",cards:[
{title:"First Welfare Theorem",content:'<p><strong>Every competitive economy is Pareto efficient.</strong></p><div class="wk-formula">MRS<sub>Adam</sub> = P<sub>a</sub>/P<sub>f</sub> = MRS<sub>Eve</sub> = MRT → all three efficiencies satisfied</div><p>Prices coordinate millions of decentralized decisions into an efficient outcome. This is the formal version of Adam Smith\'s <strong>invisible hand</strong>.</p><div class="wk-exam">📝 CRITICAL: this theorem requires <strong>strong assumptions</strong>: private ownership, many buyers/sellers, no price influence, full information, resource mobility. When these fail → market failure.</div>'},
{title:"Second Welfare Theorem",content:'<p><strong>Every Pareto efficient allocation can be reached via competitive markets with appropriate initial redistribution.</strong></p><p>This allows <strong>separation of efficiency and distribution</strong>: redistribute endowments first (equity), then let markets operate (efficiency).</p><div class="wk-highlight">💡 The great hope: you don\'t have to choose between markets and fairness. But the catch: real-world redistribution (taxes) always distorts incentives, so clean separation rarely works perfectly.</div>'},
]},
{head:"Social Welfare & Market Failure",num:"6",cards:[
{title:"Utility Possibility Curve & Social Welfare",content:'<p>The <strong>UPC</strong> maps the contract curve into utility space: maximum U<sub>Eve</sub> for each level of U<sub>Adam</sub>. Points on it are Pareto efficient.</p><div class="wk-formula">W = F(U<sub>Adam</sub>, U<sub>Eve</sub>)</div><p>The <strong>social welfare function</strong> ranks utility combinations. Social optimum = highest social indifference curve tangent to UPC.</p><div class="wk-exam">📝 Why do we need SWF? Because Pareto efficiency gives MANY efficient points. Social choice still needs to decide which one society prefers.</div>'},
{title:"Market Failures: Why the Invisible Hand Stumbles",content:'<p>Six conditions causing market failure:</p><ol><li><strong>Failure of competition</strong> — monopoly, market power</li><li><strong>Public goods</strong> — free-rider problem</li><li><strong>Externalities</strong> — unpriced spillovers</li><li><strong>Information failures</strong> — asymmetric info, adverse selection, moral hazard</li><li><strong>Incomplete markets</strong> — missing insurance/capital markets</li><li><strong>Macro disequilibrium</strong> — unemployment, inflation</li></ol>'},
{title:"Market Imperfections vs Market Failure",content:'<p><strong>Market failure</strong> = outcome-level problem (market doesn\'t reach Pareto efficiency).</p><p><strong>Market imperfections</strong> = concrete frictions that often <em>cause</em> failure:</p><ul><li><strong>Information-related:</strong> asymmetric info, adverse selection, moral hazard, principal-agent problems</li><li><strong>Capital market:</strong> credit rationing, unequal access to finance</li><li><strong>Market structure:</strong> monopoly, barriers to entry, natural monopoly</li></ul><div class="wk-exam">📝 Property rights, transaction costs, and common property resources are institutional prerequisites for markets. Without them, markets may not even arise.</div>'},
]},
]},
  week3:{title:"Week 3 — Efficiency & Equity Trade-offs",subtitle:"Diminishing MU · UPC Trade-offs · Utilitarian & Rawlsian SWF · WTP · Consumer Surplus · DWL · Policy Evaluation",sections:[
{head:"Efficiency vs Equity: The Core Trade-off",num:"1",cards:[
{title:"Why Efficiency Alone Is Not Enough",content:'<p>A free market without failure may be Pareto efficient, but it can still produce an <strong>undesirable distribution of income</strong>. Pareto efficiency only says no win-win moves remain — it says nothing about whether the outcome is fair, stable, or morally acceptable.</p><div class="wk-highlight">💡 Week 3 asks: <strong>If efficiency and fairness conflict, how should society choose?</strong></div>'},
{title:"The Redistribution Dilemma",content:'<ul><li>More redistribution → more equality → but may weaken incentives (work, save, invest)</li><li>Less redistribution → more efficiency → but outcomes may be very unequal</li></ul><div class="wk-exam">📝 The core trade-off: redistribution can help the poor (high MU), but taxes and transfers may reduce total output through disincentive effects.</div>'},
]},
{head:"Diminishing Marginal Utility & Why Redistribution Helps",num:"2",cards:[
{title:"Utility Function & Marginal Utility",content:'<p><strong>Utility function:</strong> relationship between consumption and welfare. More is better, but at a decreasing rate.</p><p><strong>Marginal utility (MU):</strong> extra utility from one more unit = slope of the utility function. <strong>Diminishing MU:</strong> each extra unit adds less than the previous one.</p><div class="wk-formula">MU = slope of utility function at a point</div>'},
{title:"Why Diminishing MU Supports Redistribution",content:'<p>If the poor have <strong>high MU</strong> (each unit matters a lot) and the rich have <strong>low MU</strong> (each unit barely matters), then transferring from rich to poor can <strong>raise total social welfare</strong>.</p><table class="wk-table"><tr><th>Person</th><th>MU</th><th>Effect of Transfer</th></tr><tr><td>Rich (many oranges)</td><td>Low</td><td>Small utility loss</td></tr><tr><td>Poor (few oranges)</td><td>High</td><td>Large utility gain</td></tr><tr><td colspan="3"><b>Net: social welfare rises</b></td></tr></table><div class="wk-exam">📝 But gains from redistribution DIMINISH as the poor get richer. Early transfers create big gains; later transfers create smaller gains.</div>'},
]},
{head:"UPC: Costless vs Costly Transfers",num:"3",cards:[
{title:"Trade-off Points A, B, C on the UPC",content:'<p>From the slides (Crusoe & Friday):</p><ul><li><strong>Point A:</strong> Crusoe rich, Friday poor → large gains from redistributing to Friday</li><li><strong>A → B:</strong> Friday gains MORE than Crusoe loses (diminishing MU)</li><li><strong>B → C:</strong> Friday still gains more, but the gain is SMALLER than A→B</li></ul><div class="wk-highlight">💡 Redistribution has diminishing social returns. Early transfers create large gains; later transfers create smaller gains as Friday becomes less deprived.</div>'},
{title:"Costly Transfers & the Shape of the UPC",content:'<p>In reality, redistribution is <strong>not costless</strong>. Taxes and subsidies create <strong>disincentive effects</strong>:</p><ul><li>Rich may work less when taxed heavily</li><li>Poor may work less when heavily subsidized</li><li>Administrative costs of the transfer system</li></ul><p>The UPC with costly transfers lies <strong>inside</strong> the costless-transfer UPC. The gap = efficiency cost of redistribution.</p><div class="wk-exam">📝 This graph is one of the clearest pictures of the efficiency-equity trade-off. The more distortionary the tax system, the more the costly UPC shrinks inward.</div>'},
]},
{head:"Social Welfare Functions: Utilitarian & Rawlsian",num:"4",cards:[
{title:"The Social Welfare Function (SWF)",content:'<p>Because most policy choices involve trade-offs, we need a criterion: the <strong>Social Welfare Function</strong>.</p><div class="wk-formula">W = F(U₁, U₂, ..., Uₙ)</div><p>The SWF maps utility combinations into a social welfare level. Social indifference curves show combinations yielding the same welfare. The SWF summarizes society\'s attitudes toward distribution.</p>'},
{title:"Utilitarianism",content:'<div class="wk-formula">W = U₁ + U₂ (maximize total utility)</div><ul><li>Every person\'s utility weighted <strong>equally</strong></li><li>Willing to sacrifice Crusoe\'s utility if Friday gains at least as much</li><li>Supports redistribution when diminishing MU makes transfer increase the sum</li><li>SIC = <strong>straight line</strong> (slope −1)</li></ul>'},
{title:"Rawlsianism",content:'<div class="wk-formula">W = min(U₁, ..., Uₙ) (maximize the worst-off)</div><ul><li>Social welfare depends <strong>ONLY</strong> on the worst-off person</li><li>If the poor are worse off → increasing their welfare increases social welfare. <strong>No trade-off.</strong></li><li>Gains to the better-off are irrelevant unless they help the worst-off</li><li>SIC = <strong>L-shaped</strong> (right angle)</li></ul>'},
{title:"Criticisms of Both",content:'<ul><li><strong>Interpersonal comparisons:</strong> we cannot directly measure utility or compare changes across people. If we take an orange from Crusoe and give it to Friday, how do we compare the gain vs the loss?</li><li><strong>"Whence SWF?":</strong> individuals have preferences, but society does not literally have a mind. Whose preferences does the SWF represent?</li></ul><div class="wk-exam">📝 Economists may be best limited to <strong>describing policy consequences</strong> and identifying gainers and losers, leaving the ethical judgment to democratic processes.</div>'},
]},
{head:"Measuring Benefits: WTP, Consumer Surplus & DWL",num:"5",cards:[
{title:"Willingness to Pay (WTP)",content:'<p>The standard way to measure benefits. WTP rises with quantity because each additional unit gives utility. The extra utility of an additional unit = the additional amount the consumer is willing to pay = <strong>marginal utility</strong>.</p><div class="wk-formula">WTP ≠ has to pay (actual payment)</div><p>WTP is the <em>maximum</em> amount a person would pay. Actual payment is what they really pay in the market.</p>'},
{title:"Compensated vs Ordinary Demand",content:'<table class="wk-table"><tr><th>Type</th><th>What It Holds Constant</th><th>Effects Captured</th></tr><tr><td>Compensated demand</td><td>Utility (keeps welfare constant)</td><td>Substitution effect only</td></tr><tr><td>Ordinary demand</td><td>Income (nominal)</td><td>Substitution + Income effects</td></tr></table><div class="wk-exam">📝 MU curve = Compensated demand curve. For welfare analysis, compensated demand is more appropriate because it keeps utility comparable.</div>'},
{title:"Consumer Surplus",content:'<div class="wk-formula">CS = Willingness to pay − Actual payment</div><p>The area under the demand curve, above the price, up to the quantity consumed. For government projects: if CS > cost of the project, it is worth undertaking.</p><div class="wk-formula">Net efficiency effect = Total WTP − Total cost</div>'},
{title:"Deadweight Loss (Excess Burden)",content:'<p>A tax distorts behavior and destroys welfare beyond the revenue it collects.</p><div class="wk-formula">DWL = WTP to eliminate tax − Revenue raised</div><p><strong>Example:</strong> WTP to eliminate cigarette tax = $100. Revenue = $80.</p><div class="wk-formula">DWL = $100 − $80 = $20 (excess burden)</div><div class="wk-exam">📝 DWL grows with the SQUARE of the tax rate. Doubling the tax MORE than doubles the welfare loss.</div>'},
]},
{head:"Social Choice in Practice",num:"6",cards:[
{title:"Three Approaches to Social Choice",content:'<table class="wk-table"><tr><th>Approach</th><th>Method</th><th>Weakness</th></tr><tr><td>Compensation principle</td><td>If aggregate WTP > cost, undertake project</td><td>Ignores who gains and who loses</td></tr><tr><td>Trade-offs across measures</td><td>Weigh efficiency gains vs inequality increases</td><td>Summary measures can miss detail</td></tr><tr><td>Weighted net benefit</td><td>Weight gains/losses by income group (poor weighted more)</td><td>Choice of weights is subjective</td></tr></table>'},
{title:"Practical Policy Evaluation Framework",content:'<ol><li><strong>Identify</strong> Pareto improvements (is everyone better off?)</li><li>If not, <strong>identify gainers and losers</strong> by major groups (income, region, age)</li><li>Check whether <strong>aggregate net benefits are positive</strong></li><li>Examine <strong>efficiency-inequality trade-offs</strong></li><li>Calculate <strong>weighted net benefits</strong> using SWF — weight poor more heavily</li></ol><div class="wk-exam">📝 This 5-step framework is an excellent exam answer structure for ANY policy evaluation question in Week 3.</div>'},
{title:"Inequality Measures",content:'<ul><li><strong>Poverty index:</strong> fraction of population below a critical income threshold</li><li><strong>Poverty gap:</strong> how far below the threshold poor individuals are — how much income would bring them all to the line</li></ul><p>Poverty is more appropriately viewed as <strong>relative</strong> (compared to the rest of society) and as an extreme case of inequality.</p>'},
]},
]},
  week4:{title:"Week 4 — Public Goods & Other Goods",subtitle:"Excludability · Rivalry · 2×2 Matrix · Free-Rider · Tragedy of Commons · Horizontal vs Vertical Summation · Provision vs Production",sections:[
{head:"Classifying Goods: Excludability & Rivalry",num:"1",cards:[
{title:"The Two Key Characteristics",content:'<table class="wk-table"><tr><th>Characteristic</th><th>Question</th></tr><tr><td><strong>Excludability</strong></td><td>Can non-payers be kept out?</td></tr><tr><td><strong>Rivalry</strong></td><td>Does one person\'s use reduce what\'s left?</td></tr></table><div class="wk-highlight">💡 The right way to provide a good depends on its economic characteristics, not on whether it "sounds public" or "sounds private."</div>'},
{title:"The Four Types of Goods",content:'<table class="wk-table"><tr><th></th><th>Excludable</th><th>Non-excludable</th></tr><tr><td><strong>Rival</strong></td><td>Private goods<br><em>food, cars, parking</em></td><td>Common-pool resources<br><em>fish, timber, coal</em></td></tr><tr><td><strong>Non-rival</strong></td><td>Club goods<br><em>cinema, satellite TV</em></td><td>Pure public goods<br><em>defense, air, free TV</em></td></tr></table><div class="wk-exam">📝 Classification is NOT absolute. A road is nonrival when empty but rival when congested. Technology can change excludability.</div>'},
]},
{head:"Public Goods & Market Failure",num:"2",cards:[
{title:"Free-Rider Problem",content:'<p>If a good is <strong>nonexcludable</strong>, even non-payers can enjoy it. Everyone waits for others to pay → good is <strong>underfunded or not provided</strong>.</p><div class="wk-formula">Individually rational → collectively irrational</div><p>Theoretical solution: <strong>perfect price discrimination</strong> (charge each person their WTP). Practically impossible.</p>'},
{title:"Tragedy of the Commons",content:'<p>For <strong>common-pool resources</strong> (nonexcludable + rival): each person has incentive to extract as much as possible before others do → <strong>overuse</strong>.</p><table class="wk-table"><tr><th>Problem</th><th>Type</th><th>Symptom</th></tr><tr><td>Public good</td><td>Nonrival + nonexcludable</td><td>Underprovision (nobody pays)</td></tr><tr><td>Commons</td><td>Rival + nonexcludable</td><td>Overuse (everybody takes)</td></tr></table>'},
]},
{head:"Provision vs Production",num:"3",cards:[
{title:"Public Provision ≠ Public Production",content:'<p><strong>Provision</strong> = who pays/ensures availability. <strong>Production</strong> = who actually makes/delivers it.</p><ul><li>Education = publicly <em>provided</em> private good (gov pays, private schools may deliver)</li><li>Garbage collection = privately <em>produced</em> public good (gov contracts to private firms)</li></ul><div class="wk-exam">📝 The policy question is not just "public or private?" but: Who finances? Who produces? Who receives?</div>'},
{title:"Three Methods of Rationing",content:'<table class="wk-table"><tr><th>Method</th><th>Advantage</th><th>Disadvantage</th></tr><tr><td>User charges</td><td>Beneficiaries bear costs</td><td>Underconsumption + transaction costs</td></tr><tr><td>Uniform provision</td><td>Saves transaction costs</td><td>Mismatch: some get too little, others too much</td></tr><tr><td>Queuing</td><td>Not based on wealth alone</td><td>Wastes time; favors those with time</td></tr></table>'},
]},
{head:"Efficient Provision: Private vs Public Goods",num:"4",cards:[
{title:"Private Goods: Horizontal Summation",content:'<div class="wk-formula">Q<sub>market</sub>(P) = Q<sub>Adam</sub>(P) + Q<sub>Eve</sub>(P)</div><p>At a given <strong>price</strong>, add <strong>quantities</strong> demanded → market demand curve.</p><div class="wk-formula">MRS<sub>Adam</sub> = MRS<sub>Eve</sub> = MRT (Pareto efficiency)</div><p>Same price, different quantities. P = MC in competitive equilibrium.</p>'},
{title:"Public Goods: Vertical Summation",content:'<div class="wk-formula">P<sub>group</sub>(Q) = P<sub>Adam</sub>(Q) + P<sub>Eve</sub>(Q)</div><p>At a given <strong>quantity</strong>, add <strong>willingness to pay</strong> → social demand curve.</p><div class="wk-formula">MRS<sub>Adam</sub> + MRS<sub>Eve</sub> = MRT (Pareto efficiency)</div><p>Same quantity, different prices. SUM of MRS = MRT.</p><div class="wk-exam">📝 THE key contrast:<br>Private: same price → add quantities (horizontal)<br>Public: same quantity → add WTP (vertical)</div>'},
]},
{head:"Privatization & Public-Private Mix",num:"5",cards:[
{title:"The Privatization Debate",content:'<p><strong>Privatization:</strong> turning government services over to the private sector. The right public-private mix depends on:</p><ul><li>Relative wage and materials costs</li><li>Administrative costs</li><li>Diversity of tastes (private allows customization)</li><li>Distributional concerns</li><li>Incomplete contracts (private firms may cut corners)</li><li>Market environment (weak competition → privatization may not help)</li></ul><div class="wk-highlight">💡 The debate is not ideological — it\'s institutional and empirical. Compare both sides case by case.</div>'},
]},
]},
  week5:{title:"Week 5&6 — Externalities",subtitle:"Negative & Positive Externalities · Coase Theorem · Pigouvian Tax/Subsidy · Emissions Fees · Cap-and-Trade · Cost-Effectiveness · Command-and-Control",sections:[
{head:"What Are Externalities?",num:"1",cards:[
{title:"Definition & Nature",content:'<p>An <strong>externality</strong> is an activity by one person or firm that affects the welfare of another <strong>outside the market mechanism</strong> — the effect exists but is not reflected in market prices.</p><ul><li><strong>Negative:</strong> factory pollution raises health costs not in paper price</li><li><strong>Positive:</strong> R&D creates knowledge others can use for free</li><li>Created by both consumers and firms</li><li><strong>Reciprocal:</strong> restricting the polluter also imposes costs on them</li><li>Public goods = special case of externality</li></ul><div class="wk-exam">📝 Key: privately owned resources tend toward MSC=MSB. Commonly owned resources (air, oceans) → price=0 → overuse → MSC>MSB.</div>'},
]},
{head:"Negative Externalities: Market Overproduction",num:"2",cards:[
{title:"The Core Graph: MSC = MPC + MD",content:'<div class="wk-formula">MSC = MPC + MD</div><p>Firms choose Q₁ where MB = MPC (private optimum). Society wants Q* where MB = MSC. Since MSC > MPC, <strong>actual output Q₁ > efficient output Q*</strong> → overproduction.</p><div class="wk-highlight">💡 The firm ignores marginal damage. Society does not. Therefore market output is excessive. The shaded triangle between Q* and Q₁ = deadweight loss from the externality.</div>'},
{title:"Empirical Challenges",content:'<p>Measuring pollution damage is hard because:</p><ul><li>Cannot run randomized experiments on pollution exposure</li><li>Must separate pollution effects from correlated factors (jobs, income, housing)</li><li>Lifetime exposure is hard to measure</li><li>Housing values mix air quality effects with employment opportunities</li></ul><div class="wk-exam">📝 Do not assume pollution research is easy. The real issue is separating the pollution effect from everything else correlated with it.</div>'},
]},
{head:"Private Responses: Coase Theorem",num:"3",cards:[
{title:"Coase Theorem & Bargaining",content:'<p>If <strong>transaction costs are low</strong> and <strong>property rights are clearly assigned</strong>, private bargaining can achieve an efficient solution.</p><ul><li>If Bart (polluter) has rights → Lisa pays Bart to reduce output</li><li>If Lisa has rights → Bart pays Lisa for permission to pollute</li><li>Either way: bargaining moves toward Q* (efficient level)</li></ul><div class="wk-exam">📝 Coase does NOT say government is never needed. It says private solutions work under STRONG conditions that often fail in practice (high transaction costs, unclear property rights, many affected parties).</div>'},
{title:"Other Private Solutions",content:'<ul><li><strong>Mergers:</strong> polluter and victim become one firm → externality internalized</li><li><strong>Social conventions/morals:</strong> norms like "littering is wrong" change behavior without prices</li></ul>'},
]},
{head:"Public Responses: Taxes & Subsidies",num:"4",cards:[
{title:"Pigouvian Tax",content:'<div class="wk-formula">t* = MD at Q* (marginal damage at efficient output)</div><p>Shifts firm\'s cost from MPC up to MPC+cd. Firm now faces true social cost → produces Q*.</p><ul><li>Two effects: <strong>corrects externality</strong> AND <strong>raises revenue</strong></li><li>Tax revenue = cd × Q* = area of rectangle ijcd</li></ul><div class="wk-exam">📝 If tax is set too low → output stays above Q*. If too high → output falls below Q*. Getting it right requires knowing MD accurately.</div>'},
{title:"Pigouvian Subsidy",content:'<p>Pay polluter NOT to produce beyond Q*. At Q₁: MPC+cd > MB → not sensible to produce. Subsidy induces Bart to produce just Q*.</p><div class="wk-highlight">💡 Works in theory, but <strong>controversial</strong>: taxpayers pay the polluter to stop harming them. Taxes are usually seen as more appropriate for negative externalities.</div>'},
]},
{head:"Emissions Fees, Cost-Effectiveness & Cap-and-Trade",num:"5",cards:[
{title:"Emissions Fees",content:'<div class="wk-formula">f* = MSB of pollution reduction at e*</div><p>Tax on each unit of <strong>pollution emitted</strong> (not output). Firm reduces until MC of abatement = fee. Better than output tax: targets pollution directly, gives firms flexibility to find cheapest way to cut emissions.</p>'},
{title:"Why Uniform Reduction Is NOT Cost Effective",content:'<p>If Bart and Homer each emit 90 and must reduce total by 100:</p><table class="wk-table"><tr><th></th><th>Uniform (50 each)</th><th>Optimal</th></tr><tr><td>Bart (low MC)</td><td>Reduces 50</td><td>Reduces 75</td></tr><tr><td>Homer (high MC)</td><td>Reduces 50</td><td>Reduces 25</td></tr><tr><td>Total cost</td><td>Higher</td><td>Lower ✓</td></tr></table><div class="wk-formula">Cost-effectiveness: MC_B = MC_H (equalize marginal abatement costs)</div>'},
{title:"Cap-and-Trade",content:'<p>Government sets pollution cap (e.g., 80 permits) and allows trading.</p><ul><li>Bart (low MC) reduces more → sells permits</li><li>Homer (high MC) reduces less → buys permits</li><li>Trading continues until MC_B = MC_H = permit price</li></ul><div class="wk-exam">📝 Same cost-effectiveness as emissions fee, but fixes QUANTITY (cap) not PRICE (fee). Initial permit allocation affects distribution, not efficiency.</div>'},
{title:"Fee vs Cap-and-Trade Under Uncertainty",content:'<table class="wk-table"><tr><th>Condition</th><th>Better Instrument</th><th>Why</th></tr><tr><td>Inelastic MSB</td><td>Cap-and-trade</td><td>Exact quantity matters — fix it</td></tr><tr><td>Elastic MSB</td><td>Emissions fee</td><td>Cost flexibility matters — fix price</td></tr></table><div class="wk-highlight">💡 Inelastic MSB = steep damage near threshold → must hit quantity target. Elastic MSB = gradual damage → cost control more important.</div>'},
]},
{head:"Command-and-Control & Positive Externalities",num:"6",cards:[
{title:"Command-and-Control",content:'<p>Requires a given pollution reduction with <strong>limited flexibility</strong>. Two forms: <strong>technology requirements</strong> and <strong>performance requirements</strong>.</p><p>Usually economists prefer incentive-based approaches (fees, cap-and-trade). But C&C can be better for <strong>hot spots</strong> where emissions are geographically concentrated and dangerous.</p>'},
{title:"Positive Externalities & R&D",content:'<div class="wk-formula">MSB = MPB + MEB</div><p>If firms consider only MPB → they invest too little. Efficient: MC = MSB.</p><div class="wk-formula">Pigouvian subsidy: s* = MEB at R*</div><p>Subsidy bridges the gap between private and social benefit. Mirror of negative case: neg ext → tax, pos ext → subsidy.</p><div class="wk-exam">📝 Not every beneficial activity needs a subsidy. Only when the market genuinely fails to provide enough because of an external benefit that is not priced.</div>'},
{title:"Income Distribution Effects",content:'<p>Externality policies affect distribution too:</p><ul><li>Who benefits? (low-income communities near pollution?)</li><li>Who bears costs? (workers in affected firms? consumers paying higher prices?)</li></ul><p>Policy analysis must evaluate BOTH efficiency AND distribution.</p>'},
]},
]},
  week7:{title:"Week 7 — Public Choice & Political Economy",subtitle:"Public Choice · Lindahl Equilibrium · Rational Ignorance · Majority Voting · Voting Paradox · Median Voter · Arrow's Theorem",sections:[
{head:"Public Choice & Collective Decision Making",num:"1",cards:[
{title:"From Markets to Politics",content:'<p>Markets: people reveal preferences by buying. Politics: people reveal preferences through <strong>voting, campaigns, and institutions</strong>. This is much messier — an election cannot summarize information the way a price can.</p><div class="wk-highlight">💡 Week 7 asks: if government should provide public goods, <strong>how do citizens actually decide what government should do?</strong></div>'},
{title:"Public Choice & Political Economy",content:'<p><strong>Public choice:</strong> decision making through political interaction according to pre-established rules.</p><p><strong>Political economy:</strong> applying economic principles (incentives, trade-offs, optimization) to political decision making.</p><p>Key question: <em>How well do political procedures translate citizens\' preferences into collective action?</em></p>'},
{title:"The Preference Revelation Problem",content:'<p>In markets, paying for a good reveals how much you value it. In politics, a vote reveals very little:</p><ul><li>A voter may support a candidate for tax policy, personality, OR party identity</li><li>Votes don\'t show <em>how much</em> a voter values a specific public good</li><li>Strategic misrepresentation is possible</li></ul><div class="wk-exam">📝 This is why democratic choices can be noisy, incomplete, or strategically distorted.</div>'},
]},
{head:"Political Equilibrium & Tax Shares",num:"2",cards:[
{title:"Political Equilibrium",content:'<p>An agreement on: (1) the <strong>level of public goods</strong>, (2) given the <strong>collective choice rule</strong>, and (3) the <strong>distribution of tax shares</strong>.</p><p>Political equilibrium is hard because people differ in:</p><table class="wk-table"><tr><th>Dimension</th><th>Why It Matters</th></tr><tr><td>Tastes</td><td>Different people want different amounts of public goods</td></tr><tr><td>Income</td><td>Affects how burdens and benefits are felt</td></tr><tr><td>Tax shares</td><td>Higher tax share → want less spending</td></tr></table>'},
{title:"Tax Shares = Tax Price",content:'<p>Each citizen faces a <strong>personalized price</strong> for one more unit of public good. A voter\'s preferred quantity depends on:</p><div class="wk-formula">MB<sub>i</sub>(G) = t<sub>i</sub> (marginal benefit = my tax share)</div><p>High tax share → prefer less spending. Low tax share → prefer more spending. Tax shares play the same role as prices in consumer theory.</p>'},
]},
{head:"Lindahl Equilibrium",num:"3",cards:[
{title:"The Public-Good Analog of Competitive Equilibrium",content:'<p>In Lindahl equilibrium:</p><ul><li>Each person pays a <strong>personalized tax price</strong></li><li>Everyone consumes the <strong>same quantity</strong> G*</li><li>Each person\'s tax share = their marginal benefit: MB<sub>i</sub> = t<sub>i</sub></li><li><strong>Sum of tax shares covers the cost:</strong> Σt<sub>i</sub> = MC(G*)</li></ul><div class="wk-formula">Σt<sub>i</sub> = MC(G) → Pareto efficient if preferences revealed truthfully</div><div class="wk-exam">📝 Private goods: same price, different quantities. Public goods: same quantity, different prices. This is the key contrast.</div>'},
{title:"Why Lindahl Fails in Practice",content:'<p>The <strong>free-rider problem</strong>: people may understate their valuation to reduce their tax share.</p><p>If B lies about MB → apparent ΣMB falls → G\' < G* → underprovision.</p><div class="wk-highlight">💡 Lindahl equilibrium is theoretically elegant but practically hard because of the preference revelation problem.</div>'},
]},
{head:"Rational Ignorance & Determinants of Equilibrium",num:"4",cards:[
{title:"Rational Ignorance",content:'<div class="wk-formula">MC<sub>info</sub> > MB<sub>info</sub> → voter stays uninformed</div><p>One voter has a tiny effect on the outcome. So the private return to becoming informed is very small. Rational voters may:</p><ul><li>Not study issues deeply</li><li>Rely on slogans instead of policy detail</li><li>Sometimes not even vote</li></ul><div class="wk-exam">📝 Not irrational — just responding to incentives. The information cost isn\'t worth it from a private perspective.</div>'},
{title:"Determinants of Political Equilibrium",content:'<ol><li><strong>Public choice rule</strong> (majority, unanimity, agenda control)</li><li><strong>Cost of public goods</strong> (higher cost → less demanded)</li><li><strong>Information</strong> (less info → worse decisions)</li><li><strong>Tax share distribution</strong> (who pays affects who supports)</li><li><strong>Benefit distribution</strong> (who gains determines political support)</li></ol>'},
]},
{head:"Majority Voting, Paradox & Cycling",num:"5",cards:[
{title:"The Voting Paradox",content:'<p>3 voters, 3 options. Each voter has consistent preferences. But pairwise majority voting produces a <strong>CYCLE</strong>:</p><table class="wk-table"><tr><th>Vote</th><th>Winner</th></tr><tr><td>I vs II</td><td>II wins (A,C vote for II)</td></tr><tr><td>II vs III</td><td>III wins (A,B vote for III)</td></tr><tr><td>I vs III</td><td>I wins (B,C vote for I)</td></tr></table><p><strong>II ≻ I, III ≻ II, I ≻ III</strong> → No stable winner!</p><div class="wk-exam">📝 Individual rationality does NOT guarantee collective rationality. The winner depends on <strong>agenda order</strong>.</div>'},
{title:"Arrow\'s Impossibility Theorem",content:'<p>No voting rule can always convert individual preferences into a consistent, fair collective ranking while satisfying all of these:</p><ul><li>No dictator</li><li>Respect unanimous preferences</li><li>Consistency (transitivity)</li><li>Independence from irrelevant alternatives</li></ul><div class="wk-highlight">💡 This doesn\'t mean democracy is useless. It means every aggregation rule has <strong>limitations and trade-offs</strong>.</div>'},
]},
{head:"Median Voter Model",num:"6",cards:[
{title:"The Median Voter Theorem",content:'<p>Under <strong>single-peaked preferences</strong> on a one-dimensional issue, the <strong>median voter\'s ideal point</strong> becomes the majority-stable equilibrium.</p><p>Any proposal away from the median gets defeated by a coalition including the median voter. Only the median voter gets exactly what they want. In a <strong>two-party system</strong>, both parties converge toward the median.</p>'},
{title:"Single-Peaked vs Multi-Peaked Preferences",content:'<table class="wk-table"><tr><th>Type</th><th>Shape</th><th>Consequence</th></tr><tr><td>Single-peaked</td><td>One hill (one optimum)</td><td>Majority voting STABLE → median voter wins</td></tr><tr><td>Multi-peaked</td><td>Multiple hills</td><td>Majority voting UNSTABLE → cycles possible</td></tr></table><div class="wk-exam">📝 Single-peaked preferences are the KEY condition for the median voter theorem. Multi-peaked → voting paradox becomes likely.</div>'},
]},
]},

// ═══ EXAM: UTS March 2024 ═══
exam1:{title:"📝 UTS PSE — March 2024 (ECEU605100)",subtitle:"Mid-Term Exam · Public Sector Economics · FEB UI · Friday 22 March 2024 · 2.5 hours · Closed Book",sections:[
// ───── QUESTION I(a) ─────
{head:"I(a) — Pareto Country: Exchange & Production Efficiency",num:"I(a)",pts:"15 pts",
prompt:"Assume that Andi lives in Pareto country where the marginal rate of substitution (MRS) of food for clothing is 2 (two), and the price ratio between food and clothing is 1 (one). In this country, Andi also possesses labor and capital, with marginal products of labor (MPL) is 2 (two) and marginal products of capital (MPK) is 5 (five). The price of labor is 8 (eight), while the price of capital is 10 (ten). If in this Pareto country Andi can convert 2 (two) units of food into 1 (one) unit of clothing, or vice versa, what do you think will happen to the availability of food in society? Will there be equilibrium in the exchange of goods (exchange efficiency)? Will there also be equilibrium in production efficiency? Explain your answer and complement it with the appropriate graphs.",
cards:[
{title:"Step 1 — Given Data",content:`<table class="wk-table"><tr><th>Variable</th><th>Value</th></tr>
<tr><td>MRS<sub>F/C</sub></td><td>2</td></tr>
<tr><td>P<sub>F</sub> / P<sub>C</sub></td><td>1</td></tr>
<tr><td>MPL</td><td>2</td></tr>
<tr><td>MPK</td><td>5</td></tr>
<tr><td>P<sub>L</sub></td><td>8</td></tr>
<tr><td>P<sub>K</sub></td><td>10</td></tr>
<tr><td>Technology</td><td>2 food → 1 clothing → MRT<sub>F/C</sub> = 2</td></tr></table>`},
{title:"Step 2 — Availability of Food",content:`<p>Since MRS<sub>F/C</sub> = 2 but P<sub>F</sub>/P<sub>C</sub> = 1, Andi values food <strong>more highly</strong> than the market price suggests. Food is underpriced relative to marginal valuation. This creates <strong>excess demand for food</strong> — food becomes relatively scarce in exchange.</p>
<div class="wk-highlight">💡 Interesting nuance: MRT<sub>F/C</sub> = 2 = MRS<sub>F/C</sub>, so the product-mix is actually aligned. The problem is the <em>price ratio</em> (1 ≠ 2), not the production mix.</div>`},
{title:"Step 3 — Exchange Efficiency: NO ❌",content:`<p>Exchange efficiency requires MRS = P<sub>F</sub>/P<sub>C</sub>.</p>
<div class="wk-formula">MRS<sub>F/C</sub> = 2 ≠ P<sub>F</sub>/P<sub>C</sub> = 1 → <strong>No exchange efficiency</strong></div>
<p>Since Andi's MRS exceeds the price ratio, he is willing to give up more clothing for food than the market requires. He wants to trade toward more food. The current price system is <strong>not</strong> an exchange-efficient equilibrium.</p>`},
{title:"Step 4 — Production Efficiency: NO ❌",content:`<p>Production efficiency requires MP<sub>L</sub>/P<sub>L</sub> = MP<sub>K</sub>/P<sub>K</sub> (equal output per dollar).</p>
<div class="wk-formula">MP<sub>L</sub>/P<sub>L</sub> = 2/8 = 0.25 &nbsp;≠&nbsp; MP<sub>K</sub>/P<sub>K</sub> = 5/10 = 0.50</div>
<p>Capital gives <strong>more output per dollar</strong> than labor. The firm should use more capital and less labor.</p>
<p>Equivalently: MRTS<sub>LK</sub> = MP<sub>L</sub>/MP<sub>K</sub> = 2/5 = 0.4 ≠ P<sub>L</sub>/P<sub>K</sub> = 8/10 = 0.8. The isoquant-isocost tangency condition fails.</p>`},
{title:"Graph 1 — Exchange Inefficiency (MRS vs Price Ratio)",content:`<div data-eg="exchange_eff"></div><div class="exam-interp">📐 IC (slope=2) steeper than BL (slope=1) → MRS > price ratio → no exchange efficiency.</div>`},
{title:"Graph 2 — Product Mix (MRS = MRT, but price wrong)",content:`<div data-eg="ppf_mix"></div>
<div class="exam-interp">📐 At B, the IC is <strong>tangent</strong> to the PPF (both slope −2), confirming MRS = MRT. The IC stays inside the PPF on both sides of B (more curvature). The price line (red, slope −1) is flatter — P<sub>F</sub>/P<sub>C</sub> = 1 ≠ 2.</div>`},
{title:"Graph 3 — Production Inefficiency (Isoquant-Isocost)",content:`<div data-eg="isoquant_isocost"></div><div class="exam-interp">📐 At C, isoquant tangent (MRTS) is flatter than isocost (P_L/P_K). Not cost-minimizing. Move to E: more K, less L.</div>`},
{title:"Final Answer Summary",content:`<div class="wk-exam">📝 <strong>Food availability:</strong> Food becomes relatively scarce — underpriced → excess demand.<br>
<strong>Exchange efficiency:</strong> No — MRS<sub>F/C</sub> = 2 ≠ P<sub>F</sub>/P<sub>C</sub> = 1.<br>
<strong>Production efficiency:</strong> No — MP<sub>L</sub>/P<sub>L</sub> = 0.25 ≠ MP<sub>K</sub>/P<sub>K</sub> = 0.50.<br>
<strong>Nuance:</strong> MRT = MRS = 2 → product-mix is OK, but exchange and factor-allocation conditions fail.</div>`},
]},
// ───── QUESTION I(b) ─────
{head:"I(b) — Doctors & Price Discrimination",num:"I(b)",pts:"10 pts",
prompt:"Doctors often charge patients different amounts depending on their judgment concerning the patients' ability to pay. What implications does this have for exchange efficiency?",
cards:[
{title:"Answer",content:`<p>This is <strong>price discrimination</strong>. Exchange efficiency requires MRS between medical care and other goods to be equalized across all patients via a common price. If patients face <em>different prices</em> for the same service, each patient stops consuming where their own MRS equals their own price — so MRS is <strong>not equalized</strong> across patients.</p>
<div class="wk-formula">MRS<sub>patient A</sub> ≠ MRS<sub>patient B</sub> → exchange efficiency fails</div>
<p>However, ability-to-pay pricing may <strong>improve equity and access</strong>, especially for poorer patients who would otherwise be excluded. This is a classic <strong>efficiency-equity trade-off</strong>.</p>
<div class="wk-exam">📝 <strong>Bottom line:</strong> Strict exchange efficiency is NOT satisfied. But equity/access may improve for low-income patients.</div>`},
]},
// ───── QUESTION II(a) ─────
{head:"II(a) — Social Choices: UPC & SIC",num:"II(a)",pts:"10 pts",
prompt:"How do economists think systematically about how to make social choices? Explain your answer using the utility possibilities curves and social indifference curves. Draw the relevant graphs.",
cards:[
{title:"Framework",content:`<p>Economists separate the problem into:</p>
<ol><li><strong>Feasible outcomes</strong> — shown by the Utility Possibilities Curve (UPC)</li>
<li><strong>Social evaluation</strong> — shown by Social Indifference Curves (SICs)</li></ol>
<p>The UPC shows all feasible utility combinations. Points inside = inefficient, on = Pareto efficient, outside = unattainable. Moving along the UPC is a distributional trade-off.</p>
<p>SICs show combinations of individual utilities giving equal social welfare. Higher SICs = higher welfare. The social optimum is where the <strong>highest attainable SIC is tangent to the UPC</strong>.</p>`},
{title:"Graph — UPC + Social Indifference Curves",content:`<div data-eg="upc_sic"></div><div class="exam-interp">📐 Point B = social optimum (tangency of highest SIC with UPC). A is efficient but lower welfare. Inside UPC = inefficient.</div>`},
{title:"Exam Statement",content:`<div class="wk-exam">📝 "Economists first identify the feasible utility frontier (UPC), then use social indifference curves to evaluate which Pareto-efficient point society prefers. The social optimum is the tangency point between the highest attainable SIC and the UPC."</div>`},
]},
// ───── QUESTION II(b) ─────
{head:"II(b) — Policy Evaluation: Pareto, Compensation, Rawls",num:"II(b)",pts:"15 pts",
prompt:"For each of the following policy changes, explain why the change is or is not likely to be a Pareto improvement. In each case, state who the losers (if any) are likely to be. Which of these changes might be approved under the compensation principle? Which might be approved under a Rawlsian social welfare function?<br><br>(i) Building a waste treatment system, financed by an increase in the local property tax rate. (5 pts)<br>(ii) Building an Early Childhood Education Center, financed by CSR fund; the city acquires the land by asking the initial owner to move with compensation. (5 pts)<br>(iii) Increasing medical care facilities for diabetes, financed out of general revenues. (5 pts)",
cards:[
{title:"(i) Waste Treatment + Property Tax",content:`<table class="wk-table"><tr><th>Criterion</th><th>Assessment</th></tr>
<tr><td>Pareto improvement?</td><td><strong>No</strong> — property owners paying higher tax may be worse off</td></tr>
<tr><td>Losers</td><td>Property owners, landlords, possibly tenants if tax shifts to rent</td></tr>
<tr><td>Compensation principle?</td><td><strong>Possibly yes</strong> — if total health/environmental benefits > total tax burden</td></tr>
<tr><td>Rawlsian SWF?</td><td><strong>Possibly yes</strong> — if poor households gain most from cleaner environment and tax falls on richer property owners</td></tr></table>`},
{title:"(ii) Early Childhood Education + CSR + Land Compensation",content:`<table class="wk-table"><tr><th>Criterion</th><th>Assessment</th></tr>
<tr><td>Pareto improvement?</td><td><strong>Closest to yes</strong> — landowner is explicitly compensated. But compensation may be incomplete (subjective attachment, disruption)</td></tr>
<tr><td>Losers</td><td>Landowner (if compensation incomplete), shareholders bearing CSR costs</td></tr>
<tr><td>Compensation principle?</td><td><strong>Very likely yes</strong> — education center generates large community benefits</td></tr>
<tr><td>Rawlsian SWF?</td><td><strong>Very likely yes</strong> — early childhood education benefits disadvantaged children most</td></tr></table>`},
{title:"(iii) Diabetes Facilities + General Revenue",content:`<table class="wk-table"><tr><th>Criterion</th><th>Assessment</th></tr>
<tr><td>Pareto improvement?</td><td><strong>No</strong> — some taxpayers pay more, not all benefit equally</td></tr>
<tr><td>Losers</td><td>Taxpayers, users of other public services (crowding out)</td></tr>
<tr><td>Compensation principle?</td><td><strong>Possibly yes</strong> — if health gains + productivity + reduced long-run costs > tax burden</td></tr>
<tr><td>Rawlsian SWF?</td><td><strong>Likely yes</strong> — especially if diabetes disproportionately harms vulnerable populations</td></tr></table>`},
{title:"Summary",content:`<div class="wk-exam">📝 <strong>None</strong> of the three is automatically a Pareto improvement. Policy (ii) is closest because the landowner is explicitly compensated. <strong>All three</strong> could pass the compensation principle if total benefits > costs. Policies (ii) and (iii) are especially plausible under Rawlsian SWF.</div>`},
]},
// ───── QUESTION III(a) ─────
{head:"III(a) — Bridge: Tax, Toll, & Solutions",num:"III(a)",pts:"10 pts",
prompt:"City X needs a new bridge. Cost = $1,200. WTP: Upin $130, Ipin $150, Mei Mei $200, Mail $500, Susanti $700. The government proposes a tax of $1,200/5 = $240 per person through voting. Explain why it is not feasible. Then the Mayor proposes a toll fee of $240 per person. Will this work? Are there other solutions?",
cards:[
{title:"Step 1 — Total WTP vs Cost",content:`<div class="wk-formula">Total WTP = 130 + 150 + 200 + 500 + 700 = 1,680 > Cost = 1,200</div>
<p>The bridge is <strong>socially efficient to build</strong> (net benefit = $480).</p>`},
{title:"Step 2 — Equal Tax of $240 Fails",content:`<table class="wk-table"><tr><th>Resident</th><th>WTP</th><th>Tax</th><th>Net</th><th>Vote</th></tr>
<tr><td>Upin</td><td>$130</td><td>$240</td><td>−$110</td><td style="color:#DC2626;font-weight:700">Against</td></tr>
<tr><td>Ipin</td><td>$150</td><td>$240</td><td>−$90</td><td style="color:#DC2626;font-weight:700">Against</td></tr>
<tr><td>Mei Mei</td><td>$200</td><td>$240</td><td>−$40</td><td style="color:#DC2626;font-weight:700">Against</td></tr>
<tr><td>Mail</td><td>$500</td><td>$240</td><td>+$260</td><td style="color:#059669;font-weight:700">For</td></tr>
<tr><td>Susanti</td><td>$700</td><td>$240</td><td>+$460</td><td style="color:#059669;font-weight:700">For</td></tr></table>
<p><strong>3 against, 2 for → majority votes NO.</strong> The project fails under this tax scheme even though it is socially efficient.</p>`},
{title:"Step 3 — Toll of $240 Fails",content:`<p>Under a $240 toll, only Mail and Susanti would use the bridge (WTP > $240). Revenue = 2 × $240 = $480, far below the $1,200 cost. Also creates <strong>inefficient exclusion</strong> — three people with positive WTP are excluded from a nonrival good.</p>`},
{title:"Step 4 — Better Solutions",content:`<p><strong>Solution 1: Lindahl-style benefit-based cost sharing.</strong> Share proportional to WTP:</p>
<table class="wk-table"><tr><th>Resident</th><th>WTP</th><th>Share (×0.714)</th><th>Surplus</th></tr>
<tr><td>Upin</td><td>$130</td><td>$92.86</td><td>+$37.14</td></tr>
<tr><td>Ipin</td><td>$150</td><td>$107.14</td><td>+$42.86</td></tr>
<tr><td>Mei Mei</td><td>$200</td><td>$142.86</td><td>+$57.14</td></tr>
<tr><td>Mail</td><td>$500</td><td>$357.14</td><td>+$142.86</td></tr>
<tr><td>Susanti</td><td>$700</td><td>$500.00</td><td>+$200.00</td></tr></table>
<p>Total = $1,200 ✓ — everyone pays ≤ WTP → everyone is better off.</p>
<p><strong>Solution 2:</strong> Broad tax financing (general revenue / municipal bonds) + small maintenance toll.</p>
<p><strong>Solution 3:</strong> Special assessment on nearby high-benefit landowners/businesses.</p>`},
]},
// ───── QUESTION III(b) ─────
{head:"III(b) — Public Goods Theory",num:"III(b)",pts:"15 pts",
prompt:"(i) Should public goods be provided for free, and why? (4 pts)<br>(ii) What is the justification if it is argued that basic education is a public good? (3 pts)<br>(iii) What are the differences and challenges in providing non-conventional public goods such as biodiversity compared to conventional public goods like streetlights? (8 pts)",
cards:[
{title:"(i) Free Provision of Public Goods",content:`<p><strong>Pure public goods should be free at the point of use</strong> because they are nonrival — the marginal cost of an additional user is approximately zero. Charging a positive price causes <strong>inefficient underconsumption</strong>.</p>
<p>However, "free at point of use" ≠ "costless." They must be <strong>financed through taxes</strong> or collective payment. For congestible or impure public goods, user charges may be appropriate.</p>`},
{title:"(ii) Basic Education as Public Good",content:`<p>Basic education is technically a <strong>publicly provided private good</strong>, not a pure public good (it is rival and excludable). The justification comes from:</p>
<ul><li><strong>Large positive externalities</strong> — productivity, civic capacity, public health, social cohesion</li>
<li><strong>Equity of opportunity</strong> — universal access regardless of income</li>
<li><strong>Credit market imperfections</strong> — poor families cannot finance efficient education levels</li>
<li><strong>Merit-good reasoning</strong> — society believes education should be consumed even if some families underinvest</li></ul>`},
{title:"(iii) Biodiversity vs Streetlights",content:`<table class="wk-table"><tr><th>Dimension</th><th>Streetlights</th><th>Biodiversity</th></tr>
<tr><td>Benefits</td><td>Local, visible, immediate</td><td>Diffuse, uncertain, long-term, global</td></tr>
<tr><td>Measurement</td><td>Easy (# lamps, lux)</td><td>Hard (species richness, ecosystem resilience)</td></tr>
<tr><td>Beneficiaries</td><td>Local residents</td><td>Local → global + future generations</td></tr>
<tr><td>Free-riding</td><td>Moderate</td><td>Severe (cross-border, intergenerational)</td></tr>
<tr><td>Property rights</td><td>Clear (local gov)</td><td>Weak/mixed (forests, oceans, migration)</td></tr>
<tr><td>Time horizon</td><td>Short, reversible</td><td>Long, often irreversible</td></tr>
<tr><td>Monitoring</td><td>Easy</td><td>Hard (poaching, habitat loss, cross-border)</td></tr>
<tr><td>Political will</td><td>Strong (visible payoff)</td><td>Weak (diffuse, long-run, low salience)</td></tr></table>`},
]},
// ───── QUESTION IV(a) ─────
{head:"IV(a) — Cap-and-Trade vs Emission Fee: Higher Costs",num:"IV(a)",pts:"10 pts",
prompt:"Air quality in Tangerang city becomes worse as pollution from manufacturing companies increase. The government considers: (i) cap and trade, and (ii) emission fee. If the cost of reducing pollutants is higher than expected, explain the efficiency implications of using cap-and-trade versus an emission fee.",
cards:[
{title:"Setup",content:`<p>Government initially set policy at the intersection of expected marginal cost MC* and marginal social benefit MSB, giving optimal reduction e* and fee f*.</p>
<p>Now true MC shifts <strong>up</strong> to MC′. The new true optimum is e′ < e* (less reduction is optimal when costs are higher).</p>`},
{title:"Under Cap-and-Trade",content:`<p>Quantity is fixed at e*. But the true optimum is e′ < e*. So cap-and-trade forces <strong>too much pollution reduction</strong> — the permit price spikes but quantity does not adjust.</p>`},
{title:"Under Emission Fee",content:`<p>Price stays at f*. Firms choose where MC′ = f*, giving reduction e<sub>f</sub>. Because MC′ is higher, firms reduce less: e<sub>f</sub> < e′. So the fee causes <strong>too little pollution reduction</strong>.</p>`},
{title:"Graph — Prices vs Quantities Under Uncertainty",content:`<div data-eg="cap_vs_fee"></div>
<div class="exam-interp">📐 When true MC is higher than expected: cap-and-trade overcontrols (stuck at e*), emission fee undercontrols (firms choose e<sub>f</sub> < e′). The true optimum e′ falls between them.</div>`},
]},
// ───── QUESTION IV(b) ─────
{head:"IV(b) — Too Much or Too Little Reduction?",num:"IV(b)",pts:"5 pts",
prompt:"For both cap-and-trade and an emission fee, is there too little or too much emissions reduction?",
cards:[
{title:"Answer",content:`<div class="wk-formula"><strong>Cap-and-trade:</strong> TOO MUCH emissions reduction (fixed at e* > e′)<br>
<strong>Emission fee:</strong> TOO LITTLE emissions reduction (firms choose e<sub>f</sub> < e′)</div>
<p>Cap-and-trade locks in the original quantity target regardless of cost changes. The emission fee fixes the price, so quantity adjusts — but in the wrong direction when costs rise.</p>`},
]},
// ───── QUESTION IV(c) ─────
{head:"IV(c) — Inelastic vs Elastic MSB",num:"IV(c)",pts:"10 pts",
prompt:"Which approach is more efficient when marginal social benefits are inelastic and when they are elastic?",
cards:[
{title:"Case 1: Inelastic (Steep) MSB → Cap-and-Trade Wins",content:`<p>When MSB is <strong>steep</strong>, getting the quantity wrong is very costly. A small deviation from the correct reduction level causes large welfare losses. Therefore, <strong>fixing the quantity</strong> (cap-and-trade) is preferred.</p>
<div class="wk-highlight">💡 Example: threshold pollutants where exceeding a concentration causes severe health damage — quantity control is critical.</div>`},
{title:"Case 2: Elastic (Flat) MSB → Emission Fee Wins",content:`<p>When MSB is <strong>flat</strong>, quantity errors are less costly. The welfare cost of being a bit off on the reduction level is small. In that case, the <strong>price flexibility</strong> of a fee is more valuable because it avoids cost explosions.</p>
<div class="wk-highlight">💡 Example: gradual climate damage — exact annual reduction is less critical than keeping abatement costs under control.</div>`},
{title:"Graph — Inelastic vs Elastic MSB",content:`<div data-eg="inelastic_elastic"></div><div class="exam-interp">📐 Steep MSB → quantity errors costly → C&amp;T wins. Flat MSB → quantity errors cheap → Fee wins. (Weitzman 1974)</div>`},
{title:"Final Summary",content:`<div class="wk-exam">📝 <strong>Inelastic MSB:</strong> Cap-and-trade is more efficient (controls quantity tightly).<br>
<strong>Elastic MSB:</strong> Emission fee is more efficient (allows cost flexibility).<br>
This is the Weitzman (1974) "prices vs quantities" result.</div>`},
]},
]},
// ═══ EXAM: UTS March 2023 (Bahasa) ═══
exam2:{title:"📝 UTS ESP — Maret 2023 (ECEU605100)",subtitle:"Ujian Tengah Semester · Ekonomi Sektor Publik · FEB UI · Jumat 31 Maret 2023 · 2.5 jam · Closed Book",sections:[
// ───── SOAL I(a) ─────
{head:"I(a) — Edgeworth Box: Thor & Loki",num:"I(a)",pts:"15 poin",
prompt:"Di Pulau Kuantum terdapat 1.000 kg emas dan 5.000 hektar tanah, ditempati oleh Thor dan Loki. Awalnya Thor memiliki 800 kg emas dan 800 hektar tanah, Loki memiliki 200 kg emas dan 4.200 hektar tanah. MRS emas terhadap tanah: Thor = 1, Loki = ½.<br><br>(i) Gambarkan diagram Edgeworth Box untuk kondisi awal (5 poin).<br>(ii) Jelaskan dan buktikan apakah alokasi tersebut sudah efisien? (5 poin)<br>(iii) Adakah alokasi pertukaran lain yang saling menguntungkan? Tunjukkan pada diagram yang sama. (5 poin)",
cards:[
{title:"Data",content:`<table class="wk-table"><tr><th>Variabel</th><th>Thor</th><th>Loki</th><th>Total</th></tr>
<tr><td>Emas (kg)</td><td>800</td><td>200</td><td>1.000</td></tr>
<tr><td>Tanah (ha)</td><td>800</td><td>4.200</td><td>5.000</td></tr>
<tr><td>MRS<sub>emas/tanah</sub></td><td>1</td><td>½</td><td>—</td></tr></table>`},
{title:"(ii) Apakah Alokasi Sudah Efisien? TIDAK ❌",content:`<p>Exchange efficiency mensyaratkan MRS<sub>Thor</sub> = MRS<sub>Loki</sub>.</p>
<div class="wk-formula">MRS<sub>Thor</sub> = 1 ≠ MRS<sub>Loki</sub> = ½ → <strong>Belum Pareto efisien</strong></div>
<p>Karena MRS berbeda, masih ada <em>gains from trade</em>. Thor menghargai emas relatif lebih tinggi (rela tukar 1 ha tanah per 1 kg emas), sedangkan Loki hanya rela tukar 0.5 ha per 1 kg emas. Maka pertukaran saling menguntungkan: <strong>Loki beri emas ke Thor, Thor beri tanah ke Loki</strong>, pada rasio tukar antara 0.5 dan 1.</p>`},
{title:"(iii) Contoh Pertukaran Saling Menguntungkan ✅",content:`<p><strong>Contoh:</strong> Loki beri 100 kg emas ke Thor, Thor beri 75 ha tanah ke Loki.</p>
<div class="wk-formula">Rasio tukar = 75/100 = 0.75 ha per kg emas</div>
<p>Rasio 0.75 berada di antara MRS Loki (0.5) dan MRS Thor (1):</p>
<ul><li><strong>Thor untung:</strong> rela bayar sampai 1 ha/kg, hanya bayar 0.75 → surplus</li>
<li><strong>Loki untung:</strong> minimal minta 0.5 ha/kg, dapat 0.75 → surplus</li></ul>
<p>Ini adalah <strong>Pareto improvement</strong>. Titik baru berada di dalam <em>lens-shaped</em> area perbaikan Pareto, lebih dekat ke contract curve.</p>`},

{head:"II(a) — Cash vs In-Kind Transfer",num:"II(a)",pts:"10 poin",

{title:"Prinsip Utama",content:`<p><strong>Cash transfer weakly dominates in-kind transfer.</strong> Artinya cash selalu minimal sama baiknya, dan sering lebih baik, daripada bantuan barang dengan nilai moneter yang sama.</p>
<p>Alasan: cash memberi <strong>kebebasan penuh</strong> untuk memilih kombinasi konsumsi yang paling disukai. Bantuan barang membatasi pilihan.</p>`},
