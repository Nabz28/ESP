{head:"II(b) — Utilitarian, Rawlsian, Pareto Improvement",num:"II(b)",pts:"15 poin",
prompt:"Di suatu negara ada 3 penduduk: Pepi, Bone, dan Max. Welfare awal t₀ dan 3 pilihan kebijakan:<br><br><table class='wk-table'><tr><th></th><th>Pepi</th><th>Bone</th><th>Max</th></tr><tr><td>t₀</td><td>1.000</td><td>500</td><td>150</td></tr><tr><td>t₁</td><td>900</td><td>600</td><td>400</td></tr><tr><td>t₂</td><td>1.100</td><td>500</td><td>150</td></tr><tr><td>t₃</td><td>700</td><td>500</td><td>200</td></tr></table><br>(i) Utilitarian → kebijakan mana? (5 poin)<br>(ii) Rawlsian → kebijakan mana? (5 poin)<br>(iii) Pareto improvement? (5 poin)",
cards:[
{title:"(i) Utilitarian → Pilih t₁",content:`<p>Utilitarian memaksimumkan total welfare: W = ΣU<sub>i</sub></p>
<table class="wk-table"><tr><th>Kondisi</th><th>Pepi</th><th>Bone</th><th>Max</th><th>Total</th></tr>
<tr><td>t₀</td><td>1.000</td><td>500</td><td>150</td><td><strong>1.650</strong></td></tr>
<tr><td style="background:#ECFDF5"><strong>t₁</strong></td><td>900</td><td>600</td><td>400</td><td style="color:#059669"><strong>1.900 ★</strong></td></tr>
<tr><td>t₂</td><td>1.100</td><td>500</td><td>150</td><td>1.750</td></tr>
<tr><td>t₃</td><td>700</td><td>500</td><td>200</td><td>1.400</td></tr></table>`},
{title:"(ii) Rawlsian → Pilih t₁",content:`<p>Rawlsian memaksimumkan welfare individu terburuk: W = min(U₁, U₂, U₃)</p>
<table class="wk-table"><tr><th>Kondisi</th><th>Min</th></tr>
<tr><td>t₀</td><td>150</td></tr>
<tr><td style="background:#ECFDF5"><strong>t₁</strong></td><td style="color:#059669"><strong>400 ★</strong></td></tr>
<tr><td>t₂</td><td>150</td></tr>
<tr><td>t₃</td><td>200</td></tr></table>
<p>Baik Utilitarian maupun Rawlsian memilih <strong>t₁</strong>.</p>`},
{title:"(iii) Pareto Improvement → Hanya t₂",content:`<p>Pareto improvement: minimal 1 orang lebih baik, tidak ada yang lebih buruk dibanding t₀.</p>
<table class="wk-table"><tr><th>Kondisi</th><th>Pepi</th><th>Bone</th><th>Max</th><th>Pareto?</th></tr>
<tr><td>t₁</td><td style="color:#DC2626">900 ↓</td><td style="color:#059669">600 ↑</td><td style="color:#059669">400 ↑</td><td style="color:#DC2626"><strong>TIDAK</strong> (Pepi turun)</td></tr>
<tr><td style="background:#ECFDF5">t₂</td><td style="color:#059669">1.100 ↑</td><td>500 =</td><td>150 =</td><td style="color:#059669"><strong>YA ✅</strong></td></tr>
<tr><td>t₃</td><td style="color:#DC2626">700 ↓</td><td>500 =</td><td style="color:#059669">200 ↑</td><td style="color:#DC2626"><strong>TIDAK</strong> (Pepi turun)</td></tr></table>
<div class="wk-exam">📝 Hanya <strong>t₂</strong> yang merupakan Pareto improvement dari t₀. Menariknya, t₁ (dipilih Utilitarian dan Rawlsian) <em>bukan</em> Pareto improvement — ini menunjukkan bahwa Pareto criterion lebih ketat dalam hal "no losers."</div>`},
]},

{head:"III — Efficiency Condition for Pure Public Goods",num:"III",pts:"25 poin",
prompt:"EFFICIENCY CONDITION FOR PURE PUBLIC GOODS:<br>• <em>Efficient production requires that the sum of the marginal rates of substitution equal the marginal rate of transformation.</em> (13 poin)<br>• <em>Efficient production occurs at the intersection of the collective demand curve, formed by vertically adding the demand curves for each individual, with the supply curve.</em> (12 poin)<br><br>Jelaskan pemahaman Anda dan gunakan gambar yang sesuai!",
cards:[
{title:"Pernyataan 1: ΣMRS = MRT",content:`<p>Untuk <strong>pure public goods</strong>, semua orang mengonsumsi kuantitas yang sama. Yang berbeda adalah berapa besar <em>willingness to pay</em> masing-masing individu.</p>
<p>Manfaat sosial marginal dari 1 unit tambahan public good = <strong>jumlah manfaat marginal semua individu</strong>:</p>
<div class="wk-formula">MRS₁ + MRS₂ + ... + MRSₙ = MRT</div>
<p>Ini adalah <strong>Samuelson condition</strong>. Bedakan dengan private goods (MRS₁ = MRS₂ = MRT).</p>`},
{title:"Pernyataan 2: Vertical Summation",content:`<p>Karena semua orang konsumsi kuantitas sama, aggregate demand = jumlahkan <strong>willingness to pay</strong> pada setiap kuantitas yang sama:</p>
<table class="wk-table"><tr><th>Tipe Barang</th><th>Summation</th><th>Logic</th></tr>
<tr><td>Private goods</td><td>Horizontal (quantity)</td><td>Harga sama, kuantitas berbeda</td></tr>
<tr><td>Public goods</td><td><strong>Vertical (price/WTP)</strong></td><td>Kuantitas sama, WTP berbeda</td></tr></table>`},
{title:"Grafik — Vertical Summation & Efficient Provision",content:`<div data-eg="vert_sum"></div><div class="exam-interp">📐 D<sub>A</sub> dan D<sub>B</sub> dijumlahkan <strong>vertikal</strong> (WTP pada Q yang sama) → ΣD. Output efisien Q* di mana ΣD memotong supply/MC. Di Q*, ΣMRS = MRT (Samuelson condition).</div>`},
]},

{head:"IV(a) — Alokasi Pasar Efisien",num:"IV(a)",pts:"4 poin",

<p>Pada Q = 225: MB = 1000 − 2(225) = 550, MC = 100 + 2(225) = 550. ✓</p>`},

{head:"IV(b) — Grafik & Net Benefit",num:"IV(b)",pts:"3 poin",
prompt:"Gambarkan alokasi pasar yang efisien dan jelaskan net benefitnya.",
cards:[
{title:"Net Benefit Calculation",content:`<div class="wk-formula">TB = ∫₀²²⁵ (1000−2Q) dQ = 1000(225) − 225² = 225.000 − 50.625 = 174.375<br>
TC = ∫₀²²⁵ (100+2Q) dQ = 100(225) + 225² = 22.500 + 50.625 = 73.125<br>
<strong>Net Benefit = 174.375 − 73.125 = 101.250</strong></div>`},
{title:"Grafik — Alokasi Pasar Efisien",content:`<div data-eg="exam2_mkt"></div>`},
]},
// ───── SOAL IV(c) ─────
{head:"IV(c) — Externality & DWL",num:"IV(c)",pts:"10 poin",
prompt:"Linda menggunakan pestisida berbahaya. Kerugian external: MD = 300 + 5Q. Hitung DWL yang terjadi.",
cards:[
{title:"Step 1 — MSC",content:`<div class="wk-formula">MSC = MC + MD = (100+2Q) + (300+5Q) = <strong>400 + 7Q</strong></div>`},
{title:"Step 2 — Output Sosial Optimal",content:`<div class="wk-formula">MB = MSC<br>1000 − 2Q = 400 + 7Q<br>600 = 9Q<br><strong>Q* = 66.67</strong></div>`},
{title:"Step 3 — DWL",content:`<p>DWL = area segitiga antara MSC dan MB dari Q* sampai Q<sub>m</sub>:</p>
<div class="wk-formula">MSC(225) = 400 + 7(225) = 1.975<br>MB(225) = 550<br>Tinggi = 1.975 − 550 = 1.425<br>Basis = 225 − 66.67 = 158.33<br><br><strong>DWL = ½ × 158.33 × 1.425 = 112.812,5</strong></div>`},
{title:"Grafik — DWL dari Negative Externality",content:`<div data-eg="exam2_dwl"></div><div class="exam-interp">📐 Pasar menghasilkan Q<sub>m</sub> = 225 (MB=MC), tapi sosial optimal Q* ≈ 67 (MB=MSC). DWL = segitiga antara MSC dan MB dari Q* ke Q<sub>m</sub>.</div>`},
]},
// ───── SOAL IV(d) ─────
{head:"IV(d) — Saran Ekonom: Pigouvian Tax",num:"IV(d)",pts:"8 poin",
prompt:"Jika Anda seorang ekonom, saran apa yang akan diberikan untuk menyelesaikan masalah ini?",
cards:[
{title:"Solusi: Pigouvian Tax",content:`<p>Kenakan <strong>Pigouvian tax</strong> sebesar marginal damage pada output optimal:</p>
<div class="wk-formula">t* = MD(Q*) = 300 + 5(66.67) = 300 + 333.33 = <strong>633,33 per unit</strong></div>
<p>Dengan pajak ini, biaya privat efektif menjadi:</p>
<div class="wk-formula">MC + t* = (100 + 2Q) + 633.33 = 733.33 + 2Q<br>Set = MB: 1000 − 2Q = 733.33 + 2Q → Q = 66.67 ✓</div>
<p>Pajak berhasil menurunkan output ke tingkat sosial efisien.</p>`},
{title:"Alternatif Lain",content:`<ul><li><strong>Emission fee langsung</strong> pada kandungan kimia berbahaya (jika bisa diukur)</li>
<li><strong>Command-and-control regulation</strong>: batas maksimum kandungan kimia, standar teknologi ramah lingkungan</li>
<li><strong>Cap-and-trade</strong> jika banyak produsen terlibat</li></ul>
<div class="wk-exam">📝 Untuk ujian, jawaban paling textbook: <strong>Pigouvian tax = 633,33 per unit</strong>. Ini menginternalisasi marginal external damage dan mengembalikan output ke Q* = 66,67.</div>`},
{title:"Grafik — Pigouvian Tax Correction",content:`<div data-eg="exam2_pig"></div>`},
]},
]},
};

// ═══ 13-14. FORMULAS — [FILL] {name,eq(LaTeX),vars:[[sym,def]],interp,example} ═══
const WEEK_FORMULAS={week1:[
{name:'Government Expenditure Share of GDP',eq:'\\text{Gov Share} = \\frac{\\text{Government Expenditure}}{\\text{GDP}} \\times 100\\%',vars:[['\\text{Gov Expenditure}','Total government spending on goods, services, transfers, subsidies, defense, etc.'],['\\text{GDP}','Gross Domestic Product — total output of the economy']],interp:'Shows how large government spending is relative to the entire economy. Higher value = government plays a larger direct fiscal role. Used to compare the size of the public sector across countries. A high ratio does NOT prove efficiency — it only shows size.',example:'If Gov Spending = $800B and GDP = $2,000B: Share = (800/2000)×100% = 40%. This country has a relatively large public sector.'},
{name:'Net Tax Burden on Households',eq:'\\text{Net Burden}_{HH} = \\text{Taxes paid} - \\text{Transfers received}',vars:[['\\text{Taxes paid}','All taxes, fees, and charges paid by the household to government'],['\\text{Transfers received}','Income support, subsidies, social security, welfare, disability payments from government']],interp:'Determines whether a household is a net payer or net receiver in the public system. Low-income households with large transfers may have negative net burden (net beneficiaries). High-income households paying high taxes are net contributors.',example:'If a household pays Rp 20M in taxes and receives Rp 5M in transfers: Net burden = 20M − 5M = Rp 15M (net payer). A poor household paying Rp 2M but receiving Rp 8M: Net burden = 2M − 8M = −Rp 6M (net beneficiary).'},
{name:'Net Tax Burden on Firms',eq:'\\text{Net Burden}_{Firm} = \\text{Taxes paid} - \\text{Subsidies received}',vars:[['\\text{Taxes paid}','Corporate taxes, fees, regulatory charges paid to government'],['\\text{Subsidies received}','Direct subsidies, tax breaks, government contracts received']],interp:'Shows how public policy changes firm costs and incentives. Net burden affects production decisions, pricing, and investment. A firm receiving more subsidies than it pays in taxes has a negative net burden.',example:'If a firm pays Rp 50M in taxes but receives Rp 15M in subsidies: Net burden = 50M − 15M = Rp 35M.'},
{name:'Government Budget Balance',eq:'\\text{Budget Balance} = \\text{Revenue} - \\text{Expenditure}',vars:[['\\text{Revenue}','Total tax revenue + fees + non-tax revenue'],['\\text{Expenditure}','Total government spending on all programs and services']],interp:'If Revenue > Expenditure → surplus. If Expenditure > Revenue → deficit. The government must decide how to raise money, how to spend it, and who bears the burden. Persistent deficits require borrowing, which shifts the burden to future taxpayers.',example:'Revenue = Rp 1,700T, Expenditure = Rp 2,000T → Balance = −Rp 300T (deficit of 300 trillion).'},
{name:'Social Cost vs Private Cost',eq:'\\text{Social Cost} = \\text{Private Cost} + \\text{External Cost}',vars:[['\\text{Private Cost}','Costs borne by the producer (inputs, labor, capital)'],['\\text{External Cost}','Costs imposed on third parties not involved in the transaction (pollution damage, health costs)'],['\\text{Social Cost}','Total cost to society including all spillover effects']],interp:'When external costs exist (negative externality), the market price is too low because it only reflects private cost. The socially optimal quantity is found where Demand = Social Cost, not where Demand = Private Cost. This gap is why government intervenes with Pigouvian taxes.',example:'A factory produces widgets at Rp 100/unit (private cost). Pollution causes Rp 30/unit in health damage to nearby residents (external cost). Social cost = 100 + 30 = Rp 130/unit. The market price of Rp 100 is too low — a Rp 30 tax would correct this.'},
],week2:[
{name:'Exchange Efficiency',eq:'MRS_{af}^{\\text{Adam}} = MRS_{af}^{\\text{Eve}}',vars:[['MRS_{af}^{\\text{Adam}}','Adam\'s marginal rate of substitution between apples (a) and fig leaves (f)'],['MRS_{af}^{\\text{Eve}}','Eve\'s marginal rate of substitution']],interp:'Both individuals value the trade-off between goods identically. No more gains from trade remain. This is the tangency condition on the contract curve inside the Edgeworth Box.',example:'If MRS_Adam = 2 (gives up 2 fig leaves for 1 apple) and MRS_Eve = 0.5 → they value differently → trade possible. Efficiency when both equal the same value.'},
{name:'MRS Definition',eq:'MRS = \\left| \\text{slope of indifference curve} \\right|',vars:[['MRS','How much of good 2 a person gives up for 1 more unit of good 1, staying on same utility level']],interp:'MRS captures personal valuation of one good in terms of another. Diminishing MRS means the more of a good you have, the less additional units are worth.',example:'Indifference curve slope = −3 at a point → MRS = 3: willing to give up 3 fig leaves for 1 apple.'},
{name:'Competitive Consumption',eq:'MRS_{af}^{\\text{Adam}} = \\frac{P_a}{P_f} = MRS_{af}^{\\text{Eve}}',vars:[['P_a','Price of apples'],['P_f','Price of fig leaves'],['P_a/P_f','Market price ratio']],interp:'In competitive markets, each consumer sets MRS = price ratio. Since both equal the same ratio, they equal each other → exchange efficiency automatically achieved via prices.',example:'P_a=$2, P_f=$1 → ratio=2. Both Adam and Eve adjust until MRS=2. Exchange efficient.'},
{name:'Marginal Rate of Transformation',eq:'MRT_{af} = \\left| \\text{slope of PPC} \\right| = \\frac{MC_a}{MC_f}',vars:[['MRT_{af}','Fig leaves sacrificed to produce 1 more apple'],['MC_a','Marginal cost of apples'],['MC_f','Marginal cost of fig leaves']],interp:'MRT is the production trade-off. The PPC is bowed outward because MRT increases as you specialize — increasing opportunity cost.',example:'MC apple=$4, MC fig leaf=$2 → MRT=4/2=2. Each extra apple costs 2 fig leaves of resources.'},
{name:'Product Mix Efficiency',eq:'MRT_{af} = MRS_{af}^{\\text{Adam}} = MRS_{af}^{\\text{Eve}}',vars:[['MRT','What it COSTS to transform (production)'],['MRS','What consumers VALUE (consumption)']],interp:'Economy produces the right mix when production cost trade-off equals consumer valuation trade-off. MRT>MRS → too many apples. MRT<MRS → too few.',example:'MRT=2 but MRS=3: consumers value apples at 3 but they cost 2 → produce MORE apples until MRT rises to 3.'},
{name:'First Welfare Theorem (Full)',eq:'MRS^A = \\frac{P_a}{P_f} = MRS^E = MRT \\;\\Rightarrow\\; \\text{Pareto efficient}',vars:[['MRS^A = P_a/P_f','Consumer A optimizes'],['MRS^E = P_a/P_f','Consumer E optimizes'],['MRT = P_a/P_f','Producers optimize'],['\\Rightarrow','All equal → 3 efficiency conditions hold']],interp:'Every competitive economy is Pareto efficient. Prices coordinate all agents to the same trade-off ratio. This is the formal invisible hand — but depends on strong assumptions.',example:'P_a/P_f=2: Adam MRS=2 ✓, Eve MRS=2 ✓, Firms MRT=2 ✓ → Pareto efficient.'},
{name:'Social Welfare Function',eq:'W = F(U_{\\text{Adam}},\\; U_{\\text{Eve}})',vars:[['W','Social welfare'],['U_{\\text{Adam}}','Adam\'s utility'],['U_{\\text{Eve}}','Eve\'s utility'],['F','Welfare function reflecting society\'s fairness values']],interp:'Ranks utility combinations. Utilitarian: W=U_A+U_E. Rawlsian: W=min(U_A,U_E). Social optimum: highest social indifference curve tangent to UPC.',example:'Utilitarian: (80,20)→W=100; (60,50)→W=110 → prefers second. Rawlsian: (80,20)→W=20; (60,50)→W=50 → also prefers second.'},
],week3:[
{name:'Utilitarian SWF',eq:'W = \\sum_{i=1}^{n} U_i = U_1 + U_2 + \\cdots + U_n',vars:[['W','Social welfare — total utility of society'],['U_i','Utility of individual i'],['n','Number of individuals in society']],interp:'Maximize the sum of everyone\'s utility. Each person\'s utility weighted equally. Supports redistribution when diminishing MU means transfers from rich→poor raise the total.',example:'U_Crusoe=80, U_Friday=20: W=100. After transfer: U_C=65, U_F=45: W=110. Transfer raised total welfare by 10 because Friday\'s MU gain > Crusoe\'s MU loss.'},
{name:'Rawlsian SWF',eq:'W = \\min(U_1, U_2, \\ldots, U_n)',vars:[['W','Social welfare — equals the LOWEST individual utility'],['\\min','Minimum function — picks the worst-off person\'s utility']],interp:'Social welfare depends ONLY on the worst-off. Gains to better-off individuals do not increase W. If the poor person is worse off, anything that increases their welfare increases social welfare. No trade-off when helping the worst-off.',example:'U_C=80, U_F=20: W=20. If U_C rises to 100 but U_F stays 20: W still=20. Only improving U_F raises W.'},
{name:'Consumer Surplus',eq:'CS = \\text{WTP} - \\text{Actual Payment}',vars:[['CS','Consumer surplus — welfare gain from paying less than maximum WTP'],['\\text{WTP}','Willingness to pay — maximum amount consumer would pay'],['\\text{Actual Payment}','Price actually paid in the market']],interp:'Area under demand curve, above price, up to quantity consumed. For public projects: if CS > project cost, the project is worth undertaking on efficiency grounds.',example:'WTP for a bridge crossing = $5. Toll = $2. CS per trip = $5−$2 = $3. If total CS across all users > construction cost, build it.'},
{name:'Net Efficiency Effect',eq:'\\text{Net efficiency} = \\text{Total WTP} - \\text{Total Cost}',vars:[['\\text{Total WTP}','Sum of all individuals\' willingness to pay for the project'],['\\text{Total Cost}','Total cost of providing the project']],interp:'If positive, the project creates aggregate efficiency gains. But this ignores distribution — who gains and who pays still matters for equity.',example:'Total WTP for a new park = $10M. Cost = $7M. Net efficiency = $3M > 0 → efficient. But if all benefit goes to rich neighborhoods, equity may still be a concern.'},
{name:'Deadweight Loss (Excess Burden)',eq:'DWL = \\text{WTP to eliminate tax} - \\text{Revenue raised}',vars:[['DWL','Deadweight loss — welfare destroyed by behavioral distortion'],['\\text{WTP to eliminate}','How much consumer would pay to remove the tax (= welfare cost of distortion)'],['\\text{Revenue}','Tax revenue collected by government']],interp:'The tax does not just transfer money — it also distorts behavior. The distortion destroys welfare that nobody receives. DWL grows with the SQUARE of the tax rate.',example:'Cigarette tax: WTP to eliminate = $100 (lump-sum equivalent). Revenue = $80. DWL = $100 − $80 = $20. The $20 is pure waste — neither consumer nor government gets it.'},
{name:'Marginal Utility',eq:'MU = \\frac{\\Delta U}{\\Delta Q} = \\text{slope of utility function}',vars:[['MU','Extra utility from one more unit of a good'],['\\Delta U','Change in utility'],['\\Delta Q','Change in quantity consumed']],interp:'MU is positive (more is better) but DECLINING (diminishing MU). High MU for the poor = each unit matters a lot. Low MU for the rich = each unit barely matters. This is the foundation of the redistribution argument.',example:'At 5 oranges: MU = 40. At 20 oranges: MU = 12. Transfer 1 orange from rich→poor: poor gains 40, rich loses 12. Net gain = 28.'},
],week4:[
{name:'Private Good Efficiency',eq:'MRS_{fa}^{\\text{Adam}} = MRS_{fa}^{\\text{Eve}} = MRT_{fa}',vars:[['MRS','Each consumer\'s marginal rate of substitution'],['MRT','Marginal rate of transformation (production trade-off)']],interp:'For private goods, each consumer\'s marginal valuation must equal the production trade-off. Same price → same MRS for all. Achieved by competitive markets via horizontal summation.',example:'If P_f/P_a = 2, both Adam and Eve set MRS = 2, and producers set MRT = 2. All equal → efficient.'},
{name:'Public Good Efficiency (Samuelson)',eq:'MRS_{fa}^{\\text{Adam}} + MRS_{fa}^{\\text{Eve}} = MRT_{fa}',vars:[['MRS^{\\text{Adam}}','Adam\'s marginal valuation of the public good'],['MRS^{\\text{Eve}}','Eve\'s marginal valuation'],['MRT','Cost of producing one more unit']],interp:'For public goods, the SUM of marginal valuations must equal the production cost. Everyone consumes the same quantity, so total social value = sum of individual values. Achieved by vertical summation of demand.',example:'At G=20: Adam values extra unit at 4, Eve at 2. MRT = 6. Since 4+2 = 6 = MRT → efficient quantity.'},
{name:'Horizontal Summation (Private)',eq:'Q_{\\text{market}}(P) = Q_{\\text{Adam}}(P) + Q_{\\text{Eve}}(P)',vars:[['Q_{\\text{market}}','Total market demand at price P'],['Q_{\\text{Adam}}','Adam\'s quantity demanded'],['Q_{\\text{Eve}}','Eve\'s quantity demanded']],interp:'At a given PRICE, add QUANTITIES across individuals. Same price, different quantities. This is how private-good market demand is constructed.',example:'At P=5: Adam demands 1, Eve demands 2 → Market demand = 3.'},
{name:'Vertical Summation (Public)',eq:'P_{\\text{group}}(Q) = P_{\\text{Adam}}(Q) + P_{\\text{Eve}}(Q)',vars:[['P_{\\text{group}}','Total social WTP at quantity Q'],['P_{\\text{Adam}}','Adam\'s WTP for one more unit'],['P_{\\text{Eve}}','Eve\'s WTP for one more unit']],interp:'At a given QUANTITY, add WILLINGNESS TO PAY across individuals. Same quantity, different prices. This is how public-good social demand is constructed.',example:'At Q=20 rockets: Adam WTP = $4, Eve WTP = $2 → Group WTP = $6.'},
],week5:[
{name:'MSC for Negative Externality',eq:'MSC = MPC + MD',vars:[['MSC','Marginal social cost — full cost to society'],['MPC','Marginal private cost — cost borne by producer'],['MD','Marginal damage — external cost imposed on others']],interp:'Firms use MPC; society cares about MSC. If MD>0, MSC>MPC → market overproduces. The gap = externality not priced by the market.',example:'Paper mill: MPC=$50/ton, pollution damage MD=$20/ton → MSC=$70/ton. Market price reflects $50, not $70 → too much paper produced.'},
{name:'Pigouvian Tax',eq:'t^* = MD \\text{ at } Q^*',vars:[['t^*','Optimal Pigouvian tax per unit of output'],['MD','Marginal damage at the efficient output level'],['Q^*','Socially efficient output']],interp:'Tax = marginal damage at efficient output. Shifts MPC up by t* → firm faces MSC → produces Q* instead of Q₁. Also generates revenue = t* × Q*.',example:'If MD at Q*=$20, set tax=$20/unit. Firm\'s new cost = MPC+$20. Output falls from Q₁ to Q*.'},
{name:'Emissions Fee',eq:'f^* = MSB \\text{ of pollution reduction at } e^*',vars:[['f^*','Optimal emissions fee per unit of pollution'],['MSB','Marginal social benefit of reducing pollution'],['e^*','Efficient level of pollution reduction']],interp:'Firm reduces pollution until MC of abatement = fee. Better than output tax because it targets pollution directly and gives firms flexibility to innovate.',example:'If MSB of reduction at e*=$50, set fee=$50/unit of emissions. Firm either reduces (if MC<$50) or pays (if MC>$50).'},
{name:'Cost-Effectiveness Condition',eq:'MC_B = MC_H',vars:[['MC_B','Bart\'s marginal cost of pollution reduction'],['MC_H','Homer\'s marginal cost of pollution reduction']],interp:'Total cost of achieving a given pollution target is minimized when marginal abatement costs are EQUAL across all polluters. Both emissions fees and cap-and-trade achieve this; uniform regulation does NOT.',example:'Target: reduce total by 100. If MC_B=$40 at 50 units but MC_H=$110, reallocate: Bart reduces 75 (MC=$60), Homer reduces 25 (MC=$55). Total cost falls.'},
{name:'MSB for Positive Externality',eq:'MSB = MPB + MEB',vars:[['MSB','Marginal social benefit — full benefit to society'],['MPB','Marginal private benefit — benefit captured by producer'],['MEB','Marginal external benefit — spillover benefit to others']],interp:'Firms use MPB only → invest too little. Efficient: MC=MSB. Pigouvian subsidy s*=MEB at R* bridges the gap.',example:'R&D firm: MPB=$60, knowledge spillover MEB=$25 → MSB=$85. Firm invests until MC=$60 (too little). Subsidy of $25 makes firm see $85 → invests to R*.'},
],week7:[
{name:'Individual Public-Good Choice',eq:'MB_i(G) = t_i',vars:[['MB_i(G)','Marginal benefit of public good to individual i'],['t_i','Individual i\'s tax share (personalized tax price)'],['G','Quantity of public good']],interp:'Each person most prefers the quantity of public good where their marginal benefit equals their own tax price. This is the public-choice version of consumer optimization: instead of market price, the individual faces their personalized tax share.',example:'If MB_A at G=100 is $30 and t_A=$30, then A is happy with G=100. If MB_A at G=100 is $50 but t_A=$30, A wants MORE public good.'},
{name:'Lindahl Equilibrium',eq:'\\sum_{i} t_i = MC(G)',vars:[['\\sum_i t_i','Sum of all personalized tax shares'],['MC(G)','Marginal cost of providing one more unit of public good']],interp:'In Lindahl equilibrium, the sum of all personalized tax prices covers the cost of provision. Each person pays according to their own marginal benefit. Pareto efficient if preferences are truthfully revealed. The public-good analog of competitive equilibrium.',example:'MB_A=$40, MB_B=$25 at G*. If MC=$65: t_A=$40 + t_B=$25 = $65 = MC ✓. Both agree on G* and cost is covered.'},
{name:'Rational Ignorance',eq:'MC_{\\text{info}} > MB_{\\text{info}}',vars:[['MC_{\\text{info}}','Marginal cost of becoming informed about a political issue'],['MB_{\\text{info}}','Marginal benefit of having that information (tiny because one vote rarely changes outcomes)']],interp:'If the cost of getting political information exceeds the benefit, the voter rationally stays uninformed. Not irrational — just responding to incentives. One person\'s vote has a tiny effect on the final outcome.',example:'Spending 3 hours researching candidates (MC=$45 in time) when probability your vote changes the outcome ≈ 0.0001% → expected benefit ≈ $0.05. Rational to stay uninformed.'},
{name:'Median Voter Result',eq:'G_{MV} = \\text{median}(G_1^*, G_2^*, \\ldots, G_n^*)',vars:[['G_{MV}','Majority voting equilibrium quantity of public good'],['G_i^*','Individual i\'s most-preferred (ideal) quantity'],['\\text{median}','The middle value when ideal points are ordered']],interp:'Under single-peaked preferences on one dimension, the median voter\'s preferred quantity becomes the majority-stable outcome. Any proposal too far from the median can be defeated by a coalition including the median voter.',example:'5 voters with ideal points: 10, 25, 40, 55, 70. Median = 40. Any proposal ≠40 loses to 40 in majority vote because median voter joins the winning coalition.'},
]};

function makeAxes(svg,W,H,M,xLabel,yLabel){gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);gText(svg,W/2+M.l/2,H-6,xLabel,11,'#555');gText(svg,14,(H-M.b-M.t)/2+M.t,yLabel,11,'#555','middle');const yt=svg.lastChild;yt.setAttribute('transform',`rotate(-90,14,${(H-M.b-M.t)/2+M.t})`)}
function makeSVG(parent,W,H,id){const s=mkEl('svg',{viewBox:`0 0 ${W} ${H}`,width:'100%',preserveAspectRatio:'xMidYMid meet',id});s.style.background='#FEFEFE';s.style.borderRadius='8px';s.style.border='1px solid #ECEAE6';parent.appendChild(s);return s}

// ═══ 16. GraphMath — CURVE INTERSECTION DETECTION ═══
/*
 * README: GraphMath provides accurate intersection detection for graphs.
 * USE: GraphMath.intersectFunctions(f, g, xMin, xMax) → [{x,y}]
 *      where f(x)→y and g(x)→y are the two curves.
 * Uses bisection refinement (10 iterations) for sub-pixel accuracy.
 * Also: sampleCurve(), buildPath(), findX(), evalLine(), intersectLines()
 */
const GraphMath={
  intersectLines(x1,y1,x2,y2,x3,y3,x4,y4){const dn=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);if(Math.abs(dn)<1e-12)return null;const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/dn;const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/dn;return{x:x1+t*(x2-x1),y:y1+t*(y2-y1),t,u,onSeg1:t>=0&&t<=1,onSeg2:u>=0&&u<=1}},
  intersectFunctions(f,g,xMin=0,xMax=1,n=200){const r=[];const step=(xMax-xMin)/n;let px=xMin,pd=f(xMin)-g(xMin);for(let i=1;i<=n;i++){const x=xMin+i*step;const d=f(x)-g(x);if(pd*d<0){let lo=px,hi=x;for(let j=0;j<10;j++){const mid=(lo+hi)/2;if((f(mid)-g(mid))*(f(lo)-g(lo))<0)hi=mid;else lo=mid}const xc=(lo+hi)/2;r.push({x:xc,y:(f(xc)+g(xc))/2})}px=x;pd=d}return r},
  sampleCurve(func,tMin=0,tMax=1,n=100){const pts=[];for(let i=0;i<=n;i++){const t=tMin+(tMax-tMin)*i/n;pts.push(func(t))}return pts},
  buildPath(points,toX,toY){return points.map((p,i)=>(i===0?'M':'L')+toX(p.x)+','+toY(p.y)).join('')},
  findX(f,targetY,xMin=0,xMax=1,n=200){const step=(xMax-xMin)/n;let px=xMin,pd=f(xMin)-targetY;for(let i=1;i<=n;i++){const x=xMin+i*step;const d=f(x)-targetY;if(pd*d<0){let lo=px,hi=x;for(let j=0;j<10;j++){const mid=(lo+hi)/2;if((f(mid)-targetY)*(f(lo)-targetY)<0)hi=mid;else lo=mid}return(lo+hi)/2}px=x;pd=d}return null},
  evalLine(x,x1,y1,x2,y2){return Math.abs(x2-x1)<1e-12?(y1+y2)/2:y1+(y2-y1)*(x-x1)/(x2-x1)}
};

// ===== GRAPH 1: Market Failure & Government Intervention =====
function drawMarketIntervention(){
  const c=document.getElementById('gc-market_intervention');
  const sc=[{id:'neg_ext',label:'Negative externality (pollution)'},{id:'pos_ext',label:'Positive externality (education)'},{id:'public_good',label:'Public good underprovision'},{id:'corrected',label:'Gov corrects via tax'},{id:'overcorrect',label:'Gov over-corrects (gov failure)'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Market Failure & Government Intervention</h4><p class="g-desc">Market equilibrium vs social optimum under externalities. Shaded triangle = deadweight loss. Government can correct via Pigouvian tax/subsidy.</p><div class="g-canvas-wrap"><div id="mi-svg"></div></div>${scBar(sc,'market_intervention')}<div class="g-controls"><div class="g-ctrl"><label>External cost:</label><input type="range" min="-40" max="40" value="0" id="mi-ext" oninput="updMI()"><span class="g-val" id="mi-ev">0</span></div><div class="g-ctrl"><label>Gov tax/subsidy:</label><input type="range" min="-20" max="40" value="0" id="mi-gov" oninput="updMI()"><span class="g-val" id="mi-gv">0</span></div></div><div class="g-insight" id="mi-ins"></div></div>`;
  window._miSc='';updMI();
}
window.applyScenario_market_intervention=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const p={neg_ext:[30,0],pos_ext:[-30,0],public_good:[-38,0],corrected:[30,30],overcorrect:[30,50],reset:[0,0]};const v=p[id]||[0,0];document.getElementById('mi-ext').value=v[0];document.getElementById('mi-gov').value=v[1];window._miSc=id;updMI()};
function updMI(){
  const W=540,H=360,M={l:50,r:25,t:20,b:42};
  const ext=+document.getElementById('mi-ext').value/100,gov=+document.getElementById('mi-gov').value/100;
  document.getElementById('mi-ev').textContent=(ext>0?'+':'')+Math.round(ext*100);document.getElementById('mi-gv').textContent=(gov>0?'+':'')+Math.round(gov*100);
  const pw=document.getElementById('mi-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'mi-s');makeAxes(svg,W,H,M,'Quantity (Q)','Price (P)');
  const pW=W-M.l-M.r,pH=H-M.t-M.b,toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
  // Curves
  const demand=x=>0.92-0.72*x;
  const mpc=x=>0.12+0.62*x;
  const msc=x=>mpc(x)+ext;
  const taxed=x=>mpc(x)+gov;
  // Draw MPC (private supply)
  let d1='';for(let t=.02;t<=.96;t+=.01){const y=mpc(t);if(y>=0&&y<=1)d1+=(d1?'L':'M')+toX(t)+','+toY(y)}
  gPath(svg,d1,'#DC2626',2.2);gText(svg,toX(.94),toY(Math.min(.98,mpc(.94)))+14,'MPC',10,'#DC2626','start',700);
  // Draw Demand
  let d2='';for(let t=.02;t<=.96;t+=.01){const y=demand(t);if(y>=0&&y<=1)d2+=(d2?'L':'M')+toX(t)+','+toY(y)}
  gPath(svg,d2,'#2563EB',2.2);gText(svg,toX(.94),toY(Math.max(.03,demand(.94)))-10,'D (MPB)',10,'#2563EB','start',700);
  // Market equilibrium
  const mEq=GraphMath.intersectFunctions(demand,mpc,.02,.96);
  // MSC if externality
  if(ext!==0){
    let d3='';for(let t=.02;t<=.96;t+=.01){const y=msc(t);if(y>=0&&y<=1)d3+=(d3?'L':'M')+toX(t)+','+toY(y)}
    gPath(svg,d3,'#DB2777',2,'none','5 4');gText(svg,toX(.88),toY(Math.min(.98,msc(.88)))+14,'MSC',10,'#DB2777','start',700);
    // Social optimum
    const sEq=GraphMath.intersectFunctions(demand,msc,.02,.96);
    if(sEq.length>0){gCircle(svg,toX(sEq[0].x),toY(sEq[0].y),5,'#DB2777');gText(svg,toX(sEq[0].x)+(ext>0?-10:10),toY(sEq[0].y)-12,'Q*',11,'#DB2777',ext>0?'end':'start',700);gLine(svg,toX(sEq[0].x),toY(sEq[0].y),toX(sEq[0].x),toY(0),'#DB2777',1,'3 3')}
    // DWL shading between market eq and social eq
    if(mEq.length>0&&sEq.length>0){
      const qm=mEq[0].x,qs=sEq[0].x,lo=Math.min(qm,qs),hi=Math.max(qm,qs);
      if(hi-lo>.01){let p='M'+toX(lo)+','+toY(demand(lo));for(let t=lo;t<=hi;t+=.005)p+='L'+toX(t)+','+toY(demand(t));for(let t=hi;t>=lo;t-=.005)p+='L'+toX(t)+','+toY(msc(t));p+='Z';gPath(svg,p,'none',0,ext>0?'rgba(220,38,38,.12)':'rgba(5,150,105,.12)')}}
  }
  // Taxed supply if gov intervenes
  if(gov!==0){
    let d4='';for(let t=.02;t<=.96;t+=.01){const y=taxed(t);if(y>=0&&y<=1)d4+=(d4?'L':'M')+toX(t)+','+toY(y)}
    gPath(svg,d4,'#059669',2.2);gText(svg,toX(.84),toY(Math.min(.98,taxed(.84)))+14,gov>0?'MPC+tax':'MPC−sub',10,'#059669','start',700);
    const cEq=GraphMath.intersectFunctions(demand,taxed,.02,.96);
    if(cEq.length>0){gCircle(svg,toX(cEq[0].x),toY(cEq[0].y),5,'#059669');gText(svg,toX(cEq[0].x)+10,toY(cEq[0].y)+14,"E'",11,'#059669','start',700);gLine(svg,toX(cEq[0].x),toY(cEq[0].y),toX(cEq[0].x),toY(0),'#059669',1,'3 3')}
  }
  // Market eq point (draw last so on top)
  if(mEq.length>0){const active=ext!==0||gov!==0;gCircle(svg,toX(mEq[0].x),toY(mEq[0].y),active?4:5,active?'#aaa':'#1B2A4A');gText(svg,toX(mEq[0].x)+(active?-10:10),toY(mEq[0].y)-10,active?'Qₘ':'E',10,active?'#999':'#1B2A4A',active?'end':'start',700);gLine(svg,toX(mEq[0].x),toY(mEq[0].y),toX(mEq[0].x),toY(0),active?'#ccc':'#1B2A4A',1,'3 3')}
  // Insight
  const sc=window._miSc||'';
  const exps={
    neg_ext:'<b>Negative externality (pollution):</b><br>1. Firms ignore external cost → MPC < MSC<br>2. Market produces at Qₘ (too much) because price doesn\'t reflect pollution damage<br>3. Social optimum Q* is lower, where D = MSC<br>4. Shaded triangle = <b>deadweight loss</b> from overproduction<br><b>Fix:</b> Pigouvian tax raises private cost to match social cost → click "Gov corrects" to see.',
    pos_ext:'<b>Positive externality (education):</b><br>1. Social benefit > private benefit → MSC effectively below MPC<br>2. Market produces too LITTLE of the beneficial activity<br>3. Q* > Qₘ — society wants more than the market provides<br>4. Shaded area = welfare loss from underproduction<br><b>Fix:</b> Subsidy lowers effective cost → production increases toward Q*.',
    public_good:'<b>Public good underprovision:</b><br>1. Non-rival + non-excludable → free-rider problem<br>2. Very large gap between MSC and MPC (extreme positive externality)<br>3. Private market provides far too little<br><b>Fix:</b> Government provides directly, funded by taxes. Cannot rely on market.',
    corrected:'<b>Government corrects via Pigouvian tax:</b><br>1. External cost = 30% → MSC above MPC by that amount<br>2. Tax = 30% shifts private supply up → MPC+tax ≈ MSC<br>3. New equilibrium E\' aligns with social optimum Q*<br>4. DWL eliminated — <b>successful intervention</b><br><b>Key:</b> Only works if government measures the externality correctly.',
    overcorrect:'<b>Government over-corrects (government failure):</b><br>1. External cost = 30% but tax = 50% → tax EXCEEDS the externality<br>2. MPC+tax > MSC → now producing TOO LITTLE<br>3. Creates a <b>new</b> deadweight loss in the opposite direction<br>4. This is government failure: intervention made things worse<br><b>Lesson:</b> Market failure ≠ automatic justification. The cure can be worse than the disease.'
  };
  document.getElementById('mi-ins').innerHTML=exps[sc]||(ext===0&&gov===0?'Click a scenario to see how externalities create market failure and how government can (or cannot) correct it. The shaded triangle shows deadweight loss.':'Externality: '+(ext>0?'+':'')+Math.round(ext*100)+'%. Tax: '+(gov>0?'+':'')+Math.round(gov*100)+'%.');
}

// ===== GRAPH 2: Efficiency–Equity Trade-off Frontier =====
function drawTradeoff(){
  const c=document.getElementById('gc-eff_eq_tradeoff');
  const sc=[{id:'pure_eff',label:'Pure efficiency'},{id:'pure_eq',label:'Heavy redistribution'},{id:'balanced',label:'Balanced policy'},{id:'gov_fail',label:'Government failure'},{id:'good_inst',label:'Better institutions'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Efficiency–Equity Trade-off</h4><p class="g-desc">The frontier shows maximum achievable combinations. Inside = government failure wastes potential. Good institutions shift the frontier outward.</p><div class="g-canvas-wrap"><div id="te-svg"></div></div>${scBar(sc,'eff_eq_tradeoff')}<div class="g-controls"><div class="g-ctrl"><label>Redistribution:</label><input type="range" min="3" max="97" value="50" id="te-red" oninput="updTE()"><span class="g-val" id="te-rv">50</span></div><div class="g-ctrl"><label>Gov capacity:</label><input type="range" min="30" max="100" value="100" id="te-cap" oninput="updTE()"><span class="g-val" id="te-cv">100%</span></div></div><div class="g-insight" id="te-ins"></div></div>`;
  window._teSc='';updTE();
}
window.applyScenario_eff_eq_tradeoff=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const p={pure_eff:[5,100],pure_eq:[93,100],balanced:[45,100],gov_fail:[50,50],good_inst:[45,100],reset:[50,100]};const v=p[id]||[50,100];document.getElementById('te-red').value=v[0];document.getElementById('te-cap').value=v[1];window._teSc=id;updTE()};
function updTE(){
  const W=440,H=380,M={l:55,r:20,t:20,b:48};
  const red=+document.getElementById('te-red').value/100,cap=+document.getElementById('te-cap').value/100;
  document.getElementById('te-rv').textContent=Math.round(red*100);document.getElementById('te-cv').textContent=Math.round(cap*100)+'%';
  const pw=document.getElementById('te-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'te-s');makeAxes(svg,W,H,M,'Equity (redistribution →)','Efficiency');
  const pW=W-M.l-M.r,pH=H-M.t-M.b,toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
  // Frontier (concave)
  const front=x=>Math.sqrt(1-Math.pow(x,1.8))*.93+.04;
  let fp='';for(let t=.01;t<=.99;t+=.005){fp+=(t<=.015?'M':'L')+toX(t)+','+toY(front(t))}
  gPath(svg,fp,'#1B2A4A',2.5);gText(svg,toX(.55),toY(front(.55))+20,'Possibility frontier',9,'#1B2A4A','middle',600);
  // Grid lines
  for(let v=.2;v<=.8;v+=.2){gLine(svg,toX(v),toY(0),toX(v),toY(.02),'#333',1);gText(svg,toX(v),toY(-.06),Math.round(v*100)+'%',8,'#999')}
  for(let v=.2;v<=.8;v+=.2){gLine(svg,toX(-.01),toY(v),toX(.01),toY(v),'#333',1);gText(svg,toX(-.05),toY(v),Math.round(v*100)+'%',8,'#999')}
  // Current point
  const eff=front(red)*cap;
  const cx=toX(red),cy=toY(eff);
  const onFront=cap>.99;
  gCircle(svg,cx,cy,7,onFront?'#2563EB':'#DC2626');
  gLine(svg,cx,cy,cx,toY(0),onFront?'#2563EB':'#DC2626',1,'3 3');gLine(svg,cx,cy,toX(0),cy,onFront?'#2563EB':'#DC2626',1,'3 3');
  gText(svg,cx+10,cy-14,'Current policy',10,onFront?'#2563EB':'#DC2626','start',700);
  // If inside frontier, show frontier point
  if(!onFront){const fy=front(red);gCircle(svg,toX(red),toY(fy),4,'#1B2A4A','#ccc');gText(svg,toX(red)+8,toY(fy)-10,'Achievable',9,'#999','start');gLine(svg,cx+2,cy-2,toX(red)+2,toY(fy)+2,'#DC2626',1.5,'4 3');gText(svg,toX(red)+22,(cy+toY(fy))/2,'Waste',9,'#DC2626','start',600)}
  // Labels at corners
  gText(svg,toX(.05),toY(front(.03))+10,'Max output',8,'#059669','start',600);gText(svg,toX(.05),toY(front(.03))+22,'no sharing',8,'#059669','start');
  gText(svg,toX(.93),toY(front(.93))-12,'Max equality',8,'#7C3AED','end',600);gText(svg,toX(.93),toY(front(.93)),'low output',8,'#7C3AED','end');
  const sc=window._teSc||'';
  const exps={
    pure_eff:'<b>Pure efficiency (no redistribution):</b><br>1. All resources allocated by market → maximum output<br>2. Equity near zero — winners take all<br>3. Socially unacceptable in most democracies<br>4. Position: far left on frontier<br><b>Result:</b> High GDP, deep poverty, extreme inequality.',
    pure_eq:'<b>Heavy redistribution:</b><br>1. High taxes on earners, large transfers to poor<br>2. Equity high but efficiency falls sharply<br>3. The frontier is STEEP here: small equity gains cost large output<br>4. Why? High marginal taxes → work disincentive, capital flight, avoidance<br><b>Result:</b> More equal but significantly poorer overall.',
    balanced:'<b>Balanced policy:</b><br>1. Moderate redistribution + well-designed taxes<br>2. The frontier is FLAT here: equity gains are relatively cheap<br>3. Most successful mixed economies operate in this zone<br>4. Key insight: good policy design can achieve both<br><b>Exam answer:</b> The goal is finding this sweet spot, not maximizing one dimension.',
    gov_fail:'<b>Government failure (inside the frontier):</b><br>1. Capacity at 50% → bureaucratic waste, corruption, poor targeting<br>2. <b style="color:#DC2626">Red dot sits BELOW the frontier</b> → pure waste<br>3. Society gets LESS efficiency AND LESS equity than possible<br>4. This is NOT a trade-off — it is failure<br><b>Fix:</b> Better institutions, transparency, accountability → move UP to the frontier.',
    good_inst:'<b>Better institutions:</b><br>1. Strong rule of law, competent bureaucracy, accountability<br>2. Government capacity at 100% → on the frontier<br>3. Every dollar of redistribution actually reaches intended recipients<br>4. Tax system minimizes distortions → flatter trade-off<br><b>Key:</b> Institutional quality determines WHERE on (or below) the frontier you operate.'
  };
  document.getElementById('te-ins').innerHTML=exps[sc]||`Redistribution: ${Math.round(red*100)}%. Efficiency: ${Math.round(eff*100)}%. ${onFront?'On the frontier — this is the best achievable given this redistribution level.':'<b style="color:#DC2626">Below the frontier</b> — government capacity at '+Math.round(cap*100)+'% means '+Math.round((1-cap)*100)+'% of potential is wasted through bureaucracy, corruption, or poor design.'}`;
}

// ===== GRAPH 3: Edgeworth Box & Exchange Efficiency =====
function drawEdgeworth(){

  const sc=[{id:'inefficient',label:'Inefficient allocation'},{id:'pareto_adam',label:'Pareto improvement → Adam'},{id:'pareto_both',label:'Both gain from trade'},{id:'on_contract',label:'On contract curve'},{id:'unequal_eff',label:'Efficient but unequal'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Edgeworth Box: Exchange Efficiency</h4><p class="g-desc">Adam (bottom-left origin) and Eve (top-right origin) trade apples and fig leaves. Tangent indifference curves = exchange efficient (on contract curve).</p><div class="g-canvas-wrap"><div id="ew-svg"></div></div>${scBar(sc,'edgeworth')}<div class="g-controls"><div class="g-ctrl"><label>Adam's apples:</label><input type="range" min="10" max="90" value="50" id="ew-ax" oninput="updEW()"><span class="g-val" id="ew-axv">50</span></div><div class="g-ctrl"><label>Adam's fig leaves:</label><input type="range" min="10" max="90" value="50" id="ew-ay" oninput="updEW()"><span class="g-val" id="ew-ayv">50</span></div></div><div class="g-insight" id="ew-ins"></div></div>`;
  window._ewSc='';updEW();
}
window.applyScenario_edgeworth=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const p={inefficient:[30,70],pareto_adam:[55,55],pareto_both:[45,45],on_contract:[50,50],unequal_eff:[80,80],reset:[50,50]};const v=p[id]||[50,50];document.getElementById('ew-ax').value=v[0];document.getElementById('ew-ay').value=v[1];window._ewSc=id;updEW()};
function updEW(){
  const W=460,H=400,M={l:45,r:45,t:35,b:40};
  const ax=+document.getElementById('ew-ax').value/100,ay=+document.getElementById('ew-ay').value/100;
  document.getElementById('ew-axv').textContent=Math.round(ax*100);document.getElementById('ew-ayv').textContent=Math.round(ay*100);
  const pw=document.getElementById('ew-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'ew-s');
  const pW=W-M.l-M.r,pH=H-M.t-M.b;
  const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
  // Box
  gRect(svg,M.l,M.t,pW,pH,'#FAFAF8');
  gLine(svg,M.l,M.t,M.l,H-M.b,'#1B2A4A',2);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#1B2A4A',2);
  gLine(svg,W-M.r,M.t,W-M.r,H-M.b,'#1B2A4A',2);gLine(svg,M.l,M.t,W-M.r,M.t,'#1B2A4A',2);
  // Labels
  gText(svg,M.l+pW/2,H-M.b+28,'Apples → (Adam)',10,'#2563EB','middle',600);
  gText(svg,8,M.t+pH/2,'Fig leaves ↑',10,'#2563EB','middle');svg.lastChild.setAttribute('transform',`rotate(-90,8,${M.t+pH/2})`);
  gText(svg,M.l+pW/2,M.t-14,'← Apples (Eve)',10,'#DC2626','middle');
  gText(svg,W-M.r+30,M.t+pH/2,'↓ Fig leaves',10,'#DC2626','middle');svg.lastChild.setAttribute('transform',`rotate(90,${W-M.r+30},${M.t+pH/2})`);
  gText(svg,M.l-4,H-M.b+14,'Adam',10,'#2563EB','end',700);gText(svg,W-M.r+4,M.t-4,'Eve',10,'#DC2626','start',700);
  // Contract curve: y = x^1.3 * 0.5 + x * 0.5 (smooth curve through box)
  const ccFn=t=>Math.pow(t,1.3)*0.45+t*0.55;

  // Adam IC: y = uA²/x (Cobb-Douglas, convex to origin)

  if(!onCC){

    for(let x=Math.min(.98,ax+.35);x>=ax;x-=.005){const ye=1-uE*uE/(1-x);if(ye>.01&&ye<.99)lens+='L'+toX(x)+','+toY(ye)}
    if(lens){lens+='Z';const el=document.createElementNS('http://www.w3.org/2000/svg','path');el.setAttribute('d',lens);el.setAttribute('fill','#FEFCE8');el.setAttribute('fill-opacity','0.4');el.setAttribute('stroke','#D97706');el.setAttribute('stroke-width','1');el.setAttribute('stroke-dasharray','3 3');svg.appendChild(el)}

    pareto_adam:'<b>Pareto improvement favoring Adam:</b><br>1. Moved to (55,55) — Adam gets more of both<br>2. Adam reaches higher indifference curve<br>3. Eve may stay on same curve or slightly lose<br>4. If Eve is not worse off → Pareto improvement<br><b>Trade moved allocation closer to the contract curve.</b>',

// ===== GRAPH 4: PPC, MRT & Product Mix Efficiency =====

}
window.applyScenario_ppc_mrt=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
const p={inside:[50,65,50],on_frontier:[50,100,50],mix_wrong:[25,100,70],mix_right:[50,100,50],tech_up:[50,100,50],reset:[50,100,50]};const v=p[id]||[50,100,50];document.getElementById('pp-pt').value=v[0];document.getElementById('pp-cap').value=v[1];document.getElementById('pp-mrs').value=v[2];window._ppSc=id;updPP()};
function updPP(){

  const exps={
    inside:'<b>Inside the PPC (inefficient):</b><br>1. Capacity use at 65% — resources are idle or misallocated<br>2. The economy could produce MORE of both goods<br>3. Moving to the frontier is a Pareto improvement<br>4. Causes: unemployment, waste, poor organization<br><b>Being inside the PPC = production inefficiency.</b>',
    on_frontier:'<b>On the frontier (production efficient):</b><br>1. All resources fully and efficiently used<br>2. Cannot increase apple production without reducing fig leaves<br>3. MRT shown as slope tangent (orange dashed)<br>4. But: is this the RIGHT point? Check if MRT = MRS<br><b>On PPC = production efficient, but need product mix check too.</b>',
    mix_wrong:'<b>Wrong product mix (MRT ≠ MRS):</b><br>1. On the frontier at 25% apples — heavily favoring fig leaves<br>2. MRT (slope of PPC here) is LOW — apples are cheap to produce<br>3. But MRS is HIGH — consumers really want apples<br>4. MRT < MRS → economy is producing too FEW apples<br><b>Product mix inefficiency: move right along PPC to produce more apples.</b>',
    mix_right:'<b>Right product mix (MRT = MRS):</b><br>1. On the frontier at a point where MRT ≈ MRS<br>2. The production trade-off matches consumer preferences<br>3. All THREE efficiency conditions satisfied:<br>   Exchange: MRS equal across consumers ✓<br>   Production: on the PPC ✓<br>   Product mix: MRT = MRS ✓<br><b>Full Pareto efficiency achieved.</b>',
    tech_up:'<b>Technology improvement:</b><br>1. PPC shifts outward — economy can produce more of both goods<br>2. Old frontier (gray) vs new frontier (dark)<br>3. Previously unattainable combinations now feasible<br>4. Growth in productive capacity<br><b>Technology is one of the few things that shifts the entire frontier outward.</b>'
  };
  document.getElementById('pp-ins').innerHTML=exps[sc]||`Production: ${Math.round(pt*100)}% apples. Capacity: ${Math.round(cap*100)}%. MRT=${mrt.toFixed(2)}, MRS=${mrsVal.toFixed(1)}. ${cap<.99?'<b style="color:#DC2626">Inside the PPC — inefficient.</b>':(mixMatch?'<b style="color:#059669">MRT ≈ MRS — product mix efficient.</b>':'<b style="color:#DC2626">MRT ≠ MRS — wrong product mix.</b>')}`;
}

    adam_better:'<b>Making Adam better off (g → h):</b><br>1. Adam moves from A<sub>g</sub> to higher curve A<sub>h</sub> → <b>Adam gains</b><br>2. Eve stays on the <b>same</b> indifference curve E<sub>g</sub> → Eve not worse off<br>3. This is a <b>Pareto improvement</b>: one gains, none loses<br>4. Adam traded some fig leaves for apples from Eve<br>5. Point h is closer to the contract curve<br><b>This matches the slide: "Making Adam better off without Eve being worse off"</b>',
    eve_better:'<b>Making Eve better off (g → p₁):</b><br>1. Eve moves to higher curve E<sub>p1</sub> → <b>Eve gains</b><br>2. Adam stays on the <b>same</b> curve A<sub>g</sub> → Adam not worse off<br>3. This is a <b>Pareto improvement</b><br>4. Point p₁ is ON the contract curve → <b>Pareto efficient</b><br>5. No further Pareto improvements possible from p₁<br><b>This matches the slide: "Making Eve better off without Adam being worse off"</b>',
    both_better:'<b>Making BOTH better off (g → p):</b><br>1. Adam moves to <b>higher</b> curve (A<sub>g</sub> → A<sub>p</sub>) → Adam gains<br>2. Eve moves to <b>higher</b> curve (E<sub>g</sub> → E<sub>p</sub>) → Eve gains<br>3. This is the <b>clearest Pareto improvement</b>: both gain<br>4. The original point g was definitely inefficient<br>5. Point p may or may not be on the contract curve<br><b>This matches the slide: "Making both Adam and Eve better off" — the strongest case for trade.</b>',
    contract:'<b>Contract curve — all efficient allocations:</b><br>1. The green curve connects <b>all tangency points</b> where MRS<sub>Adam</sub> = MRS<sub>Eve</sub><br>2. Every point on it is <b>Pareto efficient</b> — no more gains from trade<br>3. Some points favor Adam (bottom-left), others favor Eve (top-right)<br>4. The curve does NOT tell which point is <b>fairest</b><br>5. Social welfare function needed to choose among efficient points<br><b>Off the curve → inefficient. On the curve → efficient but fairness unresolved.</b>'
  };
  document.getElementById('pm-ins').innerHTML=exps[sc]||'Click a scenario.';
}

// ===== GRAPH: UPC + Social Welfare Maximization =====
function drawUPCWelfare(){
  const c=document.getElementById('gc-upc_welfare');
  const sc=[{id:'upc_only',label:'Utility Possibility Curve'},{id:'points',label:'Efficient vs inefficient points'},{id:'sic',label:'Social indifference curves'},{id:'optimum',label:'Maximize social welfare'},{id:'utilitarian',label:'Utilitarian SWF'},{id:'rawlsian',label:'Rawlsian SWF'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Utility Possibility Curve & Social Welfare Maximization</h4><p class="g-desc">UPC shows max utility combinations (from contract curve). Social indifference curves rank them. Tangency = social optimum. Matches slides: UPC, SIC, and maximization diagrams.</p><div class="g-canvas-wrap"><div id="uw-svg"></div></div>${scBar(sc,'upc_welfare')}<div class="g-insight" id="uw-ins">Click a scenario to build up the full welfare analysis step by step.</div></div>`;
  window._uwSc='upc_only';updUW();
}
window.applyScenario_upc_welfare=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window._uwSc=id;updUW()};
function updUW(){
  const W=460,H=420,M={l:55,r:20,t:20,b:48};
  const sc=window._uwSc||'upc_only';
  const pw=document.getElementById('uw-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'uw-s');
  const pW=W-M.l-M.r,pH=H-M.t-M.b;
  const toX=v=>M.l+v*pW,toY=v=>M.t+(1-v)*pH;
  // Axes
  gLine(svg,M.l,M.t,M.l,H-M.b,'#333',1.5);gLine(svg,M.l,H-M.b,W-M.r,H-M.b,'#333',1.5);
  gText(svg,M.l+pW/2,H-M.b+32,"Eve's utility →",11,'#DC2626','middle',600);
  gText(svg,M.l-36,M.t+pH/2,"Adam's utility ↑",11,'#2563EB','middle',600);svg.lastChild.setAttribute('transform',`rotate(-90,${M.l-36},${M.t+pH/2})`);
  // UPC (concave from top-left to bottom-right)
  const upc=x=>Math.pow(1-Math.pow(x,1.3),1/1.3)*.92+.03;
  let fp='';for(let t=.03;t<=.95;t+=.003){const y=upc(t);if(y>.02&&y<.98)fp+=(fp?'L':'M')+toX(t)+','+toY(y)}
  gPath(svg,fp,'#1B2A4A',2.5);
  // Label endpoints
  gText(svg,toX(.06),toY(upc(.04))+4,'U',10,'#1B2A4A','start',700);
  gText(svg,toX(.93),toY(upc(.93))-10,'U',10,'#1B2A4A','start',700);
  // Axis ticks
  for(let v=.2;v<=.8;v+=.2){gLine(svg,toX(v),toY(-.01),toX(v),toY(.01),'#333',1)}
  for(let v=.2;v<=.8;v+=.2){gLine(svg,toX(-.01),toY(v),toX(.01),toY(v),'#333',1)}
  const showSIC=sc==='sic'||sc==='optimum'||sc==='utilitarian'||sc==='rawlsian';
  // Points on and off UPC
  if(sc==='points'||sc==='optimum'||sc==='utilitarian'||sc==='rawlsian'){
    const p3={x:.25,y:upc(.25)},p5={x:.65,y:upc(.65)},q={x:.42,y:.35};
    gCircle(svg,toX(p3.x),toY(p3.y),5,'#1B2A4A');gText(svg,toX(p3.x)-8,toY(p3.y)-10,'p₃',10,'#1B2A4A','end',700);
    gCircle(svg,toX(p5.x),toY(p5.y),5,'#1B2A4A');gText(svg,toX(p5.x)+8,toY(p5.y)+12,'p₅',10,'#1B2A4A','start',700);
    gCircle(svg,toX(q.x),toY(q.y),5,'#DC2626');gText(svg,toX(q.x)+8,toY(q.y)+4,'q',10,'#DC2626','start',700);
    if(sc==='points'){gLine(svg,toX(q.x),toY(q.y),toX(q.x),toY(q.y)+30,'#DC2626',1.2);gText(svg,toX(q.x)+4,toY(q.y)+40,'inefficient',8,'#DC2626','start');}
  }
  // Social indifference curves
  if(showSIC){
    const isRawls=sc==='rawlsian';const isUtil=sc==='utilitarian';
    const levels=sc==='sic'?[.35,.5,.65,.8]:(sc==='optimum'?[.4,.55,.7]:(isUtil?[.5,.65,.8]:[.3,.48,.63]));
    levels.forEach((w,i)=>{
      let sic='';
      for(let x=.03;x<=.97;x+=.005){
        let y;
        if(isRawls) y=w;  // L-shaped approximation: horizontal at utility=w
        else if(isUtil) y=w-x;  // linear: U_A + U_E = const
        else y=Math.pow(Math.max(0.001,Math.pow(w,2)-Math.pow(x,2)),0.5); // symmetric convex
        if(y>.02&&y<.98) sic+=(sic?'L':'M')+toX(x)+','+toY(y);
      }
      if(sic){
        const isOpt=(sc==='optimum'&&i===levels.length-1)||(isUtil&&i===levels.length-1)||(sc==='rawlsian'&&i===levels.length-1);
        gPath(svg,sic,isOpt?'#7C3AED':'#D4D4D4',isOpt?2.2:1.2);
      }
    });
    if(sc==='sic'){gText(svg,toX(.8),toY(.35)+12,'W₁',9,'#999');gText(svg,toX(.7),toY(.55)+12,'W₂',9,'#999');gText(svg,toX(.5),toY(.7)+12,'W₃',9,'#999');
      gPath(svg,`M${toX(.75)},${toY(.62)}L${toX(.6)},${toY(.78)}`,'#333',1.2);gText(svg,toX(.58),toY(.82),'↑ Higher W',9,'#333','start',600);}
    // Tangency point for optimum
    if(sc==='optimum'){
      // Find tangency numerically
      let bestX=.45,bestDist=999;
      for(let x=.1;x<=.9;x+=.005){const uy=upc(x);const w=Math.sqrt(x*x+uy*uy);const sy=Math.sqrt(Math.max(.001,w*w-x*x));if(Math.abs(sy-uy)<bestDist){bestDist=Math.abs(sy-uy);bestX=x}}
      const optY=upc(bestX);
      gCircle(svg,toX(bestX),toY(optY),7,'#7C3AED');gText(svg,toX(bestX)+10,toY(optY)-12,'Social optimum',10,'#7C3AED','start',700);
      gLine(svg,toX(bestX),toY(optY),toX(bestX),toY(0),'#7C3AED',1,'3 3');
      gLine(svg,toX(bestX),toY(optY),toX(0),toY(optY),'#7C3AED',1,'3 3');
    }
    if(isUtil){const optX=.5,optY=upc(.5);gCircle(svg,toX(optX),toY(optY),7,'#7C3AED');gText(svg,toX(optX)+10,toY(optY)-12,'Utilitarian opt',10,'#7C3AED','start',700);gText(svg,toX(.75),toY(.15),'W = U_A + U_E',10,'#7C3AED','middle',600)}
    if(isRawls){
      // Rawlsian: maximize the minimum utility → 45° line tangent
      let bestX=.5,bestDist=999;for(let x=.1;x<=.9;x+=.005){const uy=upc(x);if(Math.abs(uy-x)<bestDist){bestDist=Math.abs(uy-x);bestX=x}}
      const optY=upc(bestX);gCircle(svg,toX(bestX),toY(optY),7,'#7C3AED');gText(svg,toX(bestX)+10,toY(optY)-12,'Rawlsian opt',10,'#7C3AED','start',700);
      gLine(svg,toX(0),toY(0),toX(.85),toY(.85),'#999',1,'4 3');gText(svg,toX(.82),toY(.85),'45°',8,'#999');
      gText(svg,toX(.75),toY(.15),'W = min(U_A, U_E)',10,'#7C3AED','middle',600);
    }
  }
  const exps={
    upc_only:'<b>Utility Possibility Curve (UPC):</b><br>1. Derived from the <b>contract curve</b> in the Edgeworth Box<br>2. Each efficient goods allocation → one (U<sub>Adam</sub>, U<sub>Eve</sub>) pair<br>3. The frontier shows <b>maximum</b> utility combinations<br>4. Points ON the UPC are <b>Pareto efficient</b><br>5. Downward sloping: more for Adam = less for Eve (on frontier)<br><b>This is the efficiency frontier in utility space.</b>',
    points:'<b>Points on and off the UPC:</b><br>1. <b>p₃</b> (on UPC): Pareto efficient — favors Adam (high U_A, low U_E)<br>2. <b>p₅</b> (on UPC): Pareto efficient — favors Eve (low U_A, high U_E)<br>3. <b>q</b> (inside UPC, red): <b>NOT efficient</b> — can improve at least one person<br>4. Both p₃ and p₅ are efficient but have very different distributions<br>5. Pareto criterion alone <b>cannot choose</b> between p₃ and p₅<br><b>This is why we need the Social Welfare Function.</b>',
    sic:'<b>Social Indifference Curves:</b><br>1. Each curve = combinations of U<sub>A</sub> and U<sub>E</sub> that society values <b>equally</b><br>2. <b>W = F(U<sub>Adam</sub>, U<sub>Eve</sub>)</b> — the social welfare function<br>3. Higher curves (W₃ > W₂ > W₁) = <b>higher social welfare</b><br>4. Shape depends on society\'s fairness values<br>5. Convex curves = society dislikes extreme inequality<br><b>SICs represent society\'s ethical preferences about distribution.</b>',
    optimum:'<b>Maximizing Social Welfare:</b><br>1. The social optimum = <b>highest SIC tangent to UPC</b><br>2. This is the best feasible combination of utilities<br>3. It is BOTH efficient (on UPC) AND socially preferred<br>4. The tangency point is unique for a given SWF<br>5. Different SWFs → different tangency points → different optima<br><b>This resolves the indeterminacy of Pareto efficiency. The SWF picks THE best efficient point.</b>',
    utilitarian:'<b>Utilitarian Social Welfare:</b><br>1. <b>W = U<sub>Adam</sub> + U<sub>Eve</sub></b> — maximize total utility<br>2. Social indifference curves are <b>straight lines</b> (slope = −1)<br>3. Society is willing to sacrifice 1 util from Adam for 1 util to Eve<br>4. May tolerate inequality if total is higher<br>5. Tangency tends toward a <b>balanced</b> point on UPC<br><b>Utilitarian = maximize the pie, regardless of how it\'s sliced.</b>',
    rawlsian:'<b>Rawlsian Social Welfare:</b><br>1. <b>W = min(U<sub>Adam</sub>, U<sub>Eve</sub>)</b> — maximize the worst-off person<br>2. Social indifference curves are <b>L-shaped</b> (right angles)<br>3. Optimal point is where the UPC crosses the <b>45° line</b> (equal utilities)<br>4. Society will sacrifice total welfare to help the worst-off<br>5. Leads to MORE equal distribution than utilitarian<br><b>Rawlsian = maximize the smallest slice of the pie.</b>'
  };
  document.getElementById('uw-ins').innerHTML=exps[sc]||'Click a scenario.';
}

// ===== GRAPH: Welfare Theorems — MRS = P/P = MRT =====
function drawWelfareThm(){
  const c=document.getElementById('gc-welfare_thm');
  const sc=[{id:'fwt',label:'1st Theorem: competitive → efficient'},{id:'mechanism',label:'How prices align MRS & MRT'},{id:'swt',label:'2nd Theorem: redistribute → new efficient pt'},{id:'mf_breaks',label:'Market failure breaks theorem'},{id:'reset',label:'⟲ Reset'}];
  c.innerHTML=`<div class="g-card"><h4>Welfare Theorems: How Competitive Markets Achieve Efficiency</h4><p class="g-desc">The First Theorem: prices coordinate MRS = MRT. The Second: redistribution can change which efficient point we reach. Market failure breaks the chain.</p><div class="g-canvas-wrap"><div id="wt-svg"></div></div>${scBar(sc,'welfare_thm')}<div class="g-insight" id="wt-ins">Click a scenario to see how the welfare theorems work.</div></div>`;
  window._wtSc='fwt';updWT();
}
window.applyScenario_welfare_thm=function(id,btn){btn.parentElement.querySelectorAll('.g-sc').forEach(b=>b.classList.remove('active'));btn.classList.add('active');window._wtSc=id;updWT()};
function updWT(){
  const W=520,H=340,M={l:40,r:20,t:30,b:30};
  const sc=window._wtSc||'fwt';
  const pw=document.getElementById('wt-svg');pw.innerHTML='';
  const svg=makeSVG(pw,W,H,'wt-s');
  const pW=W-M.l-M.r,pH=H-M.t-M.b,cx=M.l+pW/2,cy=M.t+pH/2;
  // Draw as a conceptual diagram with boxes and arrows
  const navy='#1B2A4A',blue='#2563EB',green='#059669',red='#DC2626',purple='#7C3AED',gray='#999';
  function box(x,y,w,h,text,fill,border,textColor,sub){
    gRect(svg,x-w/2,y-h/2,w,h,fill,8);
    const r=svg.lastChild;r.setAttribute('stroke',border);r.setAttribute('stroke-width','1.5');
    gText(svg,x,sub?y-6:y,text,11,textColor,'middle',700);
    if(sub)gText(svg,x,y+8,sub,8,textColor,'middle',400);
  }
  function arrow(x1,y1,x2,y2,color,label){
    gLine(svg,x1,y1,x2,y2,color,1.8);
    const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
    const nx=dx/len,ny=dy/len;
    gPath(svg,`M${x2},${y2}L${x2-nx*7+ny*4},${y2-ny*7-nx*4}L${x2-nx*7-ny*4},${y2-ny*7+nx*4}Z`,color,0,color);
    if(label)gText(svg,(x1+x2)/2+ny*12,(y1+y2)/2-nx*12,label,8,color,'middle',500);
  }
  if(sc==='fwt'){
    gText(svg,cx,M.t+8,'First Fundamental Theorem of Welfare Economics',13,navy,'middle',700);
    box(cx,cy-50,180,36,'Competitive Market',blue+'15',blue,blue,'many buyers & sellers, price-taking');
    box(cx-150,cy+30,110,36,'Consumers','#DBEAFE',blue,blue,'optimize: MRS = Pₐ/P_f');
    box(cx+150,cy+30,110,36,'Producers','#FEE2E2',red,red,'optimize: MRT = Pₐ/P_f');
    box(cx,cy+30,90,28,'Prices','#FEF3C7','#D97706','#92400E','Pₐ/P_f');
    arrow(cx-60,cy-32,cx-120,cy+10,blue,'');arrow(cx+60,cy-32,cx+120,cy+10,red,'');
    arrow(cx-95,cy+30,cx-48,cy+30,blue,'');arrow(cx+95,cy+30,cx+48,cy+30,red,'');
    box(cx,cy+100,260,40,'MRS^Adam = Pₐ/P_f = MRS^Eve = MRT','#F0FDF4',green,green);
    arrow(cx,cy+46,cx,cy+78,green,'therefore');
    box(cx,cy+155,200,32,'→ PARETO EFFICIENT ✓','#ECFDF5',green,'#065F46');
    arrow(cx,cy+118,cx,cy+137,green,'');
  }
  if(sc==='mechanism'){
    gText(svg,cx,M.t+8,'How Prices Coordinate Efficiency',13,navy,'middle',700);
    box(cx-160,cy-40,130,50,'Adam','#DBEAFE',blue,blue,'MRS = 3 → buys apples');
    box(cx+160,cy-40,130,50,'Eve','#FCE7F3','#DB2777','#9D174D','MRS = 1 → sells apples');
    box(cx,cy-40,80,36,'Price','#FEF3C7','#D97706','#92400E','Pₐ/P_f = 2');
    arrow(cx-93,cy-40,cx-44,cy-40,blue,'');arrow(cx+93,cy-40,cx+44,cy-40,'#DB2777','');
    box(cx,cy+30,180,32,'Adam adjusts: MRS → 2',blue+'15',blue,blue);
    box(cx,cy+70,180,32,'Eve adjusts: MRS → 2','#FCE7F3','#DB2777','#9D174D');
    arrow(cx,cy-20,cx,cy+12,navy,'optimize');
    box(cx,cy+120,250,36,'MRS_Adam = 2 = MRS_Eve = MRT','#F0FDF4',green,green);
    arrow(cx,cy+88,cx,cy+100,green,'');
    gText(svg,cx,cy+155,'All equal → Exchange + Product Mix efficient ✓',11,green,'middle',700);
  }
  if(sc==='swt'){
    gText(svg,cx,M.t+8,'Second Fundamental Theorem',13,navy,'middle',700);
    box(cx-160,cy-50,130,40,'Initial endowment','#FEE2E2',red,red,'unequal start');
    box(cx,cy-50,120,40,'Government','#EDE9FE',purple,purple,'redistributes');
    box(cx+160,cy-50,130,40,'New endowment','#ECFDF5',green,green,'more equal start');
    arrow(cx-93,cy-50,cx-62,cy-50,red,'');arrow(cx+62,cy-50,cx+93,cy-50,green,'');
    box(cx+160,cy+20,130,36,'Competitive market','#DBEAFE',blue,blue,'operates freely');
    arrow(cx+160,cy-28,cx+160,cy,blue,'');
    box(cx+160,cy+75,150,36,'New Pareto efficient pt','#F0FDF4',green,green,'more equal AND efficient');
    arrow(cx+160,cy+40,cx+160,cy+55,green,'');
    box(cx-100,cy+75,180,44,'Key insight:','#FEFCE8','#D97706','#92400E','efficiency handled by market');
    gText(svg,cx-100,cy+107,'equity handled by redistribution',9,'#92400E','middle',500);
    gText(svg,cx,cy+150,'⚠ Caveat: real redistribution uses taxes → distorts behavior → some efficiency loss',9,red,'middle',500);
  }
  if(sc==='mf_breaks'){
    gText(svg,cx,M.t+8,'When Market Failure Breaks the Theorem',13,red,'middle',700);
    box(cx,cy-60,200,36,'Assumptions required:','#FEE2E2',red,red);
    const assumptions=['Private ownership','Perfect competition','Full information','No externalities','Complete markets','Resource mobility'];
    assumptions.forEach((a,i)=>{const x=M.l+30+(i%3)*(pW/3),y=cy-20+(Math.floor(i/3))*30;gText(svg,x,y,'✓ '+a,9,navy,'start',500)});
    box(cx,cy+55,280,36,'If ANY assumption fails:',red+'15',red,red);
    arrow(cx,cy+25,cx,cy+35,red,'');
    const failures=['Monopoly → P > MC','Public goods → free-rider','Externalities → wrong prices','Asymmetric info → adverse selection','Incomplete markets → missing insurance','Unemployment → disequilibrium'];
    failures.forEach((f,i)=>{const x=M.l+30+(i%3)*(pW/3),y=cy+85+(Math.floor(i/3))*22;gText(svg,x,y,'✗ '+f,8,red,'start',500)});
    box(cx,cy+150,240,32,'MRS ≠ MRT → NOT Pareto efficient','#FEE2E2',red,red);
    arrow(cx,cy+130,cx,cy+132,red,'');
    gText(svg,cx,cy+175,'→ Potential role for government intervention',10,navy,'middle',700);
  }
  const exps={
    fwt:'<b>First Welfare Theorem:</b><br>1. <b>Every competitive economy is Pareto efficient</b><br>2. Consumers set MRS = price ratio. Producers set MRT = price ratio.<br>3. Since both equal the SAME price ratio, MRS = MRT automatically<br>4. All three efficiency conditions satisfied: exchange ✓, production ✓, product mix ✓<br>5. This is the formal version of the <b>invisible hand</b><br><b>But: depends on strong assumptions. Click "Market failure breaks theorem" to see what goes wrong.</b>',
    mechanism:'<b>How prices coordinate efficiency:</b><br>1. Adam\'s MRS = 3 (values apples highly). Eve\'s MRS = 1 (values apples less).<br>2. Market price Pₐ/Pf = 2. Both optimize toward price ratio.<br>3. Adam buys apples until his MRS falls to 2. Eve sells until hers rises to 2.<br>4. Result: MRS_Adam = MRS_Eve = 2 = price ratio<br>5. Simultaneously, firms set MRT = 2 (price = marginal cost ratio)<br><b>Prices are the invisible coordinator. No central planner needed.</b>',
    swt:'<b>Second Welfare Theorem:</b><br>1. <b>Any efficient point is reachable</b> via: redistribute endowments first → then let markets work<br>2. Government handles EQUITY (who starts with what)<br>3. Markets handle EFFICIENCY (reaching Pareto optimal point from that start)<br>4. <b>Separation of efficiency and distribution</b><br>5. ⚠ Caveat: real redistribution uses taxes that distort behavior<br><b>In theory: perfect separation. In practice: some efficiency cost of redistribution is inevitable.</b>',
    mf_breaks:'<b>When assumptions fail → First Welfare Theorem breaks:</b><br>1. <b>Monopoly:</b> P > MC → MRT ≠ price ratio → inefficient<br>2. <b>Externalities:</b> social cost ≠ private cost → wrong prices → wrong quantities<br>3. <b>Public goods:</b> free-rider → underprovision → market doesn\'t exist<br>4. <b>Asymmetric info:</b> adverse selection → markets shrink or collapse<br>5. <b>Incomplete markets:</b> missing insurance → risk not managed<br>6. <b>Unemployment:</b> economy inside PPC → production inefficient<br><b>Each failure = a specific violation of a specific assumption. This is why public economics exists.</b>'
  };
  document.getElementById('wt-ins').innerHTML=exps[sc]||'Click a scenario.';
}

  }

    gCircle(svg,toX(rawlsX),toY(upc(rawlsX)),6,'#DC2626');gText(svg,toX(rawlsX)+(showUtil?-10:10),toY(upc(rawlsX))+(showUtil?10:-10),'Rawlsian\noptimum',9,'#DC2626',showUtil?'end':'start',700);

  }

    utilitarian:`<b>Utilitarian SWF: W = U₁ + U₂</b><br>1. Social indifference curves are <b>straight lines</b> with slope −1<br>2. Society trades off 1 util of Crusoe for 1 util of Friday equally<br>3. Optimum: highest line tangent to UPC → <b>maximizes total utility</b><br>4. May tolerate some inequality if it raises the total<br>5. Redistribution helps ONLY if diminishing MU makes transfer increase the sum<br><b>Utilitarian = maximize the pie size. Doesn't directly care about slice sizes.</b>`,
    rawlsian:`<b>Rawlsian SWF: W = min(U₁, U₂)</b><br>1. SICs are <b>L-shaped</b> (right angles at the 45° line)<br>2. Only the <b>worst-off person's</b> utility matters<br>3. Optimum: where UPC crosses the 45° line → <b>equal utilities</b><br>4. No trade-off: if poor person is worse off, only improving them counts<br>5. Much more equality-focused than utilitarian<br><b>Rawlsian = maximize the smallest slice. Doesn't care about total pie size.</b>`,
    compare:`<b>Comparison on the same UPC:</b><br>1. <b>Utilitarian optimum</b> (blue): may allow some inequality if total is higher<br>2. <b>Rawlsian optimum</b> (red): pushes toward equality (on 45° line)<br>3. Rawlsian point has MORE equality but possibly LESS total utility<br>4. Utilitarian point has MORE total but possibly MORE inequality<br>5. Neither is "right" — they represent different ethical commitments<br><b>This IS the efficiency-equity trade-off expressed through competing ethical frameworks.</b>`,
    criticism:`<b>Criticisms of both approaches:</b><br>1. <b>Interpersonal comparison:</b> we cannot directly measure or compare utility across people. How do we know Crusoe's loss equals Friday's gain?<br>2. <b>"Whence SWF?":</b> individuals have preferences, but society does not literally have a mind. Whose values does the SWF represent?<br>3. <b>Utilitarian weakness:</b> could justify sacrificing one person's welfare if the sum rises<br>4. <b>Rawlsian weakness:</b> ignores gains to everyone else — even massive gains are irrelevant if the worst-off doesn't benefit<br><b>Economists may be best limited to describing consequences and identifying gainers & losers, leaving the value judgment to society.</b>`};

function updLI(){

  gPath(svg,dB,'#DC2626',2);gText(svg,toX(.92),toY(Math.max(.05,mbB(.92)))+14,'MB_B',9,'#DC2626','start',700);
  // MC curve
  let dM='';for(let x=.02;x<=.95;x+=.005){const y=mc(x);if(y<1)dM+=(dM?'L':'M')+toX(x)+','+toY(y)}

    gPath(svg,dS,'#059669',2.5);gText(svg,toX(.55),toY(Math.min(.95,sumMB(.55)))+16,'ΣMB = MB_A + MB_B',9,'#059669','middle',700);
  }
