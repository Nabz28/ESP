// ═══ 21-22. QUIZZES — [FILL] {type,q,ctx,answer:[],chain,tip} ═══
const WEEK_QUIZZES={week1:[
{type:'concept',q:'What is Public Sector Economics?',ctx:'Week 1 foundational definition.',answer:['It is the study of the <b>government\'s role in allocating real resources</b> and of how taxes, spending, regulation, and policy affect efficiency, equity, and welfare.'],tip:'Always mention BOTH efficiency and equity — they are the two pillars.'},
{type:'concept',q:'Why is government considered special in economics?',ctx:'Distinguishing government from private actors.',answer:['Because it can <b>impose taxes</b>, has <b>monopoly power</b> in some activities, and faces <b>different incentives</b> from private firms.','A private firm must persuade buyers; government can legally require payment and enforce laws.'],tip:'This is why government gets its own field — it plays by different rules than firms.'},
{type:'concept',q:'Why does government influence extend beyond spending?',ctx:'The regulation dimension.',answer:['Because government also affects the economy through <b>regulation</b>: minimum wage laws, antitrust policy, environmental standards, licensing, safety rules.','A student who only looks at budgets misses half the picture — government shapes incentives through <b>rules</b>, not just money.'],tip:'Always mention regulation alongside fiscal tools in any answer about government\'s role.'},
{type:'concept',q:'What are the two main roles of the public sector?',ctx:'Core framework.',answer:['<b>Efficiency:</b> using scarce resources in the best possible way, correcting market failures.','<b>Equity / Fairness:</b> ensuring the distribution of income, opportunity, and access is socially acceptable.'],chain:'Efficiency asks: are resources used well? Equity asks: who benefits and who pays?',tip:'These two roles form the backbone of every Week 1 argument.'},
{type:'concept',q:'Why is there often a trade-off between efficiency and equity?',ctx:'Central tension in public economics.',answer:['Policies that improve fairness (redistribution) may <b>weaken incentives</b> — high earners may work less, invest less, or avoid taxes.','Policies that maximize efficiency may <b>worsen inequality</b> — market outcomes can leave many people behind.'],chain:'Heavy redistribution → high marginal tax → work disincentive → EFF↓ → trade-off',tip:'The exam question is never "which is better?" but "how much of each can be achieved, at what cost?"'},
{type:'concept',q:'What is a mixed economy?',ctx:'Economic system classification.',answer:['An economy where <b>both private enterprise and the government</b> carry out economic activities.','Examples: US, Western Europe, Indonesia, Japan, South Korea, Singapore.'],tip:'Most real-world economies are mixed. The debate is about the SIZE of government\'s role, not its existence.'},
{type:'concept',q:'What is market failure?',ctx:'Justification for intervention.',answer:['A situation where markets do <b>not produce efficient or socially desirable outcomes</b>.','Types: <b>public goods</b> (free-rider), <b>externalities</b> (unpriced spillovers), <b>asymmetric information</b> (adverse selection, moral hazard), <b>imperfect competition</b> (monopoly).'],chain:'Market failure → prices lie → misallocation → welfare loss → possible justification for intervention',tip:'Always identify the SPECIFIC type of market failure. "Market failure" alone is too vague.'},
{type:'concept',q:'What is government failure?',ctx:'The other side of the coin.',answer:['A situation where <b>government intervention fails to improve outcomes</b> or makes them worse.','Causes: <b>limited information</b>, <b>non-benevolent policymakers</b> (political self-interest), <b>excessive bureaucracy</b> (slow, rigid, expensive).'],tip:'This is the most important balancing concept. Never write "government should intervene" without discussing risks of failure.'},
{type:'concept',q:'Why does market failure not automatically justify intervention?',ctx:'Keynes\'s balanced argument.',answer:['Because <b>government may also fail</b>: limited information, political capture, bureaucratic waste.','The likely result of intervention must be <b>compared</b> with the likely result of leaving the market alone.','The right mindset is <b>comparative</b>: which failure is worse?'],chain:'Market failure exists → BUT will gov intervention improve it? → Compare both outcomes → Choose the better one',tip:'This comparative framework is what earns full marks on exam essays.'},
{type:'concept',q:'What is the balanced role of government?',ctx:'Modern conclusion from Week 1.',answer:['Markets often fail. Governments often do not successfully correct those failures.','Intervention should focus on the <b>most significant market failures</b> where government can actually improve outcomes.','Government and markets should <b>complement each other</b>, not replace each other.'],tip:'Do not romanticize markets OR government. The best answer always shows balance.'},
{type:'concept',q:'What are the three tiers of government in Indonesia?',ctx:'Indonesian institutional structure.',answer:['<b>Central:</b> led by the President (1)','<b>Provincial:</b> led by Governors (34)','<b>City/District:</b> led by Mayors or Bupati (539)'],tip:'Know the numbers: 1 + 34 + 539.'},
{type:'concept',q:'What is Big Bang decentralization in Indonesia?',ctx:'2001 reform.',answer:['The major decentralization reform starting in <b>2001</b> that shifted Indonesia from a highly centralized/authoritarian system to a more <b>decentralized and democratic</b> one.','Democratization since 1999, decentralization since 2001, direct elections since 2004.'],tip:'Always mention all three dates: 1999, 2001, 2004.'},
{type:'concept',q:'What six authorities remain with the central government?',ctx:'Post-decentralization.',answer:['1. Defense, 2. Security, 3. Judicial system, 4. Foreign diplomatic relations, 5. Monetary and fiscal policy, 6. Religion affairs.','Everything else is more decentralized.'],tip:'Memorize all six. Everything else → local government.'},
{type:'concept',q:'What four questions should a public sector economist ask?',ctx:'Analytical framework.',answer:['1. <b>What</b> is to be produced? (public goods vs private goods)','2. <b>How</b> is it to be produced? (public sector vs private sector)','3. <b>For whom</b> is it produced? (distribution, targeting, equity)','4. <b>How</b> are decisions made? (collective decisions, politics, institutions)'],tip:'Use this as your ANSWER STRUCTURE for any policy evaluation question. It is a ready-made rubric.'},
{type:'concept',q:'What are the four steps in analyzing the public sector?',ctx:'Method of analysis.',answer:['1. <b>Know</b> what activities the public sector engages in','2. <b>Understand</b> and anticipate the consequences','3. <b>Evaluate</b> alternative policies','4. <b>Interpret</b> the political process'],chain:'What is gov doing? → What effects? → Better alternative? → What politics shape it?',tip:'This is the method for the whole course. Use it on every policy question.'},
{type:'scenario',q:'If the government raises taxes on households, what happens in the circular flow?',ctx:'Circular flow analysis.',answer:['More money flows from <b>HH → GOV</b> (larger tax arrow)','Household <b>disposable income falls</b>','<b>Consumption may decline</b> (HH buy less)','Firms may face <b>lower demand</b> and sell less','Government revenue increases, enabling more spending or debt reduction'],chain:'TAX↑ → HH income↓ → C↓ → Firm revenue↓ → output↓ → employment↓',tip:'Always trace BOTH directions: more to government, less to firms via households.'},
{type:'scenario',q:'If the government gives more subsidies to firms, what might happen?',ctx:'Circular flow: firm subsidies.',answer:['Firms\' <b>effective costs may fall</b>','<b>Production may rise</b> or <b>prices may decrease</b>','Employment may increase if firms expand','But: firms may keep subsidy as profit → no consumer benefit (leakage)'],chain:'SUB↑ → Firm costs↓ → output↑ or prices↓ → consumers benefit (if passed through)',tip:'Always ask: who ACTUALLY benefits? The intended recipient or someone else? This is the incidence question.'},
{type:'scenario',q:'Why might a pollution problem justify intervention?',ctx:'Negative externality.',answer:['Pollution is a <b>negative externality</b> — firms do not fully bear the social cost.','The market ignores the damage to health and environment → <b>overproduction</b>.','Social cost > private cost → the market price is too low.','Government can intervene through <b>Pigouvian tax</b> or regulation to internalize the external cost.'],chain:'Pollution → social cost > private cost → market Q > social optimum → tax/regulate to correct',tip:'Draw the MPC vs MSC gap. The triangle between them is the DWL.'},
{type:'scenario',q:'Why might intervention in pollution still fail?',ctx:'Government failure in practice.',answer:['Government may <b>not measure the externality correctly</b> — how much damage does pollution actually cause?','<b>Enforcement may be weak</b> — firms evade regulations','<b>Political capture</b> — polluting industries lobby against regulation','Bureaucratic delays may make the intervention too slow or too costly'],tip:'The existence of market failure is necessary but NOT sufficient for intervention. You must also evaluate the quality of the likely government response.'},
{type:'concept',q:'Why is public economics linked to politics?',ctx:'Collective decision-making.',answer:['Because taxes, spending, and public programs are <b>collective decisions</b>.','They are shaped by institutions, voting, bargaining, lawmaking, and political incentives — not just price signals.','Politicians face reelection pressure, interest group lobbying, and bureaucratic constraints.'],tip:'Always mention the political dimension. A technically perfect policy may fail politically.'},
{type:'concept',q:'Why can a policy be efficient but still controversial?',ctx:'Efficiency vs equity tension.',answer:['Because it may <b>increase total output</b> or improve resource use overall...','...while <b>distributing benefits and costs</b> in a way society sees as <b>unfair</b>.','Example: removing a subsidy improves efficiency but hurts low-income households who depended on it.'],tip:'Always distinguish: "is this efficient?" vs "is this fair?" A policy can pass one test and fail the other.'},
{type:'scenario',q:'If government spending rises from 20% to 35% of GDP, what does this mean?',ctx:'Government spending comparison.',answer:['The public sector\'s <b>direct fiscal role has become larger</b>.','This could reflect: larger welfare programs, more infrastructure, crisis response, defense buildup, or stronger redistribution.','It does NOT automatically mean the government is more efficient or effective — it only shows <b>size</b>.'],tip:'High spending ratio ≠ good government. It just means government is doing more. Whether that "more" is helpful depends on HOW it spends.'},
{type:'concept',q:'Name the historical thinkers and their views on government\'s role.',ctx:'History of economic thought.',answer:['<b>Adam Smith (1776):</b> limited government role — markets coordinate well','<b>Mill & Nassau (1870s):</b> laissez-faire — minimize intervention','<b>Keynes (1929):</b> government intervention needed for market failures','<b>Marx:</b> government should control resources and production'],chain:'Smith (limited) → Mill (laissez-faire) → Keynes (intervene for failures) → Marx (full control)',tip:'These represent a spectrum from minimal to maximal government. Keynes\'s balanced argument is the most exam-relevant.'},
{type:'scenario',q:'A country has high GDP growth but rising inequality. Using Week 1 concepts, explain and recommend.',ctx:'Efficiency vs equity applied.',answer:['<b>Diagnosis:</b> The economy is efficient (high growth) but inequitable (rising inequality).','The market is producing output well but distributing gains unevenly.','<b>Trade-off:</b> Redistribution could improve equity but may reduce growth incentives.','<b>Recommendation:</b> Targeted transfers and progressive taxation can improve equity with minimal efficiency cost. Focus on education and health access (positive externality correction). Avoid blanket subsidies that distort markets.'],chain:'High growth but inequality → EFF✓ but EQ✗ → targeted redistribution → EQ↑ with minimal EFF↓',tip:'This is the classic Week 1 synthesis question. Show you understand both roles and the trade-off.'},
{type:'concept',q:'Summarize Week 1 in one sentence.',ctx:'Ultimate synthesis.',answer:['Public Sector Economics studies how <b>government choices on taxes, spending, regulation, and public provision</b> affect <b>efficiency, equity, and welfare</b>, while recognizing both <b>market failure</b> and <b>government failure</b>.'],tip:'This sentence contains every key concept from Week 1. Use it as your mental anchor.'},
],week2:[
{type:'concept',q:'What is Pareto efficiency?',ctx:'Core Week 2 definition.',answer:['A situation where <b>no one can be made better off without making someone else worse off</b>.','All gains from trade, production improvements, and product mix adjustments have been exhausted.'],chain:'No win-win moves remain → Pareto efficient',tip:'Always add: Pareto efficient ≠ fair. An extremely unequal allocation can still be Pareto efficient.'},
{type:'concept',q:'What is a Pareto improvement?',ctx:'Movement toward efficiency.',answer:['A change that makes <b>at least one person better off without making anyone worse off</b>.','If such a move still exists, the current allocation is NOT Pareto efficient.'],tip:'Pareto improvement = win-win. If win-win moves remain, you are not yet efficient.'},
{type:'concept',q:'What are the three conditions for full Pareto efficiency?',ctx:'The complete efficiency framework.',answer:['<b>1. Exchange efficiency:</b> MRS<sub>Adam</sub> = MRS<sub>Eve</sub> — goods go to who values them most','<b>2. Production efficiency:</b> economy is on the PPC — cannot increase one output without reducing another','<b>3. Product mix efficiency:</b> MRT = MRS — producing the bundle consumers actually want'],chain:'Exchange (right allocation) + Production (right quantity) + Product mix (right composition) = Pareto efficient',tip:'Memorize all three. If asked "what conditions for Pareto efficiency?" this is the complete answer.'},
{type:'diagram',q:'What does the Edgeworth Box show and why does tangency matter?',ctx:'Exchange efficiency visualization.',answer:['The box shows <b>all possible allocations of two goods between two people</b>.','Width = total apples, Height = total fig leaves. Adam bottom-left, Eve top-right.','<b>Crossing</b> indifference curves → MRS differ → gains from trade exist → inefficient.','<b>Tangent</b> indifference curves → MRS equal → no more gains → exchange efficient.'],chain:'Crossing IC → MRS differ → trade helps both → move to tangency → contract curve',tip:'Tangency = equal MRS = no gains from trade = exchange efficient. This is the key visual test.'},
{type:'concept',q:'What is the contract curve?',ctx:'Set of efficient allocations.',answer:['The set of <b>all Pareto efficient allocations</b> in the Edgeworth Box.','Connects all tangency points where MRS<sub>Adam</sub> = MRS<sub>Eve</sub>.','Does NOT tell which point is fairest — only which are efficient.'],tip:'Contract curve shows efficiency, not fairness. Some points heavily favor Adam, others Eve.'},
{type:'concept',q:'What is MRS and what does it measure?',ctx:'Consumption-side concept.',answer:['<b>Marginal Rate of Substitution</b> = |slope of indifference curve|.','Shows how much of one good a person will give up for another while maintaining the same utility.','When MRS differs across consumers → gains from trade exist.'],tip:'MRS is the CONSUMPTION concept. MRT is the PRODUCTION concept. Do not confuse them.'},
{type:'concept',q:'What is MRT and how does it relate to marginal costs?',ctx:'Production-side concept.',answer:['<b>Marginal Rate of Transformation</b> = |slope of PPC| = MC_a / MC_f.','Shows how many fig leaves must be sacrificed to produce one more apple.','It is the production-side trade-off, increasing along the PPC (increasing opportunity cost).'],tip:'MRT connects to marginal costs. Always write MRT = MC_a/MC_f when defining it.'},
{type:'concept',q:'What does it mean to be inside, on, or outside the PPC?',ctx:'Production efficiency.',answer:['<b>Inside:</b> feasible but inefficient — resources wasted, unemployment, poor organization.','<b>On:</b> feasible and production efficient — cannot increase one good without reducing another.','<b>Outside:</b> unattainable with current resources and technology.'],tip:'If asked why an economy is inside the PPC: unemployment, misallocation, or institutional failures.'},
{type:'concept',q:'What is product mix efficiency and why does it matter?',ctx:'The third efficiency condition.',answer:['<b>MRT = MRS for all consumers.</b>','The production trade-off must match the consumption valuation.','If MRT > MRS → producing too many apples (cost exceeds value).','If MRT < MRS → too few apples (value exceeds cost).'],chain:'MRT > MRS → reduce apples → MRT falls toward MRS → product mix improves',tip:'Product mix answers: are we at the RIGHT point on the frontier? Not just on it, but at the point consumers want.'},
{type:'concept',q:'State the First Welfare Theorem and its assumptions.',ctx:'The invisible hand formalized.',answer:['<b>Every competitive economy is Pareto efficient.</b>','In competitive equilibrium: MRS<sup>A</sup> = P_a/P_f = MRS<sup>E</sup> = MRT → all three conditions hold.','<b>Required assumptions:</b> private ownership, many buyers/sellers, no price influence, full information, resource mobility.'],chain:'Competitive prices → all agents optimize to same ratio → MRS = MRT → Pareto efficient',tip:'ALWAYS list the assumptions. The theorem fails when any assumption is violated → market failure.'},
{type:'concept',q:'State the Second Welfare Theorem and explain why it matters.',ctx:'Separating efficiency from equity.',answer:['<b>Every Pareto efficient allocation can be reached via competitive markets with appropriate initial redistribution.</b>','Allows <b>separation</b>: government handles fairness (redistribute endowments), markets handle efficiency.'],chain:'Redistribute endowments → let competitive markets operate → reach desired efficient point',tip:'Important caveat: real redistribution (taxes) distorts behavior → efficiency cost. Clean separation rarely works in practice.'},
{type:'concept',q:'What is the Utility Possibility Curve and how does it relate to the contract curve?',ctx:'From goods space to utility space.',answer:['The UPC traces <b>maximum utility combinations</b> for two consumers.','Derived from the contract curve: each efficient goods allocation maps to a utility pair.','Points on UPC = Pareto efficient. Inside = inefficient.'],tip:'UPC is the contract curve translated into utility space. It is evaluated by the SWF.'},
{type:'concept',q:'Why do we need a social welfare function if we already have Pareto efficiency?',ctx:'The limits of efficiency analysis.',answer:['Because there are <b>many Pareto efficient points</b> — the entire contract curve / UPC.','Pareto analysis cannot choose among them.','The SWF W = F(U_A, U_E) represents society\'s fairness values to pick the best efficient point.','Social optimum = highest social indifference curve tangent to UPC.'],tip:'Pareto gives the menu. SWF places the order. Without SWF, efficiency analysis is incomplete.'},
{type:'concept',q:'List the six causes of market failure.',ctx:'When the invisible hand fails.',answer:['1. <b>Failure of competition</b> — monopoly, market power','2. <b>Public goods</b> — free-rider, underprovision','3. <b>Externalities</b> — unpriced spillovers','4. <b>Information failures</b> — asymmetric info, adverse selection, moral hazard','5. <b>Incomplete markets</b> — missing insurance/capital markets','6. <b>Macro disequilibrium</b> — unemployment, inflation'],tip:'Memorize all six. Each violates an assumption of the First Welfare Theorem.'},
{type:'concept',q:'What is the difference between market failure and market imperfections?',ctx:'Outcome vs mechanism.',answer:['<b>Market failure</b> = outcome-level problem: market does not reach Pareto efficiency.','<b>Market imperfections</b> = specific frictions that CAUSE failure: information problems, capital market issues, market structure.'],tip:'Imperfections are the disease; failure is the symptom. Identify both in exam answers.'},
{type:'scenario',q:'If Adam\'s MRS is 3 and Eve\'s MRS is 1, is the allocation exchange efficient? What should happen?',ctx:'Applying exchange efficiency.',answer:['<b>Not exchange efficient</b> because MRS<sub>Adam</sub> ≠ MRS<sub>Eve</sub>.','Adam values apples 3× more than Eve relative to fig leaves.','<b>Trade:</b> Eve sells apples to Adam for between 1 and 3 fig leaves each → both gain.','Trade continues until MRS equalizes → on the contract curve.'],chain:'MRS_A=3 > MRS_E=1 → Eve sells apples to Adam → both gain → MRS converge → exchange efficient',tip:'Whenever MRS differ, identify who values which good more, then describe the beneficial trade.'},
{type:'scenario',q:'An economy operates inside the PPC. The government claims the economy is efficient. Evaluate this claim.',ctx:'Production efficiency test.',answer:['The claim is <b>false</b>. Inside the PPC means resources are not fully or efficiently used.','The economy could produce <b>more of one or both goods</b> without sacrificing anything.','Possible causes: unemployment, mismanagement, institutional barriers.','Moving to the frontier would be a Pareto improvement.'],tip:'Inside PPC = unambiguously inefficient. This is one of the clearest efficiency tests.'},
{type:'scenario',q:'A competitive market produces an efficient but very unequal outcome. Using the welfare theorems, explain what can be done.',ctx:'Applying the Second Welfare Theorem.',answer:['<b>First theorem confirms:</b> the competitive outcome IS Pareto efficient — no waste.','<b>But efficiency ≠ fairness:</b> distribution may be socially unacceptable.','<b>Second theorem says:</b> redistribute initial endowments, then let markets operate → reach a different, more equal, efficient point.','<b>Practical caveat:</b> real redistribution uses taxes that distort behavior → some efficiency loss is inevitable.'],chain:'Efficient but unequal → redistribute endowments → new competitive eq → more equal AND still efficient (in theory)',tip:'This is the exam synthesis question. Show you understand both theorems and the practical limitation.'},
{type:'concept',q:'Why is government still needed even though the First Welfare Theorem sounds pro-market?',ctx:'Bridge to public economics.',answer:['Because the theorem depends on <b>strong assumptions</b> that often fail:','Incomplete information → adverse selection, moral hazard','Market power → monopoly, restricted output','Externalities → unpriced costs','Public goods → free-rider','Missing markets → insurance gaps, capital constraints','When assumptions fail → market failure → potential role for government.'],tip:'The first theorem is PRO-market only when conditions hold. Public economics is about what happens when they don\'t.'},
{type:'concept',q:'Summarize Week 2 in one sentence.',ctx:'Ultimate synthesis.',answer:['Week 2 shows how <b>Pareto efficiency</b> (exchange, production, product mix) is achieved in competitive markets under the <b>welfare theorems</b>, but <b>market failures</b> and <b>fairness concerns</b> make public sector analysis necessary.'],tip:'This sentence connects efficiency, welfare theorems, market failure, and equity — the four pillars of Week 2.'},
],week3:[
{type:'concept',q:'What is the main problem addressed in Week 3?',ctx:'Core question.',answer:['How society chooses between <b>efficiency and equity</b> when policies that improve one may worsen the other.','A free market may be Pareto efficient but produce an <b>undesirable distribution of income</b>.'],tip:'This is THE question: if efficiency and fairness conflict, how should society choose?'},
{type:'concept',q:'Why does redistribution have diminishing social returns?',ctx:'Diminishing MU applied to transfer policy.',answer:['Because of <b>diminishing marginal utility</b>.','Early transfers give the poor (high MU) large gains while the rich (low MU) lose little.','As the poor get richer, their MU falls → each additional transfer produces a smaller net gain.'],chain:'Transfer 1: poor MU=40, rich MU=10 → net gain=30. Transfer 5: poor MU=20, rich MU=15 → net gain=5. Gains shrink.',tip:'Use the A→B→C diagram on the UPC. Friday\'s gain shrinks from A→B to B→C.'},
{type:'concept',q:'Why do costly transfers shrink the UPC inward?',ctx:'Efficiency cost of redistribution.',answer:['Because taxes and subsidies create <b>disincentive effects</b>:','Rich may <b>work less</b> when taxed heavily.','Poor may <b>work less</b> when heavily subsidized.','Administrative costs of the transfer system.','These behavioral responses mean society <b>loses total welfare</b> during redistribution.'],tip:'The gap between costless and costly UPC = the efficiency cost of redistribution. This IS the efficiency-equity trade-off visualized.'},
{type:'concept',q:'Write the utilitarian SWF and explain what it maximizes.',ctx:'Utilitarian ethics.',answer:['<b>W = U₁ + U₂</b> (or W = ΣUᵢ for n people).','Maximizes the <b>sum of utilities</b>. Each person\'s utility weighted equally.','Supports redistribution when diminishing MU makes transfer <b>increase the total</b>.','SIC = straight line with slope −1.'],tip:'Utilitarian = maximize the pie. Doesn\'t directly care about slice sizes.'},
{type:'concept',q:'Write the Rawlsian SWF and explain what it prioritizes.',ctx:'Rawlsian ethics.',answer:['<b>W = min(U₁, ..., Uₙ)</b>.','Prioritizes the <b>welfare of the worst-off individual</b>.','If the poor person is worse off, only improving them counts. <b>No trade-off.</b>','Gains to better-off individuals are irrelevant unless they help the worst-off.','SIC = L-shaped (right angles).'],tip:'Rawlsian = maximize the smallest slice. Compare with utilitarian on the SAME UPC.'},
{type:'concept',q:'What are the two major criticisms of the social welfare approach?',ctx:'Methodological limits.',answer:['<b>1. Interpersonal comparisons:</b> we cannot directly measure utility or compare changes across people. How do we compare Friday\'s gain to Crusoe\'s loss?','<b>2. "Whence SWF?":</b> individuals have preferences, but society doesn\'t literally have a mind. Whose values does the SWF represent?'],tip:'Conclude: economists may be best limited to describing consequences and identifying gainers & losers.'},
{type:'concept',q:'What is consumer surplus and how is it measured?',ctx:'Welfare measurement.',answer:['<b>CS = WTP − Actual payment</b>.','Area under the demand curve, above the price, up to quantity consumed.','For government projects: if CS > cost → project is worth undertaking.','<b>Net efficiency effect = Total WTP − Total cost.</b>'],tip:'CS is the primary tool for cost-benefit analysis of public projects.'},
{type:'concept',q:'What is deadweight loss and why does it matter?',ctx:'Excess burden of taxation.',answer:['<b>DWL = WTP to eliminate tax − Revenue raised.</b>','The tax distorts behavior → some welfare is <b>destroyed</b>, not transferred.','Example: WTP=$100, Revenue=$80 → DWL=$20.','DWL grows with the <b>SQUARE</b> of the tax rate → high taxes are disproportionately costly.'],chain:'Tax↑ → price↑ → quantity↓ → revenue rectangle + DWL triangle. DWL triangle grows quadratically.',tip:'Always mention: DWL is welfare that NOBODY gets. It\'s pure waste from behavioral distortion.'},
{type:'concept',q:'What is the difference between compensated and ordinary demand?',ctx:'Welfare measurement precision.',answer:['<b>Compensated demand:</b> holds utility constant → captures only <b>substitution effect</b> (SE).','<b>Ordinary demand:</b> holds nominal income constant → captures SE + <b>income effect</b> (IE).','MU curve = compensated demand curve.','Compensated demand is better for welfare analysis because it keeps utility comparable.'],tip:'For a normal good: ordinary demand shows larger quantity increase from a price fall because it includes the income effect.'},
{type:'concept',q:'Explain the compensation principle and its weakness.',ctx:'Policy evaluation approach.',answer:['<b>Principle:</b> if aggregate WTP > total cost, undertake the project.','Winners could in principle compensate losers and still be better off.','<b>Weakness:</b> ignores who gains and who loses. Actual compensation may not happen.','Distributional unfairness can persist even if the project is "efficient."'],tip:'The compensation principle is necessary but not sufficient. Always add distributional analysis.'},
{type:'scenario',q:'A government considers building a highway. Total WTP = $500M. Cost = $400M. Rich suburbs gain $350M, poor inner city gains $150M but loses $100M in displacement. Evaluate.',ctx:'Applied policy evaluation using Week 3 framework.',answer:['<b>Efficiency:</b> Net benefit = $500M − $400M = $100M > 0 → efficient ✓','<b>Compensation principle:</b> aggregate WTP > cost → pass ✓','<b>Distribution:</b> rich gain $350M, poor gain net $50M ($150M − $100M). Rich gain 7× more.','<b>Weighted net benefit:</b> if we weight poor gains 2× → weighted benefit = $350M + 2×$50M = $450M vs cost $400M → still positive but barely.','<b>Conclusion:</b> efficient, but equity concern. Consider compensation: use some gains to offset displacement costs for the poor.'],chain:'Total WTP > Cost → efficient ✓ BUT distribution heavily favors rich → equity concern → weighted analysis needed',tip:'This is the full 5-step framework: (1) identify gains/losses, (2) check Pareto, (3) aggregate net benefit, (4) efficiency-equity trade-off, (5) weighted benefit.'},
{type:'scenario',q:'In the cigarette tax example, if the tax rate doubles, what happens to DWL?',ctx:'DWL grows quadratically.',answer:['DWL grows with the <b>square of the tax rate</b>.','If original DWL = $20 at tax t, doubling the tax → DWL ≈ $20 × 4 = $80 (approximately).','Revenue may increase less than proportionally because the tax base shrinks more.','<b>Key insight:</b> very high taxes are disproportionately costly in welfare terms.'],tip:'DWL ∝ t². This is why economists prefer broad-based low-rate taxes over narrow high-rate taxes.'},
{type:'concept',q:'Summarize Week 3 in one sentence.',ctx:'Ultimate synthesis.',answer:['Week 3 explains how society evaluates <b>efficiency-equity trade-offs</b> using the UPC, <b>diminishing MU</b>, <b>utilitarian and Rawlsian SWFs</b>, <b>WTP</b>, <b>consumer surplus</b>, and <b>DWL</b>, while recognizing that redistribution has both benefits (equity) and costs (disincentives).'],tip:'This captures every major concept from Week 3.'},
],week4:[
{type:'concept',q:'What are the two characteristics used to classify goods?',ctx:'Core framework.',answer:['<b>1. Excludability:</b> Can non-payers be kept out?','<b>2. Rivalry:</b> Does one person\'s use reduce what\'s left for others?'],tip:'Every goods classification question starts here. Always check both dimensions.'},
{type:'concept',q:'Name the four types of goods and their characteristics.',ctx:'The 2×2 matrix.',answer:['<b>Private goods:</b> excludable + rival (food, cars)','<b>Common-pool resources:</b> nonexcludable + rival (fish, timber)','<b>Club goods:</b> excludable + nonrival (cinema, satellite TV)','<b>Pure public goods:</b> nonexcludable + nonrival (defense, air)'],tip:'Memorize the matrix. Place any good by asking: excludable? rival?'},
{type:'concept',q:'What is the free-rider problem and why does it occur?',ctx:'Public goods market failure.',answer:['The incentive to let others pay while still enjoying the benefit.','Occurs because public goods are <b>nonexcludable</b> — non-payers cannot be kept out.','If everyone free-rides → good is <b>underfunded or not provided</b>.','Theoretical solution: perfect price discrimination (practically impossible).'],tip:'Free-rider = public good problem = underprovision. Tragedy of commons = common-pool problem = overuse. Different!'},
{type:'concept',q:'How does tragedy of the commons differ from the public goods problem?',ctx:'Two different market failures.',answer:['<b>Public goods:</b> nonrival + nonexcludable → nobody pays → <b>underprovision</b>','<b>Commons:</b> rival + nonexcludable → everybody takes → <b>overuse</b>','Same root (nonexcludability) but opposite symptoms!'],chain:'Public good: underpay → underprovide. Commons: overuse → deplete.'},
{type:'concept',q:'How is market demand derived for private goods vs public goods?',ctx:'THE key contrast of Week 4.',answer:['<b>Private goods: HORIZONTAL summation</b>','At same price → add quantities across individuals','MRS_Adam = MRS_Eve = MRT','','<b>Public goods: VERTICAL summation</b>','At same quantity → add WTP/prices across individuals','MRS_Adam + MRS_Eve = MRT'],tip:'This is the single most important distinction. Private = horizontal (add Q). Public = vertical (add P).'},
{type:'concept',q:'Write the Pareto efficiency condition for public goods and explain why it differs from private goods.',ctx:'Samuelson condition.',answer:['<b>Public:</b> MRS_Adam + MRS_Eve = MRT (SUM of marginal valuations = MRT)','<b>Private:</b> MRS_Adam = MRS_Eve = MRT (EACH marginal valuation = MRT)','<b>Why different:</b> Everyone consumes the SAME quantity of a public good, so total social value = sum of individual values at that quantity.'],tip:'Public good = same quantity, add values. Private good = same price, add quantities.'},
{type:'concept',q:'What is the difference between public provision and public production?',ctx:'Institutional design.',answer:['<b>Provision:</b> who pays/ensures availability (financing)','<b>Production:</b> who actually makes/delivers (operations)','Education = publicly PROVIDED private good (gov finances, schools may be private)','Garbage = privately PRODUCED public service (gov contracts out)'],tip:'The question is: who finances? who produces? who receives? Three separate decisions.'},
{type:'concept',q:'Name the three methods of rationing publicly provided goods.',ctx:'Policy tools.',answer:['<b>1. User charges:</b> beneficiaries pay → but may underconsume + transaction costs','<b>2. Uniform provision:</b> saves transaction costs → but mismatch (some get too much/little)','<b>3. Queuing:</b> not wealth-based → but wastes time, favors those with time'],tip:'Rationing never disappears — if price doesn\'t ration, something else does.'},
{type:'concept',q:'Summarize Week 4 in one sentence.',ctx:'Synthesis.',answer:['Week 4 classifies goods by <b>rivalry and excludability</b>, explains why <b>public goods</b> (free-rider) and <b>common-pool resources</b> (tragedy of commons) cause different market failures, and shows that efficient provision requires <b>horizontal summation</b> for private goods but <b>vertical summation</b> for public goods.'],tip:'Covers: classification, two market failures, two summation rules, provision vs production.'},
],week5:[
{type:'concept',q:'What is an externality?',ctx:'Core definition.',answer:['An activity by one person or firm that affects the welfare of another <b>outside the market mechanism</b>.','The effect exists but is not reflected in market prices.'],tip:'Key phrase: "outside the market mechanism." If it\'s priced, it\'s not an externality.'},
{type:'concept',q:'Why do negative externalities cause overproduction?',ctx:'MSC vs MPC.',answer:['Firms choose output using <b>MPC</b> (ignoring damage).','Society cares about <b>MSC = MPC + MD</b>.','Since MSC > MPC, the efficient output Q* < market output Q₁.','Firms produce too much because they don\'t face the full cost.'],chain:'Firm uses MPC → ignores MD → Q₁ > Q* → DWL = triangle between Q* and Q₁',tip:'Always draw MSC above MPC. The vertical gap = MD.'},
{type:'concept',q:'State the Coase Theorem and its conditions.',ctx:'Private solution.',answer:['If <b>transaction costs are low</b> and <b>property rights are clearly assigned</b>, private bargaining achieves an efficient solution.','Does NOT require government — parties negotiate to Q*.','Requires: low bargaining costs + ability to identify and legally control damage source.'],tip:'Coase works in theory but often fails in practice: many affected parties, high transaction costs, unclear rights.'},
{type:'concept',q:'What is a Pigouvian tax and how is it set?',ctx:'Public correction.',answer:['A tax on each unit of output equal to <b>MD at Q*</b>.','Shifts firm\'s cost from MPC to MPC+t* → firm faces true social cost → produces Q*.','<b>Two effects:</b> corrects externality AND raises revenue.'],tip:'If tax is set wrong: too low → still overproduces. Too high → underproduces. Requires accurate MD measurement.'},
{type:'concept',q:'Why is uniform pollution reduction NOT cost effective?',ctx:'Cost-effectiveness principle.',answer:['Because firms have <b>different marginal abatement costs</b>.','Equal reductions (50 each) mean Homer (high MC) overpays while Bart (low MC) underpays.','<b>Cost-effective:</b> equalize MC across firms → Bart reduces 75 (cheap), Homer reduces 25 (expensive).'],chain:'MC_B ≠ MC_H under uniform → NOT cost effective. MC_B = MC_H under fee/C&T → cost effective.',tip:'Equal ≠ efficient. "Fair-looking" rules waste money.'},
{type:'concept',q:'How does cap-and-trade achieve cost-effectiveness?',ctx:'Permit trading.',answer:['Government sets total cap and issues permits.','Firms <b>trade</b> permits: low-MC firms sell, high-MC firms buy.','Trading continues until <b>MC_B = MC_H = permit price</b>.','Same result as emissions fee but fixes QUANTITY not PRICE.'],tip:'Initial permit allocation affects distribution but NOT efficiency (assuming trading works well).'},
{type:'concept',q:'When is cap-and-trade better than emissions fees?',ctx:'Prices vs quantities.',answer:['When <b>MSB of pollution reduction is inelastic</b> (steep).','Missing the exact pollution quantity is very costly.','C&T fixes quantity → safer when exact target matters.','Example: pollution near a toxic threshold.'],tip:'Inelastic MSB → fix quantity (C&T). Elastic MSB → fix price (fee). Classic "prices vs quantities" result.'},
{type:'concept',q:'Write MSB = MPB + MEB and explain why markets underprovide positive externalities.',ctx:'Mirror of negative case.',answer:['<b>MSB = MPB + MEB</b>: social benefit = private benefit + external spillover.','Firms only see MPB → invest until MC = MPB at R₁.','But society wants MC = MSB at R* > R₁.','Market underprovides because firms don\'t capture the spillover.'],chain:'R&D creates knowledge spillovers (MEB) → firm captures only MPB → invests too little → subsidy s*=MEB corrects',tip:'Mirror: negative ext → tax to reduce. Positive ext → subsidy to increase. Both correct the gap between private and social.'},
{type:'scenario',q:'A factory pollutes a river. Nearby residents suffer $30/unit health damage. Factory\'s MPC=$40/unit. Market price=$70/unit. Is there overproduction?',ctx:'Applied negative externality.',answer:['<b>MSC = MPC + MD = $40 + $30 = $70.</b>','Market: firm produces where price ($70) = MPC ($40) → firm profit on each unit = $30.','But MSC = $70 = price → at THIS output, MSC just equals price.','If firm expands beyond this: MSC > price → overproduction begins.','<b>Pigouvian tax:</b> set t=$30 → MPC+t=$70 → firm faces true cost → efficient.'],tip:'Calculate MSC explicitly and compare to price/MB. The gap determines overproduction.'},
{type:'concept',q:'Summarize Weeks 5&6 in one sentence.',ctx:'Ultimate synthesis.',answer:['Weeks 5&6 explain how <b>externalities</b> cause market inefficiency, how <b>private</b> (Coase) and <b>public</b> (Pigouvian tax, emissions fee, cap-and-trade, subsidy) responses can internalize them, and how policy tools differ in <b>efficiency, cost-effectiveness, and distributional impact</b>.'],tip:'This covers: definition, private solutions, public solutions, instrument comparison, and distribution.'},
],week7:[
{type:'concept',q:'What is public choice and how does it differ from market choice?',ctx:'Core distinction.',answer:['<b>Public choice:</b> decision making through political interaction according to pre-established rules.','In markets, preferences revealed by <b>buying</b>. In politics, revealed through <b>voting, campaigns, institutions</b>.','Political choice is messier: an election cannot summarize information the way a price can.'],tip:'Public choice studies voters, politicians, and bureaucrats as economic agents with incentives.'},
{type:'concept',q:'What is the preference revelation problem?',ctx:'Fundamental challenge.',answer:['Voting reveals only <b>limited information</b> about how much each person values a public good.','A vote bundles many issues; it doesn\'t show intensity of preference.','People may <b>strategically misrepresent</b> preferences to reduce their tax share.'],tip:'This is why Lindahl equilibrium fails in practice and why public-good provision is inherently difficult.'},
{type:'concept',q:'What is Lindahl equilibrium and why is it theoretically attractive?',ctx:'Public-good pricing.',answer:['Each person pays a <b>personalized tax price</b> where MB_i = t_i.','Everyone consumes the <b>same quantity</b> G*.','<b>Σt_i = MC(G*)</b> → cost covered.','Attractive because it is <b>Pareto efficient</b> if preferences are truthfully revealed.'],chain:'MB_A = t_A, MB_B = t_B, t_A + t_B = MC → efficient quantity, cost covered',tip:'Private goods: same price, different quantities. Public goods: same quantity, different prices. This is the key contrast.'},
{type:'concept',q:'Why does Lindahl equilibrium fail in practice?',ctx:'Free-rider problem.',answer:['People may <b>understate their valuation</b> to reduce their tax share (free-rider problem).','If B lies about MB → apparent ΣMB falls → G\' < G* → <b>underprovision</b>.','The preference revelation problem makes truthful reporting unreliable.'],tip:'Theoretically elegant, practically impossible. The free-rider problem is the killer.'},
{type:'concept',q:'What is rational ignorance?',ctx:'Why voters stay uninformed.',answer:['When <b>MC_info > MB_info</b>, the voter rationally stays uninformed.','One voter has a tiny effect on the outcome → private return to information is very small.','Not irrational — just responding to incentives.'],tip:'Explains why political campaigns use slogans rather than detailed policy analysis.'},
{type:'concept',q:'Explain the voting paradox with the A, B, C example.',ctx:'Majority cycling.',answer:['<b>Voter A:</b> III > II > I, <b>Voter B:</b> I > III > II, <b>Voter C:</b> II > I > III','Pairwise: <b>II beats I</b> (2-1), <b>III beats II</b> (2-1), <b>I beats III</b> (2-1)','Result: <b>II ≻ I, III ≻ II, I ≻ III → CYCLE</b>','No stable winner. The outcome depends on <b>agenda order</b>.'],chain:'Individual rationality does NOT guarantee collective rationality.',tip:'This is THE example to memorize. Know how to do pairwise voting from any preference table.'},
{type:'concept',q:'What is the median voter theorem and when does it hold?',ctx:'Stable majority voting.',answer:['Under <b>single-peaked preferences</b> on one dimension, the <b>median voter\'s ideal point</b> = majority equilibrium.','Any proposal away from the median gets defeated by a coalition including the median voter.','Holds when: (1) preferences are single-peaked, (2) one-dimensional issue space.'],tip:'In two-party systems, both parties converge toward the median voter. This is a powerful political prediction.'},
{type:'concept',q:'What is the difference between single-peaked and multi-peaked preferences?',ctx:'Stability condition.',answer:['<b>Single-peaked:</b> one optimum, utility falls in both directions → stable majority voting.','<b>Multi-peaked:</b> multiple locally attractive regions → cycles and instability possible.'],tip:'Single-peaked = median voter works. Multi-peaked = voting paradox likely. Always check this condition.'},
{type:'concept',q:'What is Arrow\'s impossibility theorem?',ctx:'Fundamental limit of social choice.',answer:['No voting rule can always convert individual preferences into a consistent, fair collective ranking satisfying: no dictator, unanimity respect, consistency, and independence from irrelevant alternatives.','Does NOT mean democracy is useless — means every rule has <b>trade-offs</b>.'],tip:'Arrow shows the LIMITS of collective choice. Not a reason to abandon voting, but a reason to be humble about what voting can achieve.'},
{type:'concept',q:'Summarize Week 7 in one sentence.',ctx:'Synthesis.',answer:['Week 7 explains how societies make <b>collective decisions</b> about public goods through <b>Lindahl pricing</b>, <b>majority voting</b>, and political institutions, showing why <b>preference revelation</b>, <b>voting paradoxes</b>, and <b>Arrow\'s impossibility</b> make public choice fundamentally harder than market choice.'],tip:'Covers: Lindahl, rational ignorance, majority voting, voting paradox, median voter, Arrow.'},
]};
function renderWeekQuiz(wk){const qs=WEEK_QUIZZES[wk]||[];const el=document.getElementById('wk-quiz-panel');if(!el)return;if(!qs.length){el.innerHTML='<div class="wk-coming">No quiz questions.</div>';return}let h=`<div class="qz-intro">🎯 <strong>${qs.length} questions.</strong> Try before revealing!</div>`;qs.forEach((q,i)=>{h+=`<div class="qz-q"><div class="qz-q-head"><div class="qz-q-num">${i+1}</div><div class="qz-q-body"><span class="qz-q-type ${q.type}">${q.type}</span><div class="qz-q-text">${q.q}</div>${q.ctx?`<div class="qz-q-context">${q.ctx}</div>`:''}</div></div><button class="qz-reveal-btn" onclick="const a=this.nextElementSibling;a.classList.toggle('open');this.textContent=a.classList.contains('open')?'Hide Answer ▲':'Reveal Answer ▼'">Reveal Answer ▼</button><div class="qz-answer"><h5>Solution</h5>${q.answer.map(s=>`<div class="qz-step">${s}</div>`).join('')}${q.chain?`<div class="qz-chain">${q.chain}</div>`:''}${q.tip?`<div class="qz-tip">💡 ${q.tip}</div>`:''}</div></div>`});el.innerHTML=h}

// ═══ 23-24. GLOSSARY — [FILL] [{market,color,border,text,terms:[[name,def]]}] ═══
const GLOSSARY=[
{market:'Efficiency & Allocation',color:'#EFF6FF',border:'#2563EB',text:'#1E40AF',terms:[
['Efficiency','Using scarce resources in the best possible way. Markets need rules (property rights, contracts) and may need correction for failures.'],
['Allocation','Who gets what, how goods are produced, for whom, and how decisions are made. Public economics studies how government affects this.'],
['Pareto Efficiency','A state where no one can be made better off without making someone else worse off. The benchmark for market efficiency.'],
['Public Good','Non-rival (one person\'s use doesn\'t reduce availability) and non-excludable (can\'t prevent use). Examples: national defense, street lighting. Causes free-rider problem → underprovision.'],
['Externality','Cost or benefit affecting third parties not in the transaction. Negative (pollution): social cost > private cost → overproduction. Positive (education): social benefit > private benefit → underproduction.'],
['Pigouvian Tax','A tax equal to the external cost, designed to make private cost = social cost. Named after Arthur Pigou. Corrects negative externalities by internalizing the spillover.'],
['Regulation','Non-spending government intervention: minimum wages, antitrust, environmental standards, licensing. Changes behavior through rules, not money. Influence often larger than budget data suggest.'],
]},
{market:'Equity & Distribution',color:'#ECFDF5',border:'#059669',text:'#065F46',terms:[
['Equity / Fairness','Whether outcomes are socially acceptable. Asks who gets benefits and who bears costs. A market can be efficient but still unfair.'],
['Redistribution','Transfer of income/resources from one group to another via progressive taxes, welfare, social safety nets. The primary tool for equity.'],
['Efficiency–Equity Trade-off','Improving fairness may weaken incentives (high taxes → less work). Pushing efficiency may worsen inequality. The central tension in public economics.'],
['Progressive Taxation','Tax rate increases with income. Higher earners pay a larger share. Key equity tool but may create efficiency costs through disincentives.'],
['Transfer Payments','Government payments to individuals: social security, unemployment benefits, welfare, disability support. Increase household disposable income.'],
]},
{market:'Revenue & Spending',color:'#FFFBEB',border:'#D97706',text:'#92400E',terms:[
['Government Revenue','Total income from taxes, fees, charges, and non-tax sources. Funds all government activities. Design affects efficiency and equity.'],
['Government Expenditure','Spending on redistribution, subsidies, defense, infrastructure, education, health. Large fraction of GDP in most countries.'],
['Gov Expenditure/GDP Ratio','Government spending as % of GDP. Compares public sector size across countries. Higher ≠ better; it reflects choices about public-private balance.'],
['Budget Balance','Revenue minus Expenditure. Surplus if positive, deficit if negative. Persistent deficits require borrowing → future tax burden.'],
['Subsidy','Government payment reducing costs for firms or households. Can correct underprovision but may distort markets, create dependency, or be captured by unintended recipients.'],
['Net Tax Burden','Taxes paid minus transfers received. Determines whether a household/firm is a net contributor or net beneficiary of the public system.'],
]},
{market:'Economic Actors',color:'#F5F3FF',border:'#7C3AED',text:'#5B21B6',terms:[
['Households','Supply labor in input market, buy goods in output market. Pay taxes, receive transfers. Net position = taxes paid − transfers received.'],
['Firms','Demand labor, produce goods, sell output. Pay taxes, may receive subsidies. Government policy changes their costs, pricing, and production decisions.'],
['Government','Central actor in public economics. Collects revenue, provides services, redistributes. Special: can impose taxes, has monopoly over some activities.'],
['Circular Flow','Diagram showing flows of money, goods, resources between Households, Firms, and Government through Input and Output markets.'],
['Mixed Economy','Both private enterprise and government carry out economic activities. Most real economies (US, Europe, Indonesia). Debate is about the SIZE of government\'s role.'],
['Socialist Economy','Most economic activities carried out by government. Examples: Cuba, North Korea.'],
]},
{market:'Market & Government Failure',color:'#FDF2F8',border:'#DB2777',text:'#9D174D',terms:[
['Market Failure','Markets don\'t produce efficient/socially desirable outcomes. Types: public goods, externalities, asymmetric information, imperfect competition.'],
['Government Failure','Intervention fails to improve outcomes or makes them worse. Causes: limited information, non-benevolent policymakers, excessive bureaucracy, political constraints.'],
['Asymmetric Information','One party knows more than the other. Causes adverse selection (bad drives out good) and moral hazard (insured parties take more risk).'],
['Adverse Selection','Low-quality dominates when quality is unobservable. Example: unhealthy people buy more insurance → premiums rise → healthy leave → market shrinks.'],
['Moral Hazard','Behavior changes when risk is transferred. Example: insured person takes more risks because they don\'t bear the full cost.'],
['Free-Rider Problem','People benefit from a good without paying. Core problem of public goods. Why private markets underprovide national defense, street lighting, etc.'],
['Imperfect Competition','Monopoly or oligopoly restricts output and raises prices. Market equilibrium is inefficient because it does not reflect competitive pricing.'],
]},
{market:'Indonesia & Institutions',color:'#FEF2F2',border:'#DC2626',text:'#991B1B',terms:[
['Big Bang Decentralization','Indonesia\'s 2001 shift from centralized/authoritarian to decentralized/democratic governance. Largest decentralization in recent history.'],
['Three Tiers','Central (President), Provincial (34 Governors), City/District (539 Mayors/Bupati). Six authorities remain central; everything else decentralized.'],
['Six Central Authorities','Defense, Security, Judicial system, Foreign relations, Monetary & fiscal policy, Religion affairs. All other functions decentralized since 2001.'],
['Democratization (1999)','Indonesia\'s transition to democratic governance after the fall of Suharto. Preceded decentralization.'],
['Direct Elections (2004)','First direct presidential election in Indonesia. Strengthened democratic accountability at all government levels.'],
['Adam Smith','Wealth of Nations (1776). Limited government role — markets coordinate well through the invisible hand.'],
['Keynes','Government intervention needed to address market failures, especially during crises. BUT also warned about government failure. Balanced view.'],
['Laissez-faire','"Let it be." Associated with Mill & Nassau (1870s). Government should largely leave the private sector alone. Trusts markets strongly.'],
]},
{market:'Welfare Economics & Pareto',color:'#F0FDF4',border:'#16A34A',text:'#166534',terms:[
['Welfare Economics','Branch studying social desirability of economic outcomes. Distinguishes when markets work well from when they fail. Normative: asks what SHOULD happen.'],
['Pareto Efficiency','No one can be made better off without making someone else worse off. Does NOT mean fair — only means no win-win improvements remain.'],
['Pareto Improvement','A change making at least one person better off without making anyone worse off. If possible, current allocation is not efficient.'],
['MRS','Marginal Rate of Substitution. |slope of indifference curve|. Rate at which a person trades one good for another at constant utility. Equal MRS across consumers = exchange efficiency.'],
['MRT','Marginal Rate of Transformation. |slope of PPC| = MC_a/MC_f. How many fig leaves sacrificed for 1 more apple. Production-side trade-off.'],
['Exchange Efficiency','MRS_Adam = MRS_Eve. Goods go to who values them most. No more gains from trade. Shown by tangency in Edgeworth Box.'],
['Production Efficiency','Economy on the PPC. Cannot increase one output without reducing another. All resources fully and efficiently used.'],
['Product Mix Efficiency','MRT = MRS. Economy produces the right mix — production trade-off matches consumer preferences. Third condition for full Pareto efficiency.'],
['Edgeworth Box','Rectangle showing all possible allocations of 2 goods between 2 people. Crossing indifference curves = inefficient. Tangent = efficient.'],
['Contract Curve','Set of all Pareto efficient allocations in Edgeworth Box. Locus of tangency points. Maps to Utility Possibility Curve.'],
['PPC / PPF','Production Possibilities Curve/Frontier. Maximum output combinations. Inside = inefficient. On = efficient. Outside = unattainable.'],
['Utility Possibility Curve','Maximum utility combinations for 2 consumers. Derived from contract curve. Evaluated by social welfare function.'],
['Social Welfare Function','W = F(U_A, U_E). Society\'s ranking of utility combinations. Utilitarian: max sum. Rawlsian: max minimum. Picks among efficient points.'],
['First Welfare Theorem','Every competitive economy is Pareto efficient. Requires: private ownership, competition, price-taking, full info, resource mobility.'],
['Second Welfare Theorem','Every Pareto efficient point reachable via competitive markets + initial redistribution. Separates efficiency from equity. Caveat: real redistribution distorts.'],
['Invisible Hand','Adam Smith\'s metaphor: self-interested agents coordinated by prices produce efficient outcomes. Formalized by First Welfare Theorem.'],
]},
{market:'Market Imperfections (Week 2)',color:'#FFF7ED',border:'#EA580C',text:'#9A3412',terms:[
['Asymmetric Information','One party knows more than the other. Doctor vs patient. Seller vs buyer. Causes adverse selection and moral hazard.'],
['Adverse Selection','High-risk drives out low-risk when quality is unobservable. Insurance: unhealthy buy more → premiums rise → healthy leave → market shrinks.'],
['Moral Hazard','Behavior changes after insurance/contract because actions cannot be fully monitored. Insured person takes more risk.'],
['Principal-Agent Problem','Agent may act in own interest rather than principal\'s. Manager vs shareholders. Doctor vs patient.'],
['Capital Market Imperfection','Credit problems from imperfect info. Banks lend to secure borrowers, excluding productive but "risky-looking" individuals. Creates inequality.'],
['Market Structure Imperfection','Monopoly, barriers to entry (patents, licenses, economies of scale). One firm restricts output, raises price → P > MC → inefficient.'],
['Transaction Costs','Search, bargaining, negotiating, contracting costs. High transaction costs can prevent efficient exchange and cause market failure.'],
['Property Rights','Legal rights to own, use, and transfer assets. Necessary for markets to function. Without them, resources may be overused or unprotected.'],
['Common Property','Resources without clear ownership rules. Risk of overuse (tragedy of the commons). May require government regulation.'],
['Natural Monopoly','One firm can serve the entire market at lower cost than two or more. Economies of scale create barrier to entry.'],
]},
{market:'Efficiency & Equity (Week 3)',color:'#FEF9C3',border:'#CA8A04',text:'#854D0E',terms:[
['Diminishing MU','As consumption rises, marginal utility falls. Foundation of redistribution argument: transfers from rich (low MU) to poor (high MU) raise total welfare.'],
['Marginal Utility','Extra utility from one more unit = slope of utility function. MU = MU curve = compensated demand curve.'],
['Utility Function','Relationship between consumption and welfare. Rises but flattens — each extra unit adds less (diminishing MU).'],
['Costly Transfers','Redistribution via taxes/subsidies creates disincentives (work less). UPC with costly transfers lies INSIDE costless UPC.'],
['Utilitarian SWF','W = ΣUᵢ. Maximize total utility. Linear SICs (slope −1). Supports redistribution when MU gain to poor > MU loss to rich.'],
['Rawlsian SWF','W = min(Uᵢ). Maximize worst-off utility. L-shaped SICs. Only improving the worst-off raises welfare.'],
['Willingness to Pay','Maximum amount a person would pay for a benefit. WTP ≠ actual payment. MU of additional unit = additional WTP.'],
['Consumer Surplus','CS = WTP − Actual payment. Area under demand, above price. If CS > project cost → build it.'],
['Deadweight Loss','DWL = WTP to eliminate tax − Revenue. Welfare destroyed by behavioral distortion. Grows with t². Also called excess burden.'],
['Compensated Demand','Holds utility constant. Captures substitution effect only. = MU curve. Better for welfare measurement than ordinary demand.'],
['Ordinary Demand','Holds nominal income constant. Captures substitution + income effects. The actual market demand curve.'],
['Compensation Principle','If aggregate WTP > cost, undertake project. Weakness: ignores distribution — actual compensation may not happen.'],
['Weighted Net Benefit','Sum gains/losses using social weights. Poor weighted more heavily. Whether project is adopted depends on weight choice.'],
['Poverty Index','Fraction of population below a critical income threshold.'],
['Poverty Gap','How far below the threshold poor individuals are. How much income needed to bring all poor to the line.'],
['Interpersonal Comparison','The problem of comparing utility across people. We cannot directly measure utility levels or changes. Major criticism of SWF approaches.'],
]},
{market:'Public Goods (Week 4)',color:'#F0F9FF',border:'#0284C7',text:'#075985',terms:[
['Excludability','Can non-payers be kept out? Yes = excludable. No = nonexcludable. Key dimension for goods classification.'],
['Rivalry','Does one person\'s use reduce what\'s left? Yes = rival. No = nonrival. Second key dimension for classification.'],
['Private Good','Excludable + rival. Food, cars, clothing. Markets work well. Horizontal summation. MRS_A = MRS_E = MRT.'],
['Common-Pool Resource','Nonexcludable + rival. Fish, timber, groundwater. Tragedy of the commons risk. Overuse problem.'],
['Club Good','Excludable + nonrival. Cinema, satellite TV, private parks. Can charge, shared consumption until congestion.'],
['Pure Public Good','Nonexcludable + nonrival. Defense, air, free-to-air TV. Free-rider problem. Hardest for markets.'],
['Free-Rider Problem','Incentive to let others pay for a nonexcludable good. Everyone waits → underprovision. Theoretical fix: perfect price discrimination.'],
['Tragedy of the Commons','Each person takes from a shared rival resource → overuse and depletion. Fish stocks, grazing land, groundwater.'],
['Horizontal Summation','For private goods: at same price, add quantities. Q_market = Q_A + Q_B. Different quantities, same price.'],
['Vertical Summation','For public goods: at same quantity, add WTP. P_group = P_A + P_B. Same quantity, different prices.'],
['Samuelson Condition','ΣMRSᵢ = MRT. Sum of marginal valuations = marginal cost. Pareto efficiency condition for public goods.'],
['Provision vs Production','Provision = who finances. Production = who delivers. Education = publicly provided. Garbage = privately produced. Separate decisions.'],
['User Charges','Rationing by price. Beneficiaries pay. Risk: underconsumption + transaction costs.'],
['Uniform Provision','Everyone gets the same. Saves transaction costs. Risk: mismatch with preferences.'],
['Queuing','Rationing by waiting. Not wealth-based. Risk: wastes time, favors those with time.'],
['Privatization','Turning government services over to private sector. Right mix depends on costs, contracts, competition, equity.'],
]},
{market:'Externalities (Week 5&6)',color:'#FFF1F2',border:'#E11D48',text:'#9F1239',terms:[
['Externality','Activity affecting others outside the market mechanism. Not reflected in prices. Negative (pollution) or positive (R&D spillovers).'],
['Negative Externality','Social cost > private cost. MSC = MPC + MD. Market overproduces. Examples: pollution, congestion, noise.'],
['Positive Externality','Social benefit > private benefit. MSB = MPB + MEB. Market underprovides. Examples: R&D, education, vaccination.'],
['Marginal Damage (MD)','External cost per additional unit. Added to MPC to get MSC. The gap the market ignores.'],
['MSC = MPC + MD','Marginal social cost = private cost + damage. Firms use MPC; society cares about MSC.'],
['MSB = MPB + MEB','Marginal social benefit = private benefit + external benefit. Firms use MPB; society cares about MSB.'],
['Coase Theorem','If transaction costs are low and property rights clear, private bargaining achieves efficiency. Does not require government.'],
['Pigouvian Tax','Tax = MD at Q*. Makes firm face true social cost. Corrects externality AND raises revenue.'],
['Pigouvian Subsidy','For positive externality: subsidy = MEB at R*. Bridges private-social benefit gap. For negative: pay polluter not to produce (controversial).'],
['Emissions Fee','Tax per unit of POLLUTION (not output). f* = MSB of reduction at e*. Targets pollution directly, gives flexibility.'],
['Cost-Effectiveness','Achieving pollution target at minimum total cost. Requires MC_B = MC_H. Uniform reduction is NOT cost effective.'],
['Cap-and-Trade','Government sets pollution cap, issues permits, firms trade. Fixes quantity. Trading equalizes MC across firms → cost effective.'],
['Fee vs Cap-and-Trade','Inelastic MSB → C&T better (quantity control). Elastic MSB → fee better (cost flexibility). Classic prices-vs-quantities.'],
['Command-and-Control','Required reduction with limited flexibility. Technology or performance requirements. Less efficient but useful for hot spots.'],
['Hot Spots','Geographically concentrated emissions. Command-and-control may be better than market-based instruments here.'],
['DWL of Externality','Triangle between Q* and Q₁ where MSC > MB. Welfare lost from overproduction the market ignores.'],
]},
{market:'Public Choice (Week 7)',color:'#EDE9FE',border:'#7C3AED',text:'#5B21B6',terms:[
['Public Choice','Decision making through political interaction according to pre-established rules. Studies voters, politicians, bureaucrats as economic agents.'],
['Political Economy','Applying economic principles (incentives, trade-offs, optimization) to political decision making.'],
['Preference Revelation','The problem that voting reveals limited info about how much each person values a public good. Votes bundle many issues.'],
['Political Equilibrium','Agreement on public good level + tax shares under a given collective choice rule. Hard because people differ in tastes, income, and tax shares.'],
['Tax Share / Tax Price','Each citizen\'s personalized price for one more unit of public good. Higher tax share → prefer less spending. Plays role of price in consumer theory.'],
['Lindahl Equilibrium','Each person pays personalized tax price = their MB. Σt_i = MC(G). Pareto efficient if preferences truthful. Public-good analog of competitive equilibrium.'],
['Free-Rider Problem','Incentive to understate valuation of public good to reduce one\'s tax share. Makes Lindahl equilibrium impractical.'],
['Rational Ignorance','MC_info > MB_info → voter stays uninformed. One vote has tiny effect → private return to information is very small.'],
['Majority Voting','An option wins if it gets >50% of votes. Does NOT always produce a stable winner (voting paradox).'],
['Voting Paradox','Pairwise majority voting produces cyclical preferences: II≻I, III≻II, I≻III. No stable winner. Agenda order determines outcome.'],
['Pairwise Cycling','Each option can win depending on how it is paired. The path/sequence of votes matters, not just preferences.'],
['Median Voter Theorem','Under single-peaked preferences on one dimension, the median voter\'s ideal point = majority-stable equilibrium. Both parties converge to median.'],
['Single-Peaked Preferences','One unique most-preferred outcome; utility falls in both directions. KEY condition for median voter theorem to hold.'],
['Multi-Peaked Preferences','Multiple locally attractive regions. Can destroy majority stability and create voting cycles.'],
['Arrow\'s Impossibility Theorem','No voting rule can always convert individual preferences into a consistent fair collective ranking satisfying: no dictator, unanimity, consistency, independence.'],
['Agenda Setting','Who controls the order of pairwise votes can determine the outcome when preferences cycle. Procedure matters, not just preferences.'],
]},
];
function renderGlossary(){const el=document.getElementById('glossary-view');let total=GLOSSARY.reduce((a,g)=>a+g.terms.length,0);let h=`<div class="glo-title">📖 Exam Glossary</div><div class="glo-sub">${total} terms across ${GLOSSARY.length} categories.</div><input type="text" class="glo-search" id="glo-q" placeholder="Search..." oninput="filterGlossary()">`;GLOSSARY.forEach((g,gi)=>{h+=`<div class="glo-market"><div class="glo-market-head" style="background:${g.color};color:${g.text};border-bottom:1px solid ${g.border}30" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'"><span>${g.market}</span><span class="glo-count">${g.terms.length}</span></div><div class="glo-market-body">`;g.terms.forEach(([n,d])=>{h+=`<div class="glo-term"><span class="glo-term-name">${n}</span><span class="glo-term-def">${d}</span></div>`});h+=`</div></div>`});el.innerHTML=h}
function filterGlossary(){const q=document.getElementById('glo-q').value.toLowerCase().trim();document.querySelectorAll('.glo-term').forEach(t=>{const n=t.querySelector('.glo-term-name').textContent.toLowerCase(),d=t.querySelector('.glo-term-def').textContent.toLowerCase();t.style.display=(n.includes(q)||d.includes(q))?'':'none'});if(q)document.querySelectorAll('.glo-market-body').forEach(b=>b.style.display='')}

// ═══ INIT ═══
setTimeout(zoomFit,100);
</script>
